<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Scrollytelling Field Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf8f4; --ink:#15141a; --muted:#6e6b75; --faint:#9a96a2; --line:#e8e3d9;
    --frame:#16141d; --frame-bar:#221f2c; --frameink:#f4f2ff;
    --display:"Fraunces","Hoefler Text",Georgia,serif;
    --sans:"Inter",system-ui,-apple-system,sans-serif;
    --bar:40px; --pad:14px;

    /* ── MOTION GRAMMAR — the page's one named timing authority ──
       Every easing curve and timing duration the design uses is named here —
       CSS transition durations, ambient-loop durations, AND the WAAPI flourish
       lengths (--ms-*, read back as numbers). A scene picks from this vocabulary;
       it never inlines a curve or a duration. The JS MOTION object MIRRORS the
       curve strings and the WAAPI ms values by READING these props at startup,
       so each is one fact — no JS/CSS twin to drift. Only the scroll-scrub easing
       (drift) and the read-beat palette are JS-only (CSS transitions can't scrub
       scroll); they live in the JS grammar header.
       [LAW:one-source-of-truth]; ui-frontend: animation has one named timing authority.
       (The .001ms in the reduced-motion @media block below is the motion KILL
       SWITCH, not a design token — deliberately a literal so it can !important-
       reset every duration at once. [LAW:single-enforcer] exception, by design.) */
    --ease-land: cubic-bezier(.22,1,.36,1); /* a state change overshoots a hair, then settles — morphs, pops */
    --ease-fade: ease;                       /* plain appearance/disappearance — crossfades */
    --t-tap:  .25s;  /* micro state change — a word tints, a cell fills */
    --t-ctl:  .35s;  /* an interactive control settles — a step chip activates */
    --t-veil: .45s;  /* an overlay element fades in or out — a pin appears */
    --t-shift:.5s;   /* a graphic morphs across the frame — a box scales, a shape turns */
    --dur-bob:   1.8s; /* ambient loop — the hero scroll-hint bob */
    --dur-blink: 1s;   /* ambient loop — the terminal cursor blink */
    --dur-gauge: 2.4s; /* ambient loop — the gauge needle-tip glow */
    --ms-fade: 240;  /* WAAPI flourish (ms) — text crossfade on change */
    --ms-pop:  430;  /* WAAPI flourish (ms) — the punch-word's entrance pop */

    /* ── COLOR STORY — the page's one authored palette ──
       The accent FAMILIES are named here (CSS is canonical, same house pattern
       as the MOTION GRAMMAR above). This block is the VOCABULARY only: what each
       family looks like. The JOURNEY — which family each scene wears, and so the
       order they read in — is data carried by the tree (node.accent), not a fact
       of build order. JS reads a family back through cssVar(); a node names its
       family as a string, accentOf() resolves it, so a renamed family breaks the
       build loud instead of silently reshuffling the palette.
       The arc descends cool→warm — a gem refracting light from crown to core:
       iris at the surface, through the five movements (azure→ember), warm at the
       close. A scene picks one family; it never inlines a hex.
       [LAW:one-source-of-truth] every hex lives once, here. */
    --acc-iris:  #6a5cff;  /* the surface — the canonical scrollytelling violet */
    --acc-azure: #3f7bff;  /* the pin — cool blue, the mechanism */
    --acc-teal:  #11b3c2;  /* the step — tracking, mid-descent */
    --acc-jade:  #1bb578;  /* the forms — the broad gallery */
    --acc-amber: #f5a623;  /* the data — warm, the figures */
    --acc-ember: #ff5b6e;  /* the words and the close — the warm core */

    /* ── PACING SCALE — the page's one authored tempo vocabulary ──
       How far each scene runs under the scroll, and how long its final state
       lingers, are NAMED here (CSS is canonical, same house pattern as the
       MOTION GRAMMAR and COLOR STORY above) — never hand-tuned per node. A scene
       names ONE tempo as data (node.tempo); the build reads these scalars back
       through the guarded cssNum() and sizes the scene from them, so a renamed
       token breaks loud instead of silently re-pacing the descent.
       Each tempo is a complete shape: -len is the scroll length (in screens,
       before --pace), -hold is the trailing linger that keeps the last state
       readable before the next frame covers it. Two scenes that should READ at
       the same speed share a tempo NAME, not a coincidentally-similar number.
       The scale ascends like a musical measure — flit → pulse → phrase →
       passage → movement — a grace note through to a full movement.
       [LAW:one-source-of-truth] every pacing scalar lives once, here.
       [LAW:one-type-per-behavior] same reading-speed → same name, one value. */
    --pace: 1.25;   /* global tempo knob — multiplies every scene; raise to slow the whole guide */
    --tempo-flit-len:     0.85;  --tempo-flit-hold:     0.22;  /* a blink — the nesting windows, gone before they settle */
    --tempo-pulse-len:    1.6;   --tempo-pulse-hold:    0.34;  /* a single beat — a section title racks in, read, move on */
    --tempo-phrase-len:   2.3;   --tempo-phrase-hold:   0.40;  /* the default — one idea shown and read */
    --tempo-passage-len:  2.7;   --tempo-passage-hold:  0.46;  /* a feature scene with room to unfold */
    --tempo-movement-len: 3.6;   --tempo-movement-hold: 0.58;  /* the establishing opener — the longest breath */

    /* ── TYPE SCALE — the page's one authored typographic voice ──
       Scene text was ~40 independent clamp() calls; two scenes at the same
       typographic ROLE (a frame-foot readout, a landing word, a code line)
       disagreed only by incidental ±2px drift. Each role is NAMED here once
       (CSS is canonical, same house pattern as the MOTION GRAMMAR, COLOR STORY
       and PACING SCALE above) and a scene references a step, never re-types a
       coincidentally-similar clamp. Unlike those three, type is read by no JS —
       every size is consumed by CSS layout — so there is no cssNum() mirror to
       keep; the single source is simply :root, referenced through var().
       Each step is fluid by design: a min (the 360px floor, T.2's legibility
       gate), a container-relative ideal (cqw), and a max (the desktop cut).
       The ramp descends in grandeur — masthead → micro — across three voices:
       Fraunces (the serif display voice), Inter (the sans utility voice), and
       the monospace machine voice.
       [LAW:one-source-of-truth] every scene size lives once, here.
       [LAW:one-type-per-behavior] same typographic role → same step, one value. */
    --type-masthead: clamp(34px,12cqw,96px);  /* the one grandest cut — the homage masthead */
    --type-hero:     clamp(26px,9cqw,66px);   /* a single giant word or figure that owns the frame */
    --type-display:  clamp(22px,7cqw,52px);   /* a landing word — a movement's engraving payoff */
    --type-phrase:   clamp(20px,5.4cqw,42px); /* a phrase that resolves on screen, line by line */
    --type-title:    clamp(16px,4.4cqw,32px); /* a serif title, word or figure set against a graphic */
    --type-caption:  clamp(14px,3.4cqw,22px); /* a serif caption naming what a text-graphic shows */
    --type-readout:  clamp(12px,2.6cqw,17px); /* the sans live readout at the foot of a frame */
    --type-label:    clamp(11px,2.6cqw,15px); /* a sans annotation — a node, a chip, a stat label */
    --type-micro:    clamp(9px,2.3cqw,13px);  /* the smallest tags — a pin, an axis tick, a layer name */
    --type-mono:     clamp(10px,2.4cqw,14px); /* the monospace machine voice — typed code */

    /* The engraving cut: Fraunces ships an optical-size axis (opsz 9..144) that
       otherwise just rides font-size via auto. The big landing moments SPEND it
       deliberately at its display extreme — high stroke contrast, refined
       terminals — so they read as cut-in-stone, not as body text enlarged.
       Applied only to the top serif tiers, whose min size stays in display
       range where high opsz aids rather than thins. [FRAMING:representation] —
       the axis is now authored intent, not an incidental side effect of size. */
    --type-engrave: "opsz" 144;

    /* the serif display tiers that spend the engraving axis: a landing word IS
       the scene's payoff (masthead → phrase). The smaller serif tiers (title,
       caption) are supporting labels set against a graphic, so they keep auto
       optical sizing where legibility, not grandeur, is the job. */
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}   /* the #top anchor glides; reduced-motion below makes it jump */
  /* [LAW:single-enforcer] one place neutralises all CSS motion for users who
     ask for less of it — the OS preference is the single source; the JS
     REDUCE_MOTION constant reads the same setting for the WAAPI flourishes. */
  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto;}
    *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }
  body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-size:17px; line-height:1.6; -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(rgba(20,16,40,.045) 1px,transparent 1px); background-size:22px 22px;}
  h1{font-family:var(--display); font-weight:500; letter-spacing:-.02em; line-height:1.04; margin:0;}
  .eyebrow{font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#5b4bff;}

  /* ── The cover plate ── the page's one LIGHT, engraved masthead: Fraunces
     struck in ink on bone, the inverse of the dark landing words below, so it
     reads as the COVER before the cinematic descent. Its whole signature lives
     in this block — the shared paint loop never touches the hero, so there is no
     special-case to leak. [LAW:locality-or-seam] */
  .hero{max-width:880px; margin:0 auto; padding:120px 28px 18vh; text-align:center;}
  /* spend Fraunces' optical axis at its display extreme: the 44px floor stays in
     display range where high opsz refines rather than thins (TYPE SCALE engraving
     note). The masthead is now cut-in-stone, not body text enlarged. Authored
     STATICALLY, not animated — opsz changes glyph advance-width on Fraunces, so an
     ambient breath would reflow the headline between one and two lines each cycle;
     a static cut keeps the engraving payoff with no layout coupling.
     [LAW:no-ambient-temporal-coupling] */
  .hero h1{font-size:clamp(44px,8vw,92px); font-variation-settings:var(--type-engrave);}
  /* the accent word wears IRIS — the colour story's "surface" family, the
     canonical scrollytelling violet — sourced from the one palette, never a twin
     hex. [LAW:one-source-of-truth] It INHERITS the headline's opsz, so the
     engraving is one fact across the whole masthead, not a twin to drift. */
  .hero h1 em{font-style:italic; color:var(--acc-iris);}
  .hero .eyebrow{color:var(--acc-iris);}
  .hero .lede{max-width:520px; margin:24px auto 0; font-size:20px; color:var(--muted);}
  /* the descent begins here: the lone bobbing arrow becomes a scroll-AXIS — a
     hairline dropping from the label past the arrow into the page, the first inch
     of the long descent the guide is about to take. */
  .hero .scrollhint{margin-top:48px; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); display:flex; flex-direction:column; align-items:center; gap:12px;}
  .hero .arrow{font-size:20px; color:var(--acc-iris); animation:bob var(--dur-bob) ease-in-out infinite;}
  .hero .scrollhint::after{content:""; width:1px; height:36px; background:linear-gradient(var(--faint),transparent);}
  @keyframes bob{0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)}}

  /* nested-sticky scaffolding: a node's frame stays pinned until its whole
     subtree has scrolled past, so ancestors pin while descendants pin on top.
     Two treatments — `framed` wears window chrome (inset by chrome-depth + a
     titlebar) to make the nesting visible; the default is full-bleed, so once
     the page has shown you the nesting it just plays as edge-to-edge scenes. */
  .lvl{position:relative;}
  .frame{position:sticky; top:0; height:100vh;}
  .inner{position:absolute; inset:0; overflow:hidden; background:var(--frame); container-type:size;}
  .lvl.framed .inner{
    top:calc(var(--d) * var(--bar)); left:calc(var(--d) * var(--pad));
    right:calc(var(--d) * var(--pad)); bottom:calc(var(--d) * var(--pad));
    border-radius:14px;
    box-shadow:0 18px 60px -28px rgba(8,5,20,.7), 0 0 0 1px rgba(255,255,255,.05);}
  .bar{display:none;}
  .lvl.framed .bar{position:relative; height:var(--bar); display:flex; align-items:center; gap:9px; padding:0 15px;
    background:var(--frame-bar); color:#d3cfe3; font-size:12.5px; font-weight:600;
    border-bottom:1px solid rgba(255,255,255,.06);}
  .bar .dot{width:8px; height:8px; border-radius:50%; background:var(--accent); flex:none;}
  .bar .barfill{position:absolute; left:0; bottom:0; height:2px; width:100%; transform:scaleX(0); transform-origin:left; background:var(--accent);}
  /* [LAW:single-enforcer] every scene's field is this ONE gradient, keyed to the
     scene's own --accent — the bg is a DERIVED view of the accent, never a second
     authored colour. Reorder the journey and every field follows, no edit here. */
  .content{position:absolute; inset:0; overflow:hidden;
    background:radial-gradient(120% 90% at 50% 0%, color-mix(in oklab, var(--accent) 16%, var(--frame)) 0%, var(--frame) 72%);}
  .lvl.framed .content{top:var(--bar);}
  .run,.hold{position:relative;}

  .scene-cap{position:absolute; bottom:8%; left:0; right:0; text-align:center; color:#e9e6f5;
    font-size:var(--type-readout); font-weight:500; padding:0 11%; z-index:6; text-shadow:0 1px 12px rgba(0,0,0,.65);}
  .scene-bar{position:absolute; bottom:4.5%; left:16%; right:16%; height:3px; border-radius:3px; background:rgba(255,255,255,.12); overflow:hidden; z-index:6;}
  .scene-bar span{display:block; height:100%; transform:scaleX(0); transform-origin:left; background:var(--accent);}

  /* steps-graphic — a motion study. one specimen crosses a measured grid and
     leaves a numbered ghost at every step it passes, so by the end the whole path
     the single graphic travelled stays on the field — the canonical first
     scrollytelling, shown as its own trace. */
  .sg-grid{position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px); background-size:32px 32px;}
  .sg-field{position:absolute; inset:0;}
  .sg-tile{position:absolute; width:clamp(54px,20cqw,104px); aspect-ratio:1; border-radius:18px; display:grid; place-items:center; color:#fff; font-family:var(--display); font-weight:600; font-size:var(--type-title); transform:translate(-50%,-50%);}
  .sg-ghost{background:color-mix(in oklab, var(--accent) 13%, transparent); border:1px solid color-mix(in oklab, var(--accent) 40%, transparent); color:color-mix(in oklab, var(--accent) 64%, #d8d3ec); opacity:0; transition:opacity var(--t-veil) var(--ease-fade);}
  .sg-ghost.seen{opacity:1;}
  .sg-box{background:var(--accent); box-shadow:0 16px 40px -12px rgba(0,0,0,.7); z-index:4; transition:left var(--t-shift) var(--ease-land), top var(--t-shift) var(--ease-land), transform var(--t-shift) var(--ease-land);}

  /* runway — an honest position:sticky demo. A ribbon of page content scrolls
     through a windowed offset-parent; the sticky band rises with the flow, clamps
     to the glowing top:0 datum, holds while content slides beneath, then releases
     with its section. The painter owns the geometry; CSS owns only the look. */
  .rw{position:absolute; inset:0 0 14% 0; display:grid; place-items:center; padding:6% 9% 3%;}
  .rw-win{position:relative; width:min(80%,340px); height:100%; border:2px solid rgba(255,255,255,.16);
    border-radius:14px; overflow:hidden; background:rgba(255,255,255,.025); box-shadow:inset 0 0 46px -20px #000;}
  .rw-page{position:absolute; left:0; right:0; top:0; will-change:transform;}
  .rw-row{position:absolute; left:12px; height:7px; border-radius:4px; background:rgba(255,255,255,.10);}
  .rw-datum{position:absolute; left:0; right:0; top:0; height:2px; background:var(--accent); opacity:.26; z-index:5;
    transform-origin:top; transition:opacity var(--t-veil) var(--ease-fade);}
  /* --ms-pop is authored unitless for WAAPI's numeric API; calc adds the unit so
     the one source still drives this CSS flash. [LAW:one-source-of-truth] */
  .rw-datum.engaged{opacity:.95; box-shadow:0 0 16px 1px var(--accent); animation:rw-lock calc(var(--ms-pop)*1ms) var(--ease-land);}
  @keyframes rw-lock{0%{transform:scaleY(1);} 50%{transform:scaleY(4);} 100%{transform:scaleY(1);}}
  .rw-sticky{position:absolute; left:12px; right:24px; z-index:6; border-radius:9px; background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:space-between; padding:0 13px; box-shadow:0 14px 32px -14px rgba(0,0,0,.75);}
  .rw-tag{font-family:var(--display); font-weight:600; font-size:var(--type-caption);}
  .rw-top{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-mono); opacity:.9; letter-spacing:.02em;}
  .rw-bar{position:absolute; top:7px; bottom:7px; right:7px; width:5px; border-radius:5px; background:rgba(255,255,255,.08); z-index:6;}
  .rw-thumb{position:absolute; left:0; right:0; border-radius:5px; background:rgba(255,255,255,.32);}

  /* frame-sequence */
  .fs{position:absolute; inset:6% 6% 16%;}
  .fs canvas{width:100%; height:100%; display:block;}

  /* horizontal */
  .hz{position:absolute; inset:0; display:flex; align-items:center; overflow:hidden;}
  .hz-strip{display:flex; gap:20px; padding:0 9%; will-change:transform;}
  .hz-panel{flex:0 0 auto; width:min(58cqw,300px); background:linear-gradient(180deg,#241f33,#16141d); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:20px; color:var(--frameink);}
  .hz-panel .yr{font-family:var(--display); font-size:var(--type-title); font-weight:600; color:var(--accent); line-height:1;}
  .hz-panel h3{font-size:var(--type-caption); margin:8px 0 6px; color:#fff;}
  .hz-panel p{font-size:var(--type-label); color:#bdb8cc;}

  /* chart */
  .ch{position:absolute; inset:0 0 14% 0; display:flex; align-items:flex-end; justify-content:center; gap:clamp(8px,4cqw,26px); padding:18% 12% 0;}
  .ch-bar{width:clamp(20px,9cqw,56px); display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
  .ch-fill{width:100%; height:0%; border-radius:7px 7px 0 0;}
  .ch-bar label{margin-top:8px; font-size:var(--type-micro); color:#cfcad9;}

  /* parallax — static background, foreground layers drift at their own speeds */
  .px{position:absolute; inset:0; overflow:hidden;}
  .px-bg{position:absolute; inset:0; background:radial-gradient(80% 60% at 50% 18%, #2c2546, #14121c 70%);}
  .px-bg::after{content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.35) 1px,transparent 1.4px); background-size:30px 30px; opacity:.18;}
  .px-el{position:absolute; will-change:transform; border-radius:30%;}
  .px-cap{position:absolute; bottom:8%; left:0; right:0; text-align:center; color:#e9e6f5; font-size:var(--type-readout); z-index:6; text-shadow:0 1px 12px #000;}

  /* mask — a growing aperture reveals the layer beneath */
  .mk{position:absolute; inset:0;}
  .mk-layer{position:absolute; inset:0; display:grid; place-items:center; color:#fff; font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); font-size:var(--type-phrase); text-align:center; padding:0 12%;}
  .mk-under{background:linear-gradient(135deg,#15b886,#0c6b50);}
  .mk-over{background:linear-gradient(135deg,#5b4bff,#9b6bff);
    -webkit-mask:radial-gradient(circle at center, transparent var(--r,0%), #000 calc(var(--r,0%) + 1px));
            mask:radial-gradient(circle at center, transparent var(--r,0%), #000 calc(var(--r,0%) + 1px));}

  /* wipe — before/after reveal */
  .wp{position:absolute; inset:0;}
  .wp-a,.wp-b{position:absolute; inset:0; display:grid; place-items:center; color:#fff; font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); font-size:var(--type-phrase);}
  .wp-a{background:#23202c;} .wp-b{background:linear-gradient(135deg,#ff5b7f,#f5a623); clip-path:inset(0 100% 0 0);}
  .wp-div{position:absolute; top:0; bottom:0; left:0; width:2px; background:#fff; box-shadow:0 0 12px #fff;}

  /* draw — an SVG line draws itself */
  .dw{position:absolute; inset:0 0 14% 0; display:grid; place-items:center; padding:8%;}
  .dw svg{width:100%; height:100%;}
  .dw path{fill:none; stroke:var(--accent); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round;}
  .dw circle{fill:#fff;}

  /* count — figures tick up */
  .cnt{position:absolute; inset:0 0 12% 0; display:flex; align-items:center; justify-content:center; gap:9%; padding:0 8%;}
  .cnt-stat{text-align:center;}
  .cnt-num{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:var(--accent); font-size:var(--type-hero); line-height:1;}
  .cnt-lab{margin-top:8px; font-size:var(--type-label); color:#bdb8cc;}

  /* typewriter — words illuminate as you scroll */
  .tw{position:absolute; inset:0 0 12% 0; display:grid; place-items:center; padding:0 11%;}
  .tw-p{font-family:var(--display); font-weight:500; font-size:var(--type-title); line-height:1.32; text-align:center; color:#3a3645;}
  .tw-p .w{transition:color var(--t-tap) var(--ease-fade);}

  /* takeover — full-bleed colour field swells */
  .tk{position:absolute; inset:0; display:grid; place-items:center; overflow:hidden;}
  .tk-word{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-hero); will-change:transform; text-align:center; padding:0 8%;}

  /* ring — recast as concentric NESTED rings: a ring that holds a ring that holds a
     ring. The Nesting Chain's containment idea drawn in the round — the circular
     cousin of the depth dive's nested frames, the motif this whole movement shares. */
  .rg{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:0 11%;}
  .rg-rings{position:relative; width:clamp(96px,33cqw,176px); aspect-ratio:1;}
  .rg-rings svg{width:100%; height:100%; transform:rotate(-90deg);}   /* fills start at twelve o'clock */
  .rg-bg{fill:none; stroke:rgba(255,255,255,.10); stroke-width:5;}
  .rg-fg{fill:none; stroke:var(--accent); stroke-width:5; stroke-linecap:round; filter:drop-shadow(0 0 5px var(--accent));}
  .rg-num{position:absolute; inset:0; display:grid; place-items:center; font-family:var(--display); color:#fff; font-size:var(--type-title);}
  .rg-cap{font-family:var(--display); color:#e9e6f5; font-size:var(--type-caption); text-align:center; line-height:1.16;}
  /* scaleword — the movement's recursion motif, introduced. The punch-word lands
     inside concentric frame-echoes (the same nested-window glyph the depth dive
     ends on) that assemble behind the words as the node scrolls — the first hint
     of the nest, before the chain has shown its hand. */
  .scw{position:absolute; inset:0 0 10% 0; display:grid; place-items:center; padding:0 10%;}
  .scw-nest{position:absolute; inset:0; pointer-events:none;}
  .scw-fr{position:absolute; left:50%; top:50%; width:clamp(190px,62cqw,540px); aspect-ratio:3/2;
    border:1.5px solid var(--accent); border-radius:16px;
    box-shadow:0 0 34px -12px var(--accent), inset 0 0 34px -16px var(--accent);
    opacity:0; transition:opacity var(--t-veil) var(--ease-fade);}
  .scw-cap{position:relative; z-index:2; font-family:var(--display); font-variation-settings:var(--type-engrave); color:#f1eef9; font-size:var(--type-phrase); text-align:center; line-height:1.12; text-shadow:0 2px 30px rgba(0,0,0,.7);}
  /* terminal — the authoring surface: a syntax-lit code EDITOR that types the
     sticky rule character-by-character as the section scrolls. Its signature is
     the editor itself — a tabbed window, a line-number gutter, highlighted
     tokens, and a status bar that ticks Ln/Col and flips typing…→saved — so it
     reads distinct from the runway's scroll-window and the gauge's dial inside
     the same Pin movement. Sized to its content and centred, not stretched, so
     the window is a deliberate object rather than a void of black. */
  .tm{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(80cqw,520px); border-radius:12px; overflow:hidden; background:#0b0a12;
    border:1px solid rgba(255,255,255,.09); font-family:ui-monospace,Menlo,monospace;
    box-shadow:0 30px 72px -26px rgba(0,0,0,.72), 0 0 0 1px rgba(63,123,255,.05), inset 0 1px 0 rgba(255,255,255,.04);}
  .tm-top{display:flex; align-items:center; gap:10px; height:32px; padding:0 12px;
    background:linear-gradient(#1b1927,#15131f); border-bottom:1px solid rgba(255,255,255,.06);}
  .tm-dots{display:flex; gap:7px;}
  .tm-dots i{width:11px; height:11px; border-radius:50%;}
  .tm-dots i:nth-child(1){background:#ff5f57;} .tm-dots i:nth-child(2){background:#febc2e;} .tm-dots i:nth-child(3){background:#28c840;}
  .tm-file{font-size:11px; letter-spacing:.02em; color:#b7b2c4;}
  .tm-file b{color:var(--accent); font-weight:600;}   /* the .css extension wears the section's azure */
  .tm-pane{padding:15px 0;}
  /* gutter + code share one grid so the line numbers can never drift from their lines */
  .tm-code{display:grid; grid-template-columns:auto 1fr; align-items:baseline; font-size:var(--type-mono); line-height:1.95;}
  .tm-row{display:contents;}
  .tm-no{text-align:right; padding:0 13px 0 14px; color:#3d3a4c; user-select:none;}
  .tm-ln{padding:0 16px 0 14px; color:#cdd6e4; white-space:pre; border-left:1px solid rgba(255,255,255,.05);}
  .tm-row.cur .tm-no{color:var(--accent);}
  .tm-row.cur .tm-ln{background:rgba(63,123,255,.07);}
  /* token palette — azure-family keys, mint values, amber numbers, slate comments */
  .t-prop{color:#7fa6ff;} .t-val{color:#9be7c4;} .t-num{color:#f0b86e;} .t-punc{color:#716d83;} .t-com{color:#5f6b7e; font-style:italic;}
  .tm-caret{display:inline-block; width:7px; height:1.05em; vertical-align:text-bottom; margin-left:1px;
    background:var(--accent); box-shadow:0 0 9px var(--accent); animation:blink var(--dur-blink) steps(1) infinite;}
  .tm-bar{display:flex; align-items:center; gap:14px; height:26px; padding:0 13px;
    background:linear-gradient(#16141f,#0f0e17); border-top:1px solid rgba(255,255,255,.06);
    font-size:10px; letter-spacing:.05em; color:#6c6879;}
  .tm-lang{color:var(--accent); font-weight:600;}
  .tm-pos{color:#8a8698;}
  .tm-save{margin-left:auto; display:flex; align-items:center; gap:6px; color:#8a8698;}
  .tm-save::before{content:""; width:6px; height:6px; border-radius:50%; background:#febc2e; box-shadow:0 0 7px #febc2e;}
  .tm-save.done{color:#9be7c4;}
  .tm-save.done::before{background:#28c840; box-shadow:0 0 7px #28c840;}
  @keyframes blink{50%{opacity:0;}}
  /* shapemorph — a shape that literally holds a smaller copy of itself, three deep,
     each level morphing in lockstep: the figure is self-similar, so the caption's
     "holds another" is true on the screen, not just in words — the recursion idea
     as one object. */
  .shm{position:absolute; inset:0 0 8% 0; display:grid; grid-template-columns:1fr 1.15fr; align-items:center; gap:5%; padding:0 10%;}
  .shm-shape{justify-self:center; width:clamp(48px,18cqw,108px); aspect-ratio:1; background:var(--accent);
    display:grid; place-items:center; border:1px solid rgba(255,255,255,.22);
    box-shadow:0 16px 40px -12px rgba(0,0,0,.6), 0 0 28px -10px var(--accent);
    transition:border-radius var(--t-shift) var(--ease-land), transform var(--t-shift) var(--ease-land), background var(--t-shift) var(--ease-fade);}
  .shm-shape .shm-shape{width:54%; height:54%; aspect-ratio:auto; justify-self:auto;
    box-shadow:0 0 18px -6px var(--accent);}
  .shm-cap{font-family:var(--display); color:#f1eef9; font-size:var(--type-title); line-height:1.2;}

  /* waffle — a unit grid fills toward a share */
  .wf{position:absolute; inset:0 0 12% 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:0 11%;}
  .wf-grid{display:grid; grid-template-columns:repeat(10,1fr); gap:clamp(3px,1.1cqw,7px); width:min(56cqw,250px);}
  .wf-cell{aspect-ratio:1; border-radius:3px; background:rgba(255,255,255,.10); transition:background var(--t-tap) var(--ease-fade);}
  .wf-cell.on{background:var(--accent);}
  .wf-cap{font-family:var(--display); color:#e9e6f5; font-size:var(--type-caption); text-align:center; line-height:1.18;}
  /* zoom — a single frame you push into (Ken Burns) */
  .zm{position:absolute; inset:0; overflow:hidden;}
  .zm-img{position:absolute; inset:-25%; will-change:transform;
    background:
      radial-gradient(38% 48% at 30% 36%, rgba(58,107,255,.45), transparent 60%),
      radial-gradient(46% 56% at 72% 66%, rgba(255,91,127,.4), transparent 60%),
      conic-gradient(from 30deg at 50% 50%, #1a1730, #2a2440, #161320, #1a1730);}
  .zm-img::after{content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.5) 1px,transparent 1.4px); background-size:26px 26px; opacity:.12;}
  .zm-cap{position:absolute; bottom:8%; left:0; right:0; text-align:center; color:#fff; font-size:var(--type-readout); z-index:3; text-shadow:0 1px 14px #000; padding:0 12%;}
  /* annotate — labels pin onto one still image, one at a time */
  .an{position:absolute; inset:0; overflow:hidden; background:linear-gradient(160deg,#10243a,#0b1622);}
  .an-terrain{position:absolute; inset:0; background:
      radial-gradient(60% 42% at 30% 72%, rgba(29,94,74,.5), transparent 62%),
      radial-gradient(52% 42% at 76% 34%, rgba(91,75,255,.28), transparent 62%);}
  .an-terrain::after{content:""; position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.06) 1px,transparent 1px); background-size:42px 42px;}
  .an-pin{position:absolute; transform:translate(-50%,-50%); opacity:0; transition:opacity var(--t-veil) var(--ease-fade); z-index:3;}
  .an-pin.on{opacity:1;}
  .an-dot{width:11px; height:11px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px rgba(91,75,255,.25); margin:0 auto;}
  .an-lab{margin-top:6px; font-size:var(--type-micro); color:#eaf2ff; background:rgba(8,14,24,.72); border:1px solid rgba(255,255,255,.12); padding:3px 7px; border-radius:5px; white-space:nowrap;}
  .an-cap{position:absolute; bottom:7%; left:0; right:0; text-align:center; color:#dce8f5; font-size:var(--type-readout); z-index:5; text-shadow:0 1px 12px #000; padding:0 11%;}

  /* gauge — a dial, deliberately distinct from the runway scroll-window and the
     terminal editor (the movement's no-duplication rule). The needle-tip glow is a
     @keyframes, not a JS branch, so the single global prefers-reduced-motion kill
     above governs it — the review convention the sibling painters also follow. */
  .gg{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:0 9%;}
  .gg-inst{position:relative; width:min(64cqw,300px);}
  .gg svg{width:100%; height:auto; display:block; overflow:visible;}
  .gg-bezel{fill:rgba(10,14,26,.55); stroke:rgba(255,255,255,.10); stroke-width:1.2;}
  .gg-arc{fill:none; stroke:rgba(255,255,255,.12); stroke-width:6; stroke-linecap:round;}
  .gg-fill{fill:none; stroke:var(--accent); stroke-width:6; stroke-linecap:round; filter:drop-shadow(0 0 4px var(--accent));}
  .gg-tick{stroke:rgba(255,255,255,.30); stroke-width:.8;}
  .gg-tick.maj{stroke:rgba(255,255,255,.72); stroke-width:1.5;}
  .gg-num{fill:#aeb8d0; font-family:ui-monospace,Menlo,monospace; font-size:4.6px; text-anchor:middle; dominant-baseline:middle;}
  .gg-face{fill:#6f7a96; font-family:ui-monospace,Menlo,monospace; font-size:4px; letter-spacing:.18em; text-anchor:middle; text-transform:uppercase;}
  .gg-needle line{stroke-linecap:round;}
  .gg-n-main{stroke:#fff; stroke-width:1.9;}
  .gg-n-tail{stroke:rgba(255,255,255,.5); stroke-width:3;}
  .gg-n-tip{fill:#fff; filter:drop-shadow(0 0 5px var(--accent)); animation:gg-pulse var(--dur-gauge) ease-in-out infinite;}
  .gg-hub{fill:#0b0f1a; stroke:#fff; stroke-width:1.4;}
  @keyframes gg-pulse{0%,100%{opacity:.55;} 50%{opacity:1;}}
  .gg-lcd{position:absolute; left:0; right:0; top:72%; text-align:center; pointer-events:none;}
  .gg-val{font-family:ui-monospace,Menlo,monospace; font-weight:700; font-size:var(--type-title); color:#eaf2ff; letter-spacing:.04em; text-shadow:0 0 12px rgba(63,123,255,.55);}
  .gg-unit{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); color:var(--accent); margin-left:3px;}
  .gg-lbl{display:block; margin-top:1px; font-size:var(--type-micro); letter-spacing:.24em; text-transform:uppercase; color:#7f8aa6;}
  .gg-cap{font-family:var(--display); color:#e9e6f5; font-size:var(--type-caption); text-align:center; line-height:1.18;}

  /* explode — the exploded assembly schematic: five numbered part-plates thread
     onto a dash-dot assembly axis (the spindle) and slide apart along it as you
     scroll, a draughtsman's dimension line bracketing the separation. The parts
     wear the five journey families (a preview of the descent); the schematic chrome
     — spindle, dimension, stamps — wears the node's own accent (iris). */
  .xp{position:absolute; inset:0; display:grid; place-items:center; perspective:1000px;}
  .xp-stack{position:relative; width:min(52cqw,290px); aspect-ratio:3/2; transform-style:preserve-3d; transform:rotateX(54deg) rotateZ(-34deg);}
  .xp-layer{position:absolute; inset:0; border-radius:13px; will-change:transform; backface-visibility:hidden;
    border:1px solid rgba(255,255,255,.16); box-shadow:0 14px 34px -12px rgba(0,0,0,.65), inset 0 0 0 1px rgba(255,255,255,.13);}
  .xp-no{position:absolute; top:6px; left:9px; font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro);
    font-weight:700; color:rgba(255,255,255,.92); letter-spacing:.06em; text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .xp-nm{position:absolute; left:0; right:0; bottom:0; padding:3px 0 4px; text-align:center;
    font-size:var(--type-micro); font-weight:600; color:#fff; letter-spacing:.02em; text-shadow:0 1px 4px rgba(0,0,0,.45);
    background:linear-gradient(0deg, rgba(7,6,14,.40), transparent); border-radius:0 0 13px 13px;}
  /* the assembly axis — a dash-dot centerline laid along the explosion (Z) axis;
     rotateX turns the bar to lie on Z, paint reveals it as the parts separate. */
  .xp-spindle{position:absolute; left:50%; top:50%; width:2.5px; height:470px; opacity:0;
    transform:translate(-50%,-50%) rotateX(90deg); border-radius:2px;
    background:repeating-linear-gradient(180deg, color-mix(in srgb, var(--accent) 85%, #fff) 0 9px, transparent 9px 9px, var(--accent) 9px 11px, transparent 11px 18px);}
  /* the dimension line — a draughtsman's measured bracket (arrowheads + a vertical
     mono label) that grows with the explosion; flat screen-space, not in the 3D stack. */
  .xp-dim{position:absolute; left:10%; top:50%; height:0; opacity:0; z-index:6; transform:translateY(-50%);}
  .xp-dim-bar{position:absolute; left:50%; top:0; transform:translateX(-50%); width:1.5px; height:100%; background:var(--accent);}
  .xp-dim-bar::before,.xp-dim-bar::after{content:""; position:absolute; left:50%; transform:translateX(-50%);
    border-left:4px solid transparent; border-right:4px solid transparent;}
  .xp-dim-bar::before{top:-5px; border-bottom:6px solid var(--accent);}
  .xp-dim-bar::after{bottom:-5px; border-top:6px solid var(--accent);}
  .xp-dim-lab{position:absolute; left:8px; top:50%; transform:translateY(-50%) rotate(180deg); writing-mode:vertical-rl;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.26em; text-transform:uppercase;
    color:var(--accent); white-space:nowrap; opacity:.85;}

  /* trigger — an oscilloscope. The step events are a pulse train on a phosphor
     trace; the beam sweeps with scroll and each pulse crossing the TRIGGER LEVEL
     line (the rootMargin) latches its onStep — the IntersectionObserver shown as a
     scope trigger. The CRT chrome (graticule, scanlines, phosphor glow) is this
     movement's signature, shared with bind; no other section wears it.
     [LAW:one-source-of-truth] the trigger level is authored once in build: --sc-trig
     sets the dashed line's top AND the SVG path's peak/base, so line and firing
     point cannot drift. */
  .sc{position:absolute; inset:7% 6%; border-radius:11px; overflow:hidden; z-index:0;
    background:radial-gradient(125% 135% at 50% 38%, #0a2c37 0%, #061720 64%, #03090d 100%);
    border:1px solid color-mix(in oklab, var(--accent) 40%, #0b1418);
    box-shadow:inset 0 0 70px -14px rgba(0,0,0,.92), inset 0 0 0 1px rgba(255,255,255,.03), 0 18px 46px -22px rgba(0,0,0,.7);}
  /* the graticule — a measured CRT grid in dim phosphor */
  .sc::before{content:""; position:absolute; inset:0; pointer-events:none; z-index:1; opacity:.55;
    background:
      repeating-linear-gradient(90deg, transparent 0 calc(10% - 1px), color-mix(in oklab, var(--accent) 24%, transparent) calc(10% - 1px) 10%),
      repeating-linear-gradient(0deg,  transparent 0 calc(20% - 1px), color-mix(in oklab, var(--accent) 24%, transparent) calc(20% - 1px) 20%);}
  /* scanline veil + a faint phosphor flicker — ambient; the global reduced-motion
     kill (.001ms !important on every duration) stops the flicker. */
  .sc::after{content:""; position:absolute; inset:0; pointer-events:none; z-index:6; mix-blend-mode:overlay;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.045) 0 1px, transparent 1px 3px);
    animation:sc-flick 3.6s steps(2) infinite;}
  @keyframes sc-flick{0%,100%{opacity:.6;} 50%{opacity:.4;}}
  .sc-trace{position:absolute; inset:0; z-index:3; clip-path:inset(0 100% 0 0);}   /* revealed left→right by the beam */
  .sc-trace svg{position:absolute; inset:0; width:100%; height:100%;}
  .sc-trace path{fill:none; stroke:var(--accent); stroke-width:1.6; vector-effect:non-scaling-stroke;
    filter:drop-shadow(0 0 4px var(--accent)) drop-shadow(0 0 10px color-mix(in oklab, var(--accent) 60%, transparent));}
  /* the trigger level — rootMargin drawn as a scope trigger line, with the ► marker */
  .sc-trig{position:absolute; left:0; right:0; top:var(--sc-trig); height:0; z-index:4;
    border-top:1.5px dashed color-mix(in oklab, var(--accent) 78%, #fff);}
  .sc-trig::before{content:"►"; position:absolute; left:1px; top:-7px; font-size:10px; line-height:1;
    color:color-mix(in oklab, var(--accent) 85%, #fff); text-shadow:0 0 6px var(--accent);}
  .sc-trig::after{content:"TRIGGER ▸ rootMargin"; position:absolute; right:5px; top:-15px; white-space:nowrap;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.04em;
    color:#d3eef2; background:rgba(4,12,16,.7); padding:1px 7px; border-radius:5px;}
  /* the sweep beam — the scroll position as a CRT sweep line */
  .sc-beam{position:absolute; top:0; bottom:0; left:0; width:0; z-index:5;
    border-left:1.5px solid color-mix(in oklab, var(--accent) 70%, #fff);
    box-shadow:0 0 14px 2px var(--accent);}
  /* event labels — one per onStep, sitting over its pulse; latches when the beam
     has swept the pulse through the trigger level above it. */
  .sc-ev{position:absolute; transform:translate(-50%,-50%); z-index:5; white-space:nowrap;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.02em;
    padding:3px 7px; border-radius:6px;
    color:color-mix(in oklab, var(--accent) 50%, #cfe8ec); background:rgba(4,12,16,.62);
    border:1px solid color-mix(in oklab, var(--accent) 30%, transparent);
    transition:color var(--t-ctl) var(--ease-fade), background var(--t-ctl) var(--ease-fade),
      border-color var(--t-ctl) var(--ease-fade), box-shadow var(--t-ctl) var(--ease-fade);}
  .sc-ev.fired{color:#effdff; background:var(--accent); border-color:var(--accent);
    box-shadow:0 0 18px -2px var(--accent);}
  /* corner chrome + live readout */
  .sc-tag{position:absolute; z-index:7; font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro);
    letter-spacing:.14em; text-transform:uppercase; color:color-mix(in oklab, var(--accent) 62%, #9fc4cc);}
  .sc-tag.tl{top:9px; left:11px;} .sc-tag.tr{top:9px; right:11px;}
  .sc-read{position:absolute; left:11px; right:11px; bottom:9px; z-index:7; display:flex;
    justify-content:space-between; align-items:baseline; gap:10px;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-readout); color:#e3f6fa;}
  .sc-read b{color:var(--accent); font-weight:700; letter-spacing:.04em;}
  /* bind — the same scope in X-Y (Lissajous) mode: CH1 scroll drives the X axis,
     CH2 animation the Y axis, and the phosphor dot rides the y=x diagonal because
     both coordinates ARE the one real p — a straight diagonal IS the proof scroll
     and animation are bound 1:1 (animation-timeline:scroll()). Shares trigger's CRT
     shell (.sc + .sc-trace + chrome); only the trace geometry, the faint ideal
     guide, and the projection crosshairs are added here. */
  .xy-ideal{position:absolute; inset:0; z-index:2; pointer-events:none;}   /* the unrevealed lock-line, drawn faint as a target */
  .xy-ideal svg{position:absolute; inset:0; width:100%; height:100%;}
  .xy-ideal path{fill:none; stroke:color-mix(in oklab, var(--accent) 26%, transparent);
    stroke-width:1; stroke-dasharray:3 4; vector-effect:non-scaling-stroke;}
  /* projection crosshairs — scroll's X coordinate and animation's Y coordinate drawn
     from their axes to the dot; equal-length by construction because both equal p */
  .xy-vx{position:absolute; bottom:0; width:0; z-index:4;
    border-left:1px dashed color-mix(in oklab, var(--accent) 52%, #fff);}
  .xy-hz{position:absolute; left:0; height:0; z-index:4;
    border-top:1px dashed color-mix(in oklab, var(--accent) 52%, #fff);}
  /* the phosphor beam dot at (p, p) — a glow that breathes (ambient; the global
     reduced-motion kill stops the keyframes) */
  .xy-dot{position:absolute; width:12px; height:12px; margin:-6px 0 0 -6px; z-index:6; border-radius:50%;
    background:#effdff; box-shadow:0 0 6px 1px var(--accent), 0 0 16px 3px color-mix(in oklab, var(--accent) 70%, transparent);
    animation:xy-glow 1.8s ease-in-out infinite;}
  @keyframes xy-glow{0%,100%{box-shadow:0 0 6px 1px var(--accent), 0 0 16px 3px color-mix(in oklab, var(--accent) 70%, transparent);}
    50%{box-shadow:0 0 9px 2px var(--accent), 0 0 26px 5px color-mix(in oklab, var(--accent) 82%, transparent);}}
  /* the binding sentence, riding inside the scope just under the channel tags */
  .xy-note{position:absolute; top:30px; left:0; right:0; z-index:7; text-align:center;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.03em;
    color:color-mix(in oklab, var(--accent) 55%, #cfe8ec);}

  /* cascade — the Forms gallery's TITLE PLATE rendered as a TYPE-SPECIMEN SHEET:
     the same letters audition many real faces (serif/sans/mono + Fraunces
     opsz/wght/slant) and settle, left to right with scroll — the sentence
     performing its own meaning. Matte crop-mark corners + a tracked catalogue
     label make it a print specimen, not a screen; this is the gallery's shared
     vocabulary. Distinct from every glowing/bordered box elsewhere on the page. */
  .cs{position:absolute; inset:0; display:grid; place-items:center; padding:0 7%;}
  .cs-plate{position:relative; padding:clamp(26px,7cqh,62px) clamp(28px,6cqw,74px);
    background:radial-gradient(120% 130% at 50% 38%, color-mix(in oklab, var(--accent) 6%, transparent), transparent 64%);}
  /* four letterpress crop marks — one pseudo paints all eight strips (2 per corner) */
  .cs-plate::before{content:""; position:absolute; inset:-15px; pointer-events:none;
    --m:15px; --t:1.5px; --c:color-mix(in oklab, var(--accent) 78%, #fff);
    background:
      linear-gradient(var(--c),var(--c)) left top,    linear-gradient(var(--c),var(--c)) left top,
      linear-gradient(var(--c),var(--c)) right top,   linear-gradient(var(--c),var(--c)) right top,
      linear-gradient(var(--c),var(--c)) left bottom,  linear-gradient(var(--c),var(--c)) left bottom,
      linear-gradient(var(--c),var(--c)) right bottom, linear-gradient(var(--c),var(--c)) right bottom;
    background-repeat:no-repeat;
    background-size:var(--m) var(--t), var(--t) var(--m), var(--m) var(--t), var(--t) var(--m),
                    var(--m) var(--t), var(--t) var(--m), var(--m) var(--t), var(--t) var(--m);}
  .cs-p{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#f1eef9; text-align:center; line-height:1.16; font-size:var(--type-phrase); margin:0;}
  .cs-p .ln{display:block;}
  .cs-p .cs-c{display:inline-block; white-space:pre; text-align:center; overflow:visible; will-change:transform,opacity;}
  /* catalogue plate-label — static identity (no fabricated metric to drift) */
  .cs-mark{position:absolute; bottom:7.5%; left:0; right:0; text-align:center; z-index:5;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.34em; text-transform:uppercase;
    color:color-mix(in oklab, var(--accent) 60%, #cfe9dc);}

  /* focus — the phrase pulls from blur into sharp focus as you scroll (a focus rack) */
  .fc{position:absolute; inset:0; display:grid; place-items:center; padding:0 10%;}
  .fc-p{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#f1eef9; text-align:center; line-height:1.12; font-size:var(--type-phrase); will-change:filter,opacity,transform;}
  .fc-p .ln{display:block;}

  /* depth — an endless 3D dive through nested window-frames; the nesting punchline */
  .dp{position:absolute; inset:0; overflow:hidden; perspective:600px; perspective-origin:50% 46%;}
  .dp-field{position:absolute; inset:0; transform-style:preserve-3d;}
  .dp-ring{position:absolute; left:50%; top:46%; width:clamp(160px,60cqw,520px); aspect-ratio:3/2; border:2px solid var(--accent); border-radius:16px; box-shadow:0 0 44px -12px var(--accent) inset, 0 0 0 1px rgba(255,255,255,.04);}
  .dp-word{position:absolute; inset:0; display:grid; place-items:center; padding:0 12%; text-align:center; z-index:5; font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-display); line-height:1.08; text-shadow:0 2px 34px rgba(0,0,0,.85);}

  /* snow — a parallax snowfall behind a masthead; an homage to NYT "Snow Fall" */
  .sn{position:absolute; inset:0; overflow:hidden; background:linear-gradient(180deg,#1a2740 0%,#0d1422 58%,#080b13 100%);}
  .sn-flake{position:absolute; top:0; left:0; border-radius:50%; background:#eaf2ff; pointer-events:none;}
  .sn-title{position:absolute; inset:0; display:grid; place-content:center; justify-items:center; text-align:center; z-index:4; padding:0 9%;}
  .sn-title h2{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-masthead); line-height:.94; margin:0; letter-spacing:-.02em; text-shadow:0 4px 44px rgba(0,0,0,.6);}
  .sn-title .sub{margin-top:13px; font-size:var(--type-label); letter-spacing:.22em; text-transform:uppercase; color:#9fb4d6;}

  /* converge — threads weave from the edges into one point as the line resolves */
  .cv{position:absolute; inset:0; overflow:hidden; display:grid; place-items:center;}
  .cv svg{position:absolute; inset:0; width:100%; height:100%;}
  .cv path{fill:none; stroke:var(--accent); stroke-width:1.4; opacity:.5;}
  .cv-word{position:relative; z-index:4; text-align:center; padding:0 11%; font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-display); line-height:1.1; text-shadow:0 2px 30px rgba(0,0,0,.85);}

  /* reticle — a forensic viewfinder pans + zooms to each subject (the Reuters tracking form) */
  .rt{position:absolute; inset:0; overflow:hidden; background:radial-gradient(70% 60% at 50% 40%,#13202e,#0a0f17 76%);}
  .rt-scene{position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px); background-size:46px 46px;}
  .rt-scene::after{content:""; position:absolute; inset:0; background:
      radial-gradient(24% 30% at 28% 62%, rgba(91,75,255,.42), transparent 60%),
      radial-gradient(20% 26% at 70% 36%, rgba(21,184,134,.34), transparent 60%),
      radial-gradient(17% 23% at 53% 72%, rgba(255,91,127,.34), transparent 60%);}
  .rt-box{position:absolute; transform:translate(-50%,-50%); border:2px solid var(--accent); border-radius:4px;
    box-shadow:0 0 0 1px rgba(0,0,0,.45), 0 0 24px -4px var(--accent);}
  .rt-box::before,.rt-box::after{content:""; position:absolute; width:10px; height:10px; border:2px solid #fff;}
  .rt-box::before{top:-2px; left:-2px; border-right:none; border-bottom:none;}
  .rt-box::after{bottom:-2px; right:-2px; border-left:none; border-top:none;}
  .rt-tag{position:absolute; left:50%; bottom:calc(100% + 7px); transform:translateX(-50%); white-space:nowrap;
    font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); color:#eaf2ff;
    background:rgba(8,14,24,.82); border:1px solid rgba(255,255,255,.14); padding:2px 7px; border-radius:4px;}
  .rt-cap{position:absolute; bottom:7%; left:0; right:0; text-align:center; color:#dce8f5; font-size:var(--type-readout); z-index:5; text-shadow:0 1px 12px #000; padding:0 11%;}

  /* scatter — points fly up into a plotted distribution (the data-essay form, à la The Pudding) */
  .sct{position:absolute; inset:0 0 12% 0; padding:10% 11% 0;}
  .sct-plot{position:relative; width:100%; height:100%;}
  .sct-axis{position:absolute; left:0; right:0; bottom:0; height:1px; background:rgba(255,255,255,.2);}
  .sct-dot{position:absolute; bottom:0; width:clamp(6px,1.8cqw,11px); aspect-ratio:1; border-radius:50%; transform:translateX(-50%);}
  .sct-cap{position:absolute; bottom:5%; left:0; right:0; text-align:center; color:#e9e6f5; font-size:var(--type-readout); z-index:5; text-shadow:0 1px 12px #000; padding:0 9%;}

  /* deck — a stack of step-cards; scrolling lifts each off the top to reveal the next */
  .dk{position:absolute; inset:0; display:grid; place-items:center; perspective:1100px;}
  .dk-stack{position:relative; width:clamp(180px,52cqw,360px); aspect-ratio:4/3; transform-style:preserve-3d;}
  .dk-card{position:absolute; inset:0; border-radius:18px; display:grid; place-items:center; text-align:center; padding:0 12%;
    font-family:var(--display); font-weight:600; color:#fff; font-size:var(--type-title); line-height:1.16;
    border:1px solid rgba(255,255,255,.14); box-shadow:0 24px 60px -20px rgba(0,0,0,.75); backface-visibility:hidden;}

  /* epilogue — the gentle release after the whole descent */
  .epilogue{min-height:118vh; display:grid; place-content:center; justify-items:center; text-align:center; padding:0 28px; gap:6px;}
  .epilogue h1{font-size:clamp(34px,6vw,68px); margin-top:14px;}
  .epilogue .lede{max-width:460px; margin:18px auto 0; color:var(--muted); font-size:19px;}
  .epilogue a{margin-top:34px; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); text-decoration:none;}
  .epilogue a:hover{color:var(--ink);}
  .epilogue .rule{width:54px; height:3px; background:var(--ink); border-radius:3px; margin-bottom:8px;}

  @media (max-width:720px){ :root{ --bar:34px; --pad:9px; } }
</style>
</head>
<body>

<section class="hero" id="top">
  <div class="eyebrow">A short explainer</div>
  <h1>How <em>scrollytelling</em> works.</h1>
  <p class="lede">You scroll. The graphic does the rest.</p>
  <div class="scrollhint">Scroll<span class="arrow">↓</span></div>
</section>

<main id="doc"></main>

<noscript>
  <p style="max-width:640px; margin:0 auto; padding:8vh 28px 18vh; text-align:center; color:var(--muted); font-size:18px;">
    This is a scroll-driven explainer — the graphics are built and animated with
    JavaScript as you scroll. Enable JavaScript to walk through how scrollytelling works.
  </p>
</noscript>

<script>
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

/* ── MOTION GRAMMAR (JS side) — the half of the timing authority the painters
   need at runtime. The two curve strings WAAPI uses are READ from the CSS
   :root tokens, so the stylesheet stays their single source — nothing is
   re-typed here. See the :root "MOTION GRAMMAR" block for the CSS half.
   [LAW:one-source-of-truth] ── */
// [LAW:no-silent-failure] [LAW:single-enforcer] the one place the CSS→JS mirror
// is read — so it's the one place that fails loud if a token is missing. An empty
// string here would silently become an invalid WAAPI easing (animation dies, no
// error); a renamed/dropped token must surface as a broken mirror, not dead motion.
// the single guarded reader for any CSS grammar token read back into JS (motion
// curves/durations, and the colour-story families) — one enforcer, so a renamed
// or dropped token breaks loud here instead of degrading silently downstream.
const cssVar = name => { const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  if(!v) throw new Error(`CSS token ${name} is missing — a JS↔CSS grammar mirror is broken.`);
  return v; };
// WAAPI durations are numbers of ms; the CSS token is read through the same
// enforcer, then parsed — an out-of-shape token fails loud, not as NaN timing.
const cssMs = name => { const v=cssVar(name), n=parseFloat(v);
  if(!Number.isFinite(n)) throw new Error(`Motion grammar: CSS token ${name} ("${v}") is not a number of milliseconds.`);
  return n; };
// cssMs's unit-agnostic sibling: same loud-failure contract through the same
// cssVar enforcer, for unitless grammar scalars (the pacing scale's lengths).
const cssNum = name => { const v=cssVar(name), n=parseFloat(v);
  if(!Number.isFinite(n)) throw new Error(`Grammar token ${name} ("${v}") is not a number.`);
  return n; };
const MOTION = {
  ease: { land: cssVar('--ease-land'), fade: cssVar('--ease-fade') }, // WAAPI strings, mirrored from CSS
  ms:   { fade: cssMs('--ms-fade'), pop: cssMs('--ms-pop') },   // WAAPI flourish lengths (ms), mirrored from CSS
  // scroll-scrubbed deceleration: scene progress eases to rest as it completes.
  // JS-only — CSS transitions don't scrub scroll — so it lives here as the exact
  // cubic with no CSS twin to drift. A styling ticket wanting this feel in a CSS
  // transition should add --ease-drift beside this note, never re-derive it.
  drift: t => 1 - Math.pow(1 - t, 3),
};
const easeOut = MOTION.drift;   // the scroll-scrub curve, named once above

/* ── PACING (JS side) — the half the build touches ──
   The tempo scale is authored as :root --tempo-… and --pace tokens (CSS is canonical).
   A scene names its tempo as data (node.tempo); the build resolves it to a
   {len, hold} shape through the guarded cssNum() and sizes the scene from it, so
   a renamed token breaks loud, never silently re-paces the descent. Reading every
   scalar back here is what keeps the scale ONE fact — no JS/CSS twin to drift.
   [LAW:one-source-of-truth]; [LAW:one-type-per-behavior] one shape, many names. */
const PACE = cssNum('--pace');   // global tempo knob, mirrored from CSS
const TEMPO_SCALE = ['flit','pulse','phrase','passage','movement'];   // ascending; the scale's spine
const TEMPO = Object.fromEntries(TEMPO_SCALE.map(name =>
  [name, { len: cssNum(`--tempo-${name}-len`), hold: cssNum(`--tempo-${name}-hold`) }]));
const DEFAULT_TEMPO = 'phrase';   // a scene with no named tempo reads at the default — one idea, shown and read

/* Read-beat — the grammar's compositional invariant: a scene holds its WORDING
   still for an opening beat so the reader can take it in before it animates;
   ambient (non-text) motion may still breathe. The INVARIANT is fixed (wording
   waits); the LENGTH is a per-scene choice from this sanctioned palette, so the
   scenes vary by intent, not by accident. A node names its beat as data; the one
   paint loop turns it into n.w (wording progress) for every painter to draw text
   from, while raw p drives the ambient channel.
   [LAW:dataflow-not-control-flow] (the choice is data on the node)
   [LAW:one-type-per-behavior] (one transform, many values). */
const READBEAT = {
  brisk: 0.08,  // kinetic scenes — barely a breath; the motion is the message
  read:  0.16,  // default — a beat to take the words in before they move
  dwell: 0.26,  // contemplative scenes — let the idea land before anything shifts
};
// wording progress: 0 through the read-beat, then 0→1 across the remainder.
const wordingProgress = (p, node) => { const rb = READBEAT[node.beat] ?? READBEAT.read;
  return clamp((p - rb) / (1 - rb), 0, 1); };
// [LAW:one-source-of-truth] the single JS-side authority for "should decorative
// motion play" — the same OS preference the reduced-motion @media query reads.
// Tracks the live query, so toggling the OS setting mid-read stays in sync.
const motionQuery = matchMedia('(prefers-reduced-motion: reduce)');
let REDUCE_MOTION = motionQuery.matches;
motionQuery.addEventListener('change', e => { REDUCE_MOTION = e.matches; });
function setText(el,t){ if(el.textContent===t) return; el.textContent=t; if(!REDUCE_MOTION) el.animate([{opacity:0},{opacity:1}],{duration:MOTION.ms.fade,easing:MOTION.ease.fade}); }
// steps stop a touch early so the LAST step is fully read during the hold spacer
const stepIdx=(p,len)=>clamp(Math.floor(clamp(p/0.9,0,1)*len),0,len-1);
// weighted variant: each step holds for its authored `dwell` weight rather than an
// equal share, so a scene can let one beat linger longer than the rest (the opener
// front-loads its first, still beat). same early-stop so the last step is read
// during the hold spacer. [LAW:dataflow-not-control-flow] the pacing is data on the steps.
const phaseAt=(w,steps)=>{ const total=steps.reduce((a,s)=>a+s.dwell,0), t=clamp(w/0.92,0,1)*total;
  let acc=0; for(let i=0;i<steps.length;i++){ acc+=steps[i].dwell; if(t<acc) return i; } return steps.length-1; };

/* =====================================================================
   One recursive engine. The page is a TREE of nodes; native CSS sticky
   nests them (an ancestor stays pinned while its descendants pin on top),
   and a fixed HOLD spacer after each node lets its last state be read
   before the next frame covers it. JS only maps each node's own scroll
   progress to its picture via a per-kind painter.
   [LAW:types-are-the-program] depth is the tree's shape
   [LAW:one-type-per-behavior] one node, painted from a registry
   [LAW:no-mode-explosion] a new technique is one registry entry
   [LAW:single-enforcer] one loop paints every node
===================================================================== */
/* ── COLOR STORY (JS side) — the half the painters touch ──
   The accent families are authored as :root --acc-* tokens (CSS is canonical).
   A node names its family as data (node.accent); accentOf resolves it through the
   guarded reader, so a misspelled family breaks loud, never silently degrades.
   PALETTE is the arc in scroll order — the journey's spine — for the one place
   that wants the whole spectrum at once (scatter's decorative cloud).
   [LAW:one-source-of-truth] the hexes live once, in :root. */
const PALETTE=['iris','azure','teal','jade','amber','ember'];
const accentOf = family => cssVar('--acc-'+family);
const ACCENTS = PALETTE.map(accentOf);   // the families' values, arc-ordered

/* ── terminal painter helpers ── the editor needs to highlight the CSS it types
   AND reveal it character-by-character. You can't slice highlighted HTML (the cut
   lands mid-tag), so the source is tokenised ONCE at build into {t,c} segments and
   the per-frame reveal walks those segments. Block-comment state carries across
   lines so a multi-line CSS comment lights as a single comment span.
   [LAW:one-source-of-truth] tokens computed once; the paint loop only reveals.
   [LAW:effects-at-boundaries] pure: lines in, highlighted segments out. */
const tmEsc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// a declaration fragment → prop/value/number/punct segments. `:` flips prop→value;
// `;` flips back, so a multi-declaration line still classes each side correctly.
function tmDecl(frag, segs){
  const re=/(\s+)|([:;{}])|([A-Za-z][A-Za-z-]*)|(\d+[a-z%]*)|(.)/g; let m, afterColon=false;
  while((m=re.exec(frag))){
    if(m[1]) segs.push({t:m[1]});                                   // whitespace — uncoloured
    else if(m[2]){ segs.push({t:m[2],c:'punc'}); afterColon = m[2]===':'; }
    else if(m[3]) segs.push({t:m[3], c: afterColon?'val':'prop'});
    else if(m[4]) segs.push({t:m[4], c:'num'});
    else segs.push({t:m[5]});
  }
}
function tmTokenize(lines){
  let inCom=false;
  return lines.map(line=>{
    const segs=[];
    if(inCom){ const close=line.indexOf('*/');
      if(close<0){ segs.push({t:line,c:'com'}); }
      else { segs.push({t:line.slice(0,close+2),c:'com'}); inCom=false; tmDecl(line.slice(close+2),segs); }
      return segs; }
    const open=line.indexOf('/*');
    if(open<0){ tmDecl(line,segs); return segs; }
    if(open>0) tmDecl(line.slice(0,open),segs);
    const close=line.indexOf('*/',open);
    if(close<0){ segs.push({t:line.slice(open),c:'com'}); inCom=true; }
    else { segs.push({t:line.slice(open,close+2),c:'com'}); tmDecl(line.slice(close+2),segs); }   // suffix after a same-line */ flows through the same parser — no input dropped
    return segs;
  });
}
const tmLen = segs => segs.reduce((a,s)=>a+s.t.length,0);
// reveal the first `take` chars of one tokenised line as highlighted HTML
function tmReveal(segs, take){ let left=take, out='';
  for(const s of segs){ if(left<=0) break;
    const t = s.t.length<=left ? s.t : s.t.slice(0,left); left-=t.length;
    out += s.c ? `<span class="t-${s.c}">${tmEsc(t)}</span>` : tmEsc(t); }
  return out; }

// the cascade title's audition set — three REAL, distinct faces the same letters
// try on (Inter is link-loaded; mono and the system serif are always present), so
// "wearing many faces" is literally true, not a faked effect. [LAW:no-silent-failure]
const CS_FACES=['Inter,system-ui,sans-serif','ui-monospace,Menlo,monospace','"Hoefler Text",Georgia,serif'];

const PAINTERS = {
  "steps-graphic":{
    // a tile is placed by field-percent offset from centre + its own scale, so the
    // live specimen and each static ghost share one coordinate frame and line up exactly.
    place(t,s){ t.style.left=(50+s.x)+'%'; t.style.top=(44+s.y)+'%'; t.style.transform=`translate(-50%,-50%) scale(${s.s})`; },
    build(c,node){
      const ghosts=node.steps.map((s,i)=>`<div class="sg-tile sg-ghost">${i+1}</div>`).join('');
      c.innerHTML=`<div class="sg-grid"></div><div class="sg-field">${ghosts}<div class="sg-tile sg-box">1</div></div><div class="scene-cap"></div><div class="scene-bar"><span></span></div>`;
      const gs=[...c.querySelectorAll('.sg-ghost')]; gs.forEach((g,i)=>this.place(g,node.steps[i].state));
      return {box:c.querySelector('.sg-box'), ghosts:gs, cap:c.querySelector('.scene-cap'), bar:c.querySelector('.scene-bar span')}; },
    paint(p,n){ const s=n.node.steps, i=phaseAt(n.w,s), r=n.ctx;
      // the specimen jumps to step i (CSS eases the move); every step already passed
      // stays on the field as a numbered ghost — visibility is a pure function of i.
      r.box.textContent=i+1; this.place(r.box, s[i].state);
      r.ghosts.forEach((g,gi)=>g.classList.toggle('seen', gi<i));
      setText(r.cap, s[i].cap); r.bar.style.transform=`scaleX(${p})`; }
  },
  runway:{
    // an honest position:sticky demo. The whole sticky MODEL is four fractions of
    // the window's height, defined once here; the flow-ghost, ribbon height, band
    // height and scrollbar thumb all derive from them, so CSS owns only the look.
    // [LAW:one-source-of-truth] one set of numbers, every dimension derived from it.
    build(c){ const S0=0.46, SH=0.16, R=2.4, pinEnd=1.05, maxScroll=R-1;
      // ribbon-space rows (top%,width%) read as a page of prose, skipping the band
      // around the sticky's flow slot. fixed widths — deterministic, no randomness.
      const rows=[[6,74],[10.5,60],[15,68],[30,72],[34.5,58],[39,66],[43.5,70],[48,55],
        [52.5,69],[57,62],[61.5,73],[66,59],[70.5,67],[75,64],[79.5,71],[84,57],[88.5,68],[93,61]];
      c.innerHTML=`<div class="rw"><div class="rw-win">`
        +`<div class="rw-page">${rows.map(([t,w])=>`<i class="rw-row" style="top:${t}%;width:${w}%"></i>`).join('')}</div>`
        +`<div class="rw-datum"></div>`
        +`<div class="rw-sticky"><span class="rw-tag">sticky</span><span class="rw-top"></span></div>`
        +`<div class="rw-bar"><i class="rw-thumb"></i></div>`
        +`</div></div><div class="scene-cap"></div>`;
      const page=c.querySelector('.rw-page'), sticky=c.querySelector('.rw-sticky'), thumb=c.querySelector('.rw-thumb');
      page.style.height=(R*100)+'%';
      sticky.style.height=(SH*100)+'%';
      thumb.style.height=(1/R*100)+'%';
      return {win:c.querySelector('.rw-win'), page, sticky, top:c.querySelector('.rw-top'),
        datum:c.querySelector('.rw-datum'), thumb, cap:c.querySelector('.scene-cap'),
        S0, SH, R, pinEnd, maxScroll}; },
    paint(p,n){ const r=n.ctx, scroll=p*r.maxScroll;
      // raw p (a live readout of the scroll position), not n.w — see read-beat SCOPE note
      r.page.style.transform=`translateY(${-(scroll/r.R)*100}%)`;
      r.thumb.style.top=(scroll/r.R*100)+'%';
      // the sticky model, three phases as a pure function of scroll — no branch on
      // "which frame": the phase is just which arm of topFrac the value lands in.
      const topFrac = scroll<r.S0 ? r.S0-scroll : scroll<=r.pinEnd ? 0 : r.pinEnd-scroll;
      r.sticky.style.top=(topFrac*100)+'%';
      const pinned = topFrac===0, phase = scroll<r.S0?'pre':pinned?'pin':'post';
      // live offset readout, measured from the window's real height — honest, not a constant
      setText(r.top, 'top: '+Math.round(topFrac*r.win.clientHeight)+'px');
      // paint writes state only — the lock-flash is a CSS keyframe keyed off .engaged
      // (fires on class-add), reduced-motion handled by the single CSS motion-kill.
      r.datum.classList.toggle('engaged', pinned);
      setText(r.cap, phase==='pre'?"in flow — rising with the page"
        : phase==='pin'?"pinned — stuck at top: 0" : "released — scrolling away with its section"); }
  },
  "frame-sequence":{
    build(c){ c.innerHTML=`<div class="fs"><canvas aria-hidden="true"></canvas></div><div class="scene-cap"></div>`;
      const cv=c.querySelector('canvas');
      return {cv, x:cv.getContext('2d'), w:0, h:0, cap:c.querySelector('.scene-cap')}; },
    paint(p,n){ const cv=n.ctx.cv, d=window.devicePixelRatio||1, x=n.ctx.x;
      const W=Math.round(cv.clientWidth*d), H=Math.round(cv.clientHeight*d);
      // [LAW:state] backing store is a derived cache — reallocate only when its source (client size × dpr) changes
      if(W!==n.ctx.w || H!==n.ctx.h){ cv.width=W; cv.height=H; n.ctx.w=W; n.ctx.h=H; }
      x.clearRect(0,0,W,H);
      const cols=["#5b4bff","#7c5bff","#9b6bff","#ff5b7f","#15b886"], sep=Math.sin(p*Math.PI)*H*0.08;
      x.save(); x.translate(W/2,H/2); x.rotate((p-.5)*0.5);
      for(let i=0;i<5;i++){ const cy=(i-2)*(H*0.045+sep), w=W*0.5, h=H*0.085;
        x.fillStyle=cols[i]; x.globalAlpha=.92; x.fillRect(-w/2,cy-h/2,w,h); }   // [LAW:simplicity] plain rects — no roundRect dependency to shim or throw
      x.restore(); setText(n.ctx.cap, p<.5?"pre-rendered frames…":"…scrubbed by your scroll."); }
  },
  horizontal:{
    build(c,node){ c.innerHTML=`<div class="hz"><div class="hz-strip">${node.panels.map(pn=>`<div class="hz-panel"><div class="yr">${pn.yr}</div><h3>${pn.t}</h3><p>${pn.d}</p></div>`).join('')}</div></div>`;
      return {strip:c.querySelector('.hz-strip')}; },
    paint(p,n){ const s=n.ctx.strip, dist=Math.max(0, s.scrollWidth - s.parentElement.clientWidth + 40); s.style.transform=`translateX(${-p*dist}px)`; }

  chart:{
