  },
  // characters rise + fade into place, left to right, paced by scroll
  cascade:{
    // glyph structure is markup, but each character is set as textContent — the
    // data is display text, so authored copy renders verbatim (a literal < or &
    // can never become markup). white-space:pre on .cs-c preserves the spaces.
    // Each glyph AUDITIONS many faces and settles: it morphs from a per-index-
    // seeded wild face (a real other family + a Fraunces opsz/wght/slant cut)
    // toward the house engraved face, left to right as the scroll front (e)
    // sweeps past — "the same idea, wearing many faces" performing its meaning.
    build(c,node){ c.innerHTML=`<div class="cs"><div class="cs-plate"><div class="cs-p"></div></div><div class="cs-mark">specimen · the forms</div></div>`;
      const wrap=c.querySelector('.cs-p'), chs=[], ctx={chs, count:0, locked:false};
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln';
        for(const ch of line){ const g=document.createElement('span'); g.className='cs-c'; g.textContent=ch; ln.append(g); chs.push(g); }
        wrap.append(ln); });
      ctx.count=chs.length;
      // Lock each cell to its SETTLED (house-face) width once Fraunces is active —
      // measured with all face overrides cleared, batch read then batch write — so
      // the audition's family/axis swaps restyle in place and never reflow the
      // centred line. Mirrors how `draw` lazily reads getTotalLength once it exists.
      // [LAW:no-ambient-temporal-coupling] the width owner is fonts.ready, named.
      document.fonts.ready.then(()=>{ chs.forEach(el=>{ el.style.width=''; el.style.fontFamily=''; el.style.letterSpacing=''; el.style.fontVariationSettings=''; });
        const ws=chs.map(el=>el.offsetWidth); chs.forEach((el,i)=>{ el.style.width=ws[i]+'px'; }); ctx.locked=true; });
      return ctx; },
    paint(p,n){ const chs=n.ctx.chs, N=n.ctx.count, e=clamp(n.w/0.85,0,1)*N;
      chs.forEach((el,i)=>{ const o=easeOut(clamp(e-i,0,1));   // settle progress as the front sweeps past char i
        // calm reveal — the only motion — when reduced-motion is asked for, or before
        // widths are locked (face swaps would jitter the centred line until then).
        if(REDUCE_MOTION || !n.ctx.locked){ el.style.opacity=o; el.style.transform=''; el.style.fontFamily=''; el.style.fontVariationSettings=''; el.style.letterSpacing=''; return; }
        const a=1-o;                                            // audition amount: 1 wild → 0 settled
        const fam=CS_FACES[(i+Math.floor(a*CS_FACES.length))%CS_FACES.length];   // steps through real families as it settles
        const opsz=lerp(144,12,a*((i*7)%5/4*0.6+0.4));          // dip toward a spindly text-cut, depth varied per glyph
        const wght=lerp(600,400,a), slnt=lerp(0,(i%2?-9:9),a), trk=lerp(0,0.16,a);

  },
  // the phrase pulls from blur into sharp focus — a focus rack on the words
  // a true camera rack-focus on the section title: the lens hunts from the near
  // plane to the far one, so each line resolves on its OWN slice — out of focus it
  // wears the lens's chromatic fringe (RGB channel split), which converges to a
  // crisp word as it snaps sharp. The movement's through-the-lens signature; the
  // colour-split is worn by no other painter.
  focus:{
    build(c,node){ c.innerHTML=`<div class="fc"><div class="fc-p"></div></div>`;
      const wrap=c.querySelector('.fc-p');
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln'; ln.textContent=line; wrap.append(ln); });
      const lns=[...wrap.querySelectorAll('.ln')];
      // [LAW:dataflow-not-control-flow] the stagger is a value derived from the line
      // count, not a branch: focusDur is each line's pull length, and the per-line
      // start spreads the remainder so the LAST line lands exactly at n.w=1.
      const N=lns.length, focusDur=0.62, stagger=N>1?(1-focusDur)/(N-1):0;

    paint(p,n){ const {wrap,lns,focusDur,stagger}=n.ctx;

      // [LAW:effects-at-boundaries] REDUCE_MOTION is read live each frame: the

  },
  // an endless dive: nested window-frames recede into 3D depth and recycle, so

  depth:{
    build(c,node){ const rings=12, step=200;

      const word=c.querySelector('.dp-word'); word.textContent=node.word||'';

    paint(p,n){ const {rings,span,step}=n.ctx;
      rings.forEach((el,i)=>{ const z=-span + ((i*step + p*span) % span), d=-z;   // z: -span..0, ring nears the camera as p grows, then recycles to the back

  // parallax snowfall behind a masthead — the NYT "Snow Fall" reference, in motion,
  // shot with a shallow depth of field: three depth planes, the nearest defocused
  // into drifting bokeh. Closer planes drift FASTER and sway WIDER (optical parallax).
  snow:{
    build(c,node){ const N=52, flakes=Array.from({length:N},(_,i)=>{
        const bok=i%5===0, far=!bok && i%2===0;                                   // ~1 in 5 is a foreground bokeh disc; the rest split far/mid

        const op   = bok? 0.16+(i%4)*0.05 : far? 0.34+(i%3)*0.06 : 0.7+(i%3)*0.09;
        const speed= bok? 72+(i%4)*11 : far? 26+(i%4)*5 : 46+(i%4)*7;             // nearer plane → faster apparent fall
        const amp  = bok? 16+(i%5)*3 : far? 3+(i%3) : 5+(i%4)*1.2;                // nearer plane → wider sway
        return {x:(i*61)%100, by:(i*37)%100, size, op, speed, amp, ph:i*0.7, bok}; });
      c.innerHTML=`<div class="sn"><div class="sn-vig"></div>${flakes.map(f=>`<i class="sn-flake${f.bok?' sn-bokeh':''}" style="left:${f.x}%;width:${f.size.toFixed(1)}px;height:${f.size.toFixed(1)}px;${f.bok?'':`opacity:${f.op.toFixed(2)}`}"></i>`).join('')}<div class="sn-title"><h2></h2><div class="sub"></div></div></div>`;

      c.querySelector('.sn-title .sub').textContent=node.sub||'';

    paint(p,n){ const mo=REDUCE_MOTION?0.4:1;                                     // [LAW:no-ambient-temporal-coupling] calm decorative sway under reduced-motion
      n.ctx.els.forEach((el,i)=>{ const f=n.ctx.flakes[i];
        const y=((f.by + p*f.speed) % 124) - 12;                                  // %-of-container fall, wraps for an endless field
        const sway=Math.sin(p*3 + f.ph)*f.amp*mo;
        if(f.bok){ const br=1 + Math.sin(p*2.1 + f.ph)*0.12*mo;                   // a defocused highlight breathing as it drifts across the lens
          el.style.transform=`translate(${sway}px, ${y}cqh) scale(${br.toFixed(3)})`;
          el.style.opacity=(f.op*(0.8+0.2*br)).toFixed(3); }
        else el.style.transform=`translate(${sway}px, ${y}cqh)`; });
      const sharp=clamp((n.w-0.05)/0.4,0,1);
      n.ctx.title.style.opacity=sharp;
      n.ctx.title.style.transform=`scale(${lerp(0.985,1,sharp).toFixed(4)})`; }  // the masthead settles onto the focal plane as it resolves
  },
  // threads weave from the edges into a single point as the closing line resolves
  // THE CLOSE — a mechanical iris stops down out of the descent. The lens that ran
  // through the whole piece (focus rack, snow bokeh, zoom loupe, depth dive) coming
  // to rest: N faceted blades sweep the field inward to a single faceted opening,
  // the focal core concentrates, and the last line resolves sharp at the focus.
  // Pure geometry recomputed each frame from p — same ops, variability in the values
  // (opening radius, turn) [LAW:dataflow-not-control-flow] — so it is reduced-motion-
  // safe by construction; only the mechanical turn is gated (mo), like the reticle.
  // No length read, no dash-draw: the blades TILE the annulus between the opening
  // N-gon and the housing, so the opening is simply the untiled hole. [LAW:no-ambient-temporal-coupling]
  converge:{
    build(c,node){ const N=9, cx=50, cy=50, R=82;
      // each blade carries a fixed facet shimmer keyed to its index; it turns with
      // the blade, so the lighting on a leaf is consistent as the iris rotates.
      const blades=Array.from({length:N},(_,i)=>{ const lit=(5+8*(0.5+0.5*Math.cos(i/N*Math.PI*2))).toFixed(1);
        return `<path class="iz-blade" style="fill:color-mix(in oklab, var(--accent) ${lit}%, #090c13)" d=""/>`; }).join('');
      c.innerHTML=`<div class="iz">
        <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
          <defs><radialGradient id="izg" cx="50%" cy="50%" r="50%">
            <stop class="iz-s0" offset="0%"/><stop class="iz-s1" offset="40%"/><stop class="iz-s2" offset="100%"/>
          </radialGradient></defs>
          <rect class="iz-back" x="-50" y="-50" width="200" height="200"/>
          <circle class="iz-core" cx="50" cy="50" r="60" fill="url(#izg)"/>
          <g class="iz-blades">${blades}</g>
          <polygon class="iz-rim" points=""/>
        </svg><div class="iz-word"></div></div>`;
      const word=c.querySelector('.iz-word'); word.textContent=node.word||'';
      return {N, cx, cy, R, blades:[...c.querySelectorAll('.iz-blade')],
        rim:c.querySelector('.iz-rim'), core:c.querySelector('.iz-core'), word}; },
    paint(p,n){ const c=n.ctx, N=c.N, cx=c.cx, cy=c.cy, R=c.R, step=Math.PI*2/N, mo=REDUCE_MOTION?0:1;
      const t=clamp(p/0.9,0,1), e=t*t*(3-2*t);         // smoothstep seat — spreads the blade travel across the whole close, not front-loaded
      const rv=lerp(74,21,e);                          // opening circumradius: wide-open → stopped-down
      const base=-step*0.5*(1-e)*mo;                   // a half-blade mechanical turn as it seats (motion-gated)
      const pt=(rad,a)=>`${(cx+Math.cos(a)*rad).toFixed(2)},${(cy+Math.sin(a)*rad).toFixed(2)}`;
      const ang=i=>base+i*step;
      // tile the annulus: blade i spans opening edge V_i→V_i+1 out to the housing R
      for(let i=0;i<N;i++){ const a0=ang(i), a1=ang(i+1);
        c.blades[i].setAttribute('d',`M${pt(rv,a0)} L${pt(rv,a1)} L${pt(R,a1)} L${pt(R,a0)} Z`); }
      c.rim.setAttribute('points', Array.from({length:N},(_,i)=>pt(rv,ang(i))).join(' '));
      c.core.style.opacity=lerp(0.30,1,e).toFixed(3);
      c.core.setAttribute('r', lerp(60,30,e).toFixed(1));
      const reveal=clamp((n.w-0.5)/0.4,0,1);           // the line animates in → draw from n.w, not raw p
      c.word.style.opacity=reveal.toFixed(3);
      c.word.style.filter=`blur(${lerp(7,0,reveal).toFixed(2)}px)`;
      c.word.style.transform=`scale(${lerp(1.05,1,reveal).toFixed(3)})`; }
  },
  // a Reuters forensic tracking INSTRUMENT: a reconstruction plate read by a target
  // reticle that snap-locks onto each evidence marker, measures the baseline between
  // them, and runs live telemetry. The finished form the napkin-sketch viewfinder implied.
  reticle:{
    build(c,node){ const s=node.subjects, N=s.length;
      // perspective reconstruction ground plane — verticals fan from a vanishing
      // point near the horizon; horizontals are perspective-spaced and narrow toward it.
      const VPx=50, VPy=27, fY=99;
      const verts=Array.from({length:11},(_,k)=>{ const bx=50+(k-5)*8.8; return `M${VPx},${VPy} L${bx.toFixed(1)},${fY}`; });
      const hors=Array.from({length:7},(_,k)=>{ const t=(k+1)/8, y=VPy+(fY-VPy)*t*t, hw=lerp(9,44,t); return `M${(50-hw).toFixed(1)},${y.toFixed(1)} L${(50+hw).toFixed(1)},${y.toFixed(1)}`; });
      const ground=[...verts,...hors].map(d=>`<path class="rt-ground" d="${d}"/>`).join('');
      const basePts=s.map(o=>`${o.x},${o.y}`).join(' ');
      const marks=s.map(o=>`<div class="rt-mark" style="left:${o.x}%;top:${o.y}%">${o.id}</div>`).join('');
      // distance annotation per baseline segment: %-space length scaled to metres,
      // placed at the segment midpoint, revealed as the reticle crosses it.
      const dseg=s.slice(0,-1).map((o,k)=>{ const q=s[k+1];
        return {mx:(o.x+q.x)/2, my:(o.y+q.y)/2, m:Math.round(Math.hypot(q.x-o.x,q.y-o.y)*0.9), at:k/(N-1)}; });
      const distHtml=dseg.map(d=>`<div class="rt-dist" style="left:${d.mx}%;top:${d.my}%">${d.m} M</div>`).join('');
      c.innerHTML=`<div class="rt">
        <div class="rt-scene"><svg viewBox="0 0 100 100" preserveAspectRatio="none">
          ${ground}<line class="rt-horizon" x1="0" y1="${VPy}" x2="100" y2="${VPy}"/>
          <polyline class="rt-base" points="${basePts}"/><polyline class="rt-base-lit" points="${basePts}"/></svg></div>
        <div class="rt-grain"></div><div class="rt-scan"></div>
        ${marks}${distHtml}
        <div class="rt-box"><div class="rt-ping"></div>
          <div class="rt-cnr tl"></div><div class="rt-cnr tr"></div><div class="rt-cnr bl"></div><div class="rt-cnr br"></div>
          <div class="rt-cross"></div><div class="rt-tag"></div><div class="rt-mag"></div></div>
        <div class="rt-hud">
          <div class="rt-tl"><span class="rt-rec"><i></i>rec</span><span class="rt-tc"></span></div>
          <div class="rt-tr"><span class="rt-id">Reuters · visual forensics</span><span class="rt-frame"></span></div>
          <div class="rt-bl"><span class="rt-status"></span><span class="rt-bear"></span></div>
          <div class="rt-br"><span class="rt-geo"></span><span>recon · track</span></div></div>
        <div class="rt-vig"></div><div class="rt-cap"></div></div>`;
      const q=sel=>c.querySelector(sel);
      // baseline length in viewBox units, summed from the points — no getTotalLength,
      // which throws on the not-yet-rendered SVG. [LAW:no-ambient-temporal-coupling]
      let litLen=0; for(let k=0;k<N-1;k++) litLen+=Math.hypot(s[k+1].x-s[k].x, s[k+1].y-s[k].y);
      const lit=q('.rt-base-lit'); lit.style.strokeDasharray=litLen; lit.style.strokeDashoffset=litLen;
      const corners=[['tl',-1,-1],['tr',1,-1],['bl',-1,1],['br',1,1]].map(([cls,dx,dy])=>({el:q('.rt-cnr.'+cls),dx,dy}));
      const dists=[...c.querySelectorAll('.rt-dist')].map((el,k)=>({el, at:dseg[k].at}));
      return {subs:s, box:q('.rt-box'), ping:q('.rt-ping'), cross:q('.rt-cross'), corners, dists, lit, litLen,
        tag:q('.rt-tag'), mag:q('.rt-mag'), tc:q('.rt-tc'), frame:q('.rt-frame'), rec:q('.rt-rec i'),
        status:q('.rt-status'), bear:q('.rt-bear'), geo:q('.rt-geo'), cap:q('.rt-cap'), lockedIdx:-1}; },
    paint(p,n){ const c=n.ctx, s=c.subs, N=s.length;
      const f=clamp(n.w/0.92,0,1)*(N-1), i=Math.floor(f), frac=f-i, j=Math.min(i+1,N-1);
      const e=frac<.5?2*frac*frac:1-Math.pow(-2*frac+2,2)/2;                        // ease the glide between subjects
      const a=s[i], b=s[j], box=c.box, mo=REDUCE_MOTION?0:1;
      const bw=lerp(a.w,b.w,e), bh=lerp(a.h,b.h,e);
      const lock=1-4*frac*(1-frac);                                                // 1 parked on a subject, 0 mid-travel
      const jit=(1-lock)*1.8*mo, jx=Math.sin(p*47)*jit, jy=Math.cos(p*39)*jit;     // the instrument hunts while unlocked
      box.style.left=`calc(${lerp(a.x,b.x,e)}% + ${jx.toFixed(2)}px)`;
      box.style.top=`calc(${lerp(a.y,b.y,e)}% + ${jy.toFixed(2)}px)`;
      box.style.width=bw+'%'; box.style.height=bh+'%';
      const gap=(1-lock)*9;                                                         // brackets drive inward as lock tightens
      c.corners.forEach(k=>{ k.el.style.transform=`translate(${(k.dx*gap).toFixed(1)}px,${(k.dy*gap).toFixed(1)}px)`; });
      c.cross.style.opacity=(0.14+0.86*lock).toFixed(3);
      box.style.filter=`drop-shadow(0 0 ${(2+10*lock).toFixed(1)}px color-mix(in oklab, var(--accent) ${Math.round(38+42*lock)}%, transparent))`;
      const travel=N>1?(i+e)/(N-1):1;                                              // the measured baseline grows behind the reticle

      c.dists.forEach(d=>{ d.el.style.opacity=clamp((travel-d.at-0.05)/0.12,0,1).toFixed(3); });
      const cur=e<.5?a:b;                                                          // live telemetry — all pure functions of scroll position
      const TF=144, tc=Math.floor(p*TF), pad2=x=>String(x).padStart(2,'0');        // ~6s of footage at 24fps
      c.tc.textContent=`00:00:${pad2(Math.floor(tc/24))}:${pad2(tc%24)}`;          // high-frequency → direct textContent (no setText fade flicker)
      c.frame.textContent=`frm ${String(Math.min(tc+1,TF)).padStart(4,'0')}/${TF}`;
      c.mag.textContent=`×${Math.sqrt(10000/Math.max(bw*bh,1)).toFixed(1)}`;
      c.rec.style.opacity=(REDUCE_MOTION?1:(Math.sin(p*60)>0?1:0.32)).toFixed(2);   // scroll-driven REC blink — no ambient timer
      setText(c.tag, `${cur.id} · ${cur.t}`);
      setText(c.status, lock>0.55?'● locked':'○ tracking');
      setText(c.bear, `brg ${cur.bear}`); setText(c.geo, cur.geo); setText(c.cap, cur.cap||'');
      const nearest=e<.5?i:j;                                                       // acquire ping on each fresh lock (decorative; motion-gated)
      if(lock>0.6 && nearest!==c.lockedIdx){ c.lockedIdx=nearest;
        if(!REDUCE_MOTION) c.ping.animate([{transform:'scale(.7)',opacity:.9},{transform:'scale(1.35)',opacity:0}],{duration:MOTION.ms.pop,easing:MOTION.ease.land}); }
      else if(lock<0.4) c.lockedIdx=-1; }
  },
  // points fly up into a plotted distribution, swept left to right — a data essay
  // A PUDDING DATA ESSAY — a titled, annotated chart that constructs itself on
  // scroll. Two colour-coded series model the form's own thesis: how far readers
  // get. Each series is generated from ONE model function; the trend curve is
  // sampled from that same function and the "≈N×" callout is computed from it —
  // dots, line, and annotation can never drift apart. [LAW:one-source-of-truth]
  // The four acts (axes wipe → dots sweep → trends draw → callout resolves) are
  // pure sub-progressions of scroll p — same ops every frame, variability in the
  // values [LAW:dataflow-not-control-flow] — which is also why it needs no motion
  // flourish to gate: it is reduced-motion-safe by construction.
  scatter:{
    build(c,node){
      // y(x) = share of readers still reading at scroll depth x%. Cool series falls
      // off a cliff; warm (scrollytelling) holds. Deterministic jitter (sin of the
      // index) makes observations scatter around the model without any RNG.
      const SERIES=[
        {key:'scrollytelling', k:accentOf('ember'), f:x=>94 - 0.30*x + 5.5*Math.sin(x/14)},
        {key:'static article', k:accentOf('azure'), f:x=>91 - 0.80*x + 4.5*Math.sin(x/11)},
      ];
      const XS=Array.from({length:22},(_,i)=>5 + i*(90/21));                        // x 5..95
      const yv=v=>100-clamp(v,2,99);                                                // model %→ svg-y (top-down)
      const dots=[]; SERIES.forEach((s,si)=>XS.forEach((x,i)=>
        dots.push({x, y:clamp(s.f(x)+6*Math.sin(i*2.3+si*1.1), 3, 98), c:s.k, s:si})));
      // HOT point: the scrollytelling observation deepest into the scroll — the one
      // the callout brackets. The "≈N×" ratio is the model's gap there, not a literal.
      const hot=dots.filter(d=>d.s===0).reduce((a,b)=>b.x>a.x?b:a);
      const ratio=(SERIES[0].f(hot.x)/SERIES[1].f(hot.x)).toFixed(1);
      // trend points per series: the model sampled densely (the LINE is the model,
      // the DOTS are observations). Stored as geometry, not a path string — paint
      // grows the polyline point-by-point, so the draw-on needs no getTotalLength()
      // and no dash math (which mis-renders under preserveAspectRatio=none).
      const trendPts=SERIES.map(s=>Array.from({length:46},(_,i)=>{const x=i*(100/45); return {x, y:yv(s.f(x))};}));
      const GRID=[0,25,50,75,100];
      c.innerHTML=
        `<div class="sct">`
        +`<div><div class="sct-kicker">The Pudding · data essay</div>`
        +`<div class="sct-title">How far readers actually get</div>`
        +`<div class="sct-dek">Share still reading, by scroll depth — the form charting itself.</div></div>`
        +`<div class="sct-legend">${SERIES.map(s=>`<span class="sct-key" style="--k:${s.k}"><i></i>${s.key}</span>`).join('')}</div>`
        +`<div class="sct-grid">`
          +`<div class="sct-yax">${[100,50,0].map(v=>`<span class="sct-tick">${v}%</span>`).join('')}</div>`
          +`<div class="sct-plot">`
            +`<svg class="sct-svg" viewBox="0 0 100 100" preserveAspectRatio="none">`
              +`<g class="sct-gridg">`
              +GRID.map(v=>`<line class="sct-grid-l" x1="0" y1="${yv(v)}" x2="100" y2="${yv(v)}"/>`).join('')
              +GRID.slice(1).map(v=>`<line class="sct-grid-l" x1="${v}" y1="0" x2="${v}" y2="100"/>`).join('')
              +`</g>`
              +`<line class="sct-axis-l sct-axY" x1="0" y1="100" x2="0" y2="100"/>`
              +`<line class="sct-axis-l sct-axX" x1="0" y1="100" x2="0" y2="100"/>`
              +SERIES.map(s=>`<path class="sct-trend" style="--k:${s.k}" d=""/>`).join('')
              +`<line class="sct-leader" x1="92" y1="14" x2="92" y2="14"/>`
            +`</svg>`
            +`<div class="sct-dots">${dots.map(d=>`<i class="sct-dot" style="left:${d.x.toFixed(2)}%;bottom:${d.y.toFixed(2)}%;background:${d.c}"></i>`).join('')}</div>`
            +`<div class="sct-ann">Scrollytelling holds <b>≈${ratio}×</b> as many readers this deep.</div>`
          +`</div>`
          +`<div class="sct-xax">${[0,50,100].map(v=>`<span class="sct-tick">${v}%</span>`).join('')}</div>`
        +`</div>`
        +`<div class="sct-cap"></div></div>`;
      const dotEls=[...c.querySelectorAll('.sct-dot')];
      const hotEl=dotEls[dots.indexOf(hot)];
      c.querySelector('.sct-cap').textContent=node.lab||'';
      // hot point in svg coords (dots sit at bottom:y%, so svg-y is top-down 100-y)
      const hotSvg={x:hot.x, y:100-hot.y};
      return {dotEls, dots, trendPts, hotSvg,
        gridg:c.querySelector('.sct-gridg'),
        axY:c.querySelector('.sct-axY'), axX:c.querySelector('.sct-axX'),
        trends:[...c.querySelectorAll('.sct-trend')],
        leader:c.querySelector('.sct-leader'), legend:c.querySelector('.sct-legend'),
        ann:c.querySelector('.sct-ann'), hotEl, hk:accentOf('ember')}; },
    // grow a polyline through `pts` to fraction `f`∈[0,1], interpolating the partial
    // last segment so the head advances smoothly. A pure geometry build — no length
    // read, aspect-independent. [LAW:effects-at-boundaries] paint touches no layout.
    _grow(pts,f){ if(f<=0) return ''; const segs=pts.length-1, pos=clamp(f,0,1)*segs, full=Math.floor(pos), t=pos-full;
      let d='M '+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2);
      for(let i=1;i<=full && i<pts.length;i++) d+=' L '+pts[i].x.toFixed(2)+' '+pts[i].y.toFixed(2);
      if(full<segs && t>0){ const a=pts[full], b=pts[full+1];
        d+=' L '+(a.x+(b.x-a.x)*t).toFixed(2)+' '+(a.y+(b.y-a.y)*t).toFixed(2); }
      return d; },
    paint(p,n){ const x=n.ctx, G=PAINTERS.scatter._grow;
      // ACT 1 — axes wipe out from the origin; gridlines fade up behind them.
      const axe=easeOut(clamp(p/0.16,0,1)), trd=easeOut(clamp((p-0.5)/0.24,0,1)), ann=easeOut(clamp((p-0.76)/0.24,0,1));
      x.axX.setAttribute('x2',(axe*100).toFixed(2)); x.axY.setAttribute('y2',(100-axe*100).toFixed(2));
      x.gridg.style.opacity=axe.toFixed(3);
      x.legend.style.opacity=clamp((p-0.12)/0.12,0,1).toFixed(3);
      // ACT 2 — dots sweep up into place, staggered by x so the cloud assembles L→R.
      x.dotEls.forEach((el,i)=>{ const d=x.dots[i];
        const e=easeOut(clamp((p - 0.12 - (d.x/100)*0.34)/0.18,0,1));
        el.style.opacity=e.toFixed(3);
        el.style.transform=`translate(-50%,calc(50% + ${((1-e)*16).toFixed(1)}px)) scale(${(0.45+0.55*e).toFixed(3)})`; });
      // ACT 3 — trend curve draws through each series, point by point.
      x.trends.forEach((t,i)=>t.setAttribute('d',G(x.trendPts[i],trd)));
      // ACT 4 — leader extends from the callout to the bracketed observation, the
      // label fades up, and that observation lights a ring.
      x.leader.setAttribute('x2',(92+(x.hotSvg.x-92)*ann).toFixed(2));
      x.leader.setAttribute('y2',(14+(x.hotSvg.y-14)*ann).toFixed(2));
      x.ann.style.opacity=ann.toFixed(3);
      x.ann.style.transform=`translateY(${((1-ann)*8).toFixed(1)}px)`;
      x.hotEl.style.boxShadow=`0 0 0 ${(ann*3.2).toFixed(2)}px color-mix(in oklab,${x.hk} 42%,transparent)`; }
  },
  // a stack of letterpress specimen cards; each plate scrolls off the top to reveal
  // the next, the last landing as the terminal state. Each plate wears a different
  // real face (grotesque/mono/serif) — the movement's thesis, made physical.
  deck:{
    build(c,node){ const cards=node.cards, N=cards.length;
      c.innerHTML=`<div class="dk"><div class="dk-stack">${cards.map((cd,i)=>{
        const f=DK_FACES[cd.face];                                                  // fail loud if a card names an unknown face
        const idx=String(i+1).padStart(2,'0'), tot=String(N).padStart(2,'0');
        return `<div class="dk-card"><div class="dk-lab">plate ${idx}/${tot} · ${f.label}</div><div class="dk-t"></div></div>`;
      }).join('')}</div></div>`;
      const els=[...c.querySelectorAll('.dk-card')], ts=[...c.querySelectorAll('.dk-t')];
      // set copy + face in JS: textContent keeps copy verbatim (never markup), and the
      // family string (a serif stack carries quotes) sets cleanly off the HTML attribute.
      ts.forEach((el,i)=>{ el.textContent=cards[i].t; el.style.fontFamily=DK_FACES[cards[i].face].fam; });
      return {els}; },
    paint(p,n){ const els=n.ctx.els, N=els.length, f=clamp(n.w/0.92,0,1)*(N-1);     // (N-1) so the last card lands as the terminal state, not flung past
      els.forEach((el,i)=>{ const d=i-f;                                           // d<0: flung off the top; d>=0: still in the stack
        if(d<=-1){ el.style.opacity=0; el.style.transform='translateY(-130%) rotateX(45deg)'; el.style.zIndex='0'; return; }
        el.style.zIndex=String(100-i);
        if(d<0){ el.style.opacity=clamp(1+d,0,1); el.style.transform=`translateY(${d*120}%) rotateX(${-d*45}deg) scale(${1+d*0.06})`; }
        else { el.style.opacity=clamp(1-d*0.32,0,1); el.style.transform=`translateY(${-d*5}%) translateZ(${-d*55}px) scale(${1-d*0.05})`; } }); }
  },
};

/* ---- build the tree; register every node for the single paint loop ---- */
const doc=document.getElementById('doc');
const nodes=[];
function buildNode(node, frameDepth){
  const lvl=document.createElement('section'); lvl.className='lvl'+(node.framed?' framed':''); lvl.style.setProperty('--d', frameDepth);
  const frame=document.createElement('div'); frame.className='frame';
  const inner=document.createElement('div'); inner.className='inner';
  // [LAW:dataflow-not-control-flow] the accent is authored data on the node — the
  // colour journey is the sequence of families the tree names, not a side effect
  // of build order. [LAW:no-silent-failure] a node with no accent (or a misspelled
  // family, via accentOf) breaks the build loud, so the arc can't silently gap.
  if(!node.accent) throw new Error(`Node "${node.t}" names no accent — every node must pick one of: ${PALETTE.join(', ')}`);
  inner.style.setProperty('--accent', accentOf(node.accent));
  const bar=document.createElement('div'); bar.className='bar';
  bar.innerHTML=`<span class="dot"></span><span class="ttl">${node.t}</span><span class="barfill"></span>`;
  const content=document.createElement('div'); content.className='content';
  inner.append(bar, content); frame.append(inner); lvl.append(frame);

  const painter=PAINTERS[node.kind];
  // [LAW:errors] fail loud and self-describing if a node names a painter the
  // registry lacks — a typo localises to itself, not a cryptic later crash.
  if(!painter) throw new Error(`Unknown painter kind "${node.kind}" on node "${node.t}"`);
  // [LAW:no-silent-failure] same guard for the read-beat: an undefined beat is the
  // authorised default (handled in wordingProgress), but a MISSPELLED one would
  // silently fall back to 'read' and the scene's timing would lie with no signal.
  if(node.beat!==undefined && !(node.beat in READBEAT)) throw new Error(`Unknown read-beat "${node.beat}" on node "${node.t}" — use one of: ${Object.keys(READBEAT).join(', ')}`);
  // [LAW:no-silent-failure] same guard for the tempo: an undefined tempo is the
  // authorised default, but a MISSPELLED one would silently fall back and the
  // scene's pacing would lie with no signal.
  if(node.tempo!==undefined && !(node.tempo in TEMPO)) throw new Error(`Unknown tempo "${node.tempo}" on node "${node.t}" — use one of: ${Object.keys(TEMPO).join(', ')}`);
  const ctx=painter.build(content, node)||{};
  ctx.barfill=bar.querySelector('.barfill');

  // [LAW:dataflow-not-control-flow] pacing is data: the node's named tempo carries
  // both the scroll length and the trailing hold; the build is uniform, the variety
  // lives in the value. [LAW:one-source-of-truth] every scalar is read from :root.
  const tempo=TEMPO[node.tempo] ?? TEMPO[DEFAULT_TEMPO];
  const run=document.createElement('div'); run.className='run'; run.style.height=(tempo.len*PACE*100)+'vh';
  const hold=document.createElement('div'); hold.className='hold'; hold.style.height=(tempo.hold*PACE*100)+'vh';   // last state stays readable before the next frame covers it
  lvl.append(run, hold);
  nodes.push({node, painter, ctx, lvl, run});

  // [LAW:dataflow-not-control-flow] chrome depth is data: a framed node insets
  // its kids one notch deeper; a bleed node resets it to 0, so window chrome
  // can't leak past the nesting demo into the full-bleed descent below.
  if(node.kids){ const kids=document.createElement('div'); kids.className='kids';
    node.kids.forEach(k=>kids.append(buildNode(k, node.framed?frameDepth+1:0))); lvl.append(kids); }
  return lvl;
}
doc.append(buildNode(OPENING, 0), buildNode(NEST, 0), buildNode(TREE, 0));

// the active outro — the light bookend to the hero. A tall runway with a pinned
// stage; the deck holds the closing words, then lifts and dissolves into the paper.
const epi=document.createElement('section'); epi.className='epilogue';
epi.innerHTML=`<div class="epi-stage"><div class="epi-deck">
  <div class="rule"></div><div class="eyebrow">Out the other side</div>
  <h1>That's scrollytelling.</h1>
  <p class="lede">One sticky graphic, nested into an entire vocabulary of scroll-driven form. You made it all the way through.</p>
  <a href="#top">↑ Back to the top</a>
</div></div>`;
doc.append(epi);

// [LAW:decomposition] the outro is its own part: a build (refs + exit windows) and a
// paint(p) that maps scroll progress to the designed scroll-off. It mirrors the
// painter contract WITHOUT being a descent node — it lives in the light bookend
// register, drives normal-flow text, and is composed into the single scroll owner by
// ONE uniform call below, never special-cased inside the shared node loop.
const outro=(()=>{
  const $=s=>epi.querySelector(s);
  // [LAW:dataflow-not-control-flow] each line's exit is data: a [start,end] window in
  // p and a kind. The lines leave staggered — supporting marks first, the masthead
  // last and slowest (the payoff dissolving), the back-to-top link the final mark to
  // go — so the screen empties as a composed release, not one flat fade.
  const seg=(p,a,b)=>clamp((p-a)/(b-a),0,1), ease=t=>t*t*(3-2*t);   // smoothstep — the codebase idiom
  const lines=[
    {el:$('.rule'),    a:0.50, b:0.64, lift:26, collapse:true},   // the rule contracts to its own centre point as it goes — a 1D close, not the iris's 2D blades
    {el:$('.eyebrow'), a:0.54, b:0.70, lift:46},
    {el:$('h1'),       a:0.66, b:0.95, lift:74, exhale:true},     // the masthead widens its letter-spacing as it lifts — the sentence letting go, bleaching into the paper
    {el:$('.lede'),    a:0.58, b:0.74, lift:54},
    {el:$('a'),        a:0.82, b:1.00, lift:40},                  // the last mark to leave
  ];
  let top=0, h=1;
  // [LAW:one-source-of-truth] the pin runway is a derived layout cache, recomputed
  // only where layout can change — folded into the page's one measure() pass.
  // [LAW:no-ambient-temporal-coupling] measure `top` off the never-sticky `.epilogue`
  // container, NOT the pinned `.epi-stage`: the stage's rect-top is the viewport-pinned
  // position while it's stuck, so reading it mid-outro would rebase `top` to the
  // current scroll and snap the exit back to the start. `epi` sits at the same natural
  // top the stage pins to but never moves, so a resize/reflow can't shift the baseline.
  function measure(){ top=epi.getBoundingClientRect().top+window.scrollY; h=Math.max(1, epi.offsetHeight-window.innerHeight); }
  function progress(y){ return clamp((y-top)/h, 0, 1); }
  function paint(p){
    const mo=REDUCE_MOTION?0:1;   // [LAW:effects-at-boundaries] read live each frame, like every painter — movement is gated, the dissolve (opacity) stays so the page still clears
    for(const l of lines){
      const e=ease(seg(p,l.a,l.b));
      l.el.style.opacity=(1-e).toFixed(3);
      const tf=[`translateY(${(-l.lift*e*mo).toFixed(1)}px)`];
      if(l.collapse) tf.push(`scaleX(${(1-e*mo).toFixed(3)})`);
      l.el.style.transform=mo?tf.join(' '):'';
      if(l.exhale) l.el.style.letterSpacing=(mo&&e>0)?(-0.02+0.16*e).toFixed(3)+'em':'';
    }
  }
  return {measure, progress, paint};
})();

// [LAW:decomposition] the descent threshold — the hero↔descent seam as its own part,
// the entry mirror of the outro's exit. The cover is light paper; the first frame is a
// dark window that, untouched, slides up over it as a hard wipe. This dramatizes the
// crossing: as that window rises to pin, a veil of the descent field's own floor-dark
// seeps over the cover, so the paper GIVES WAY to the window instead of being razor-cut
// by it — and the scroll hint extinguishes the instant the descent takes hold. Like the
// outro it mirrors the painter contract WITHOUT being a node, and is composed into the
// single scroll owner by ONE uniform call below — never special-cased into the node loop.
const threshold=(()=>{
  const hero=document.getElementById('top'), hint=hero.querySelector('.scrollhint');
  const ease=t=>t*t*(3-2*t);   // smoothstep — the codebase idiom
  let top=0, h=1;
  // [LAW:one-source-of-truth] the crossing runway is a derived layout cache, recomputed
  // only where layout can change — folded into the page's one measure() pass. The zone is
  // the last viewport of the cover's exit: progress 0 when the first frame's top edge
  // enters at the viewport floor, 1 when it has risen to fully pin. Anchored on the hero's
  // own bottom (offsetTop 0), which is exactly where that first frame pins. The Math.max
  // keeps a short cover (tall viewport) starting at progress 0 rather than pre-veiled.
  function measure(){ const hb=hero.offsetHeight; top=Math.max(0, hb-window.innerHeight); h=Math.max(1, hb-top); }
  function progress(y){ return clamp((y-top)/h, 0, 1); }
  function paint(p){
    const e=ease(p);
    // the window's darkness seeps over the cover: a veil thickening from clear to the
    // descent field's floor (#100e16, the value every scene's gradient bottoms out at) as
    // the first frame rises to pin. At p=0 it is fully transparent, so the cover and its
    // paper tooth are pristine at rest; the dots dim naturally as the veil thickens.
    hero.style.backgroundColor=`rgba(16,14,22,${e.toFixed(3)})`;
    // the invitation extinguishes the moment the descent takes hold — gone well before the
    // window closes, its one word ("Scroll") already obeyed.
    hint.style.opacity=(1-clamp(p/0.45,0,1)).toFixed(3);
    // [LAW:no-ambient-temporal-coupling] [LAW:dataflow-not-control-flow] both writes are
    // pure scroll-position state — colour and opacity, no transform, no autonomous
    // animation — so this IS the designed static threshold reduced-motion asks for; the
    // same path runs with no branch. (The hint's ambient arrow bob is killed by the global
    // reduced-motion CSS, and the hint fades to nothing here regardless.)
  }
  return {measure, progress, paint};
})();

let raf=false;
// [LAW:state] node geometry is a derived cache — each node's document-space top
// and run height. It only changes when layout can change (resize, late font/img
// load), so it's recomputed there and nowhere else. [LAW:one-source-of-truth]
function measure(){ const y=window.scrollY; for(const n of nodes){ n.top=n.lvl.getBoundingClientRect().top+y; n.h=n.run.offsetHeight; } threshold.measure(); outro.measure(); }
function tick(){
  raf=false;
  // one layout read for the whole frame (scrollY), then pure compute + writes —
  // no per-node getBoundingClientRect, so the read/write phases never thrash.
  const y=window.scrollY;
  for(const n of nodes){
    // progress from this node's top, so stepping begins the instant the frame
    // pins (even pacing); the hold spacer keeps the last state readable.
    const p=clamp((y - n.top) / n.h, 0, 1);
    // raw p drives ambient (non-text) motion; n.w is the read-beat-applied
    // wording progress. SCOPE of the read-beat, stated once here so per-painter
    // use of p vs n.w is a declared rule, not a silent choice: text that ANIMATES
    // IN (appears / advances / illuminates) draws from n.w, so it waits out the
    // opening beat. Text that is a LIVE READOUT of the ambient channel (runway's
    // in-flow/pinned/released top:N readout) or that is ITSELF the ambient
    // graphic (takeover's flooding ink field) tracks
    // raw p by design — gating it would desync the label from what it reports, or
    // hold a stage that has nothing to read yet. [LAW:single-enforcer] the invariant
    // is computed in exactly one place, here. [LAW:comments-explain-why-only]
    n.w=wordingProgress(p, n.node);
    n.painter.paint(p, n);
    n.ctx.barfill.style.transform=`scaleX(${p})`;
  }
  // the two light bookends — the cover's entry threshold and the epilogue's exit — are
  // sibling concerns to the descent nodes, driven by the SAME single scrollY read and rAF,
  // each by ONE uniform call. The node loop above stays generic; neither bookend is ever
  // special-cased into it. [LAW:single-enforcer]
  threshold.paint(threshold.progress(y));
  outro.paint(outro.progress(y));
}
const onScroll=()=>{ if(!raf){ raf=true; requestAnimationFrame(tick); } };
const remeasure=()=>{ measure(); onScroll(); };
addEventListener('scroll',onScroll,{passive:true});
addEventListener('resize',remeasure);
addEventListener('load',remeasure);   // re-cache after fonts/images settle layout
document.fonts.ready.then(remeasure); // and once web fonts swap in (can reflow after load)
measure(); tick();
</script>
</body>
</html>
