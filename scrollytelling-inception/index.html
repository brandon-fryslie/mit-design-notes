     crisp pinprick flakes, a sharp masthead plane, and — closest to the lens —
     foreground flakes thrown so far out of focus they bloom into soft glowing
     bokeh discs that drift in FRONT of the title. The defocus is a radial-gradient
     (a built-in soft edge with the bright cat's-eye rim of a real bokeh ball), not
     a filter blur, so it costs nothing per frame. Distinct from the focus node's
     chromatic rack — depth of field, not colour split. */
  .sn{position:absolute; inset:0; overflow:hidden; background:linear-gradient(180deg,#1a2740 0%,#0d1422 58%,#080b13 100%);}
  .sn-flake{position:absolute; top:0; left:0; border-radius:50%; background:#eaf2ff; pointer-events:none; z-index:1;}
  /* foreground flakes thrown out of focus — a glowing bokeh disc with a bright rim */
  .sn-bokeh{background:radial-gradient(circle at 50% 44%, rgba(255,255,255,.9) 0%, rgba(224,236,255,.30) 32%, rgba(214,230,255,.10) 54%, rgba(238,245,255,.24) 70%, rgba(214,230,255,.05) 80%, transparent 88%); mix-blend-mode:screen; z-index:6;}
  /* lens vignette — the dark fall-off of a wide aperture, framing the focal plane */
  .sn-vig{position:absolute; inset:0; pointer-events:none; z-index:3; background:radial-gradient(118% 96% at 50% 40%, transparent 50%, rgba(3,6,12,.6) 100%);}
  .sn-title{position:absolute; inset:0; display:grid; place-content:center; justify-items:center; text-align:center; z-index:4; padding:0 9%;}
  .sn-title h2{font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-masthead); line-height:.94; margin:0; letter-spacing:-.02em; text-shadow:0 4px 44px rgba(0,0,0,.6);}
  .sn-title .sub{margin-top:13px; font-size:var(--type-label); letter-spacing:.22em; text-transform:uppercase; color:#9fb4d6;}

  /* converge — the closing aperture. A 9-blade iris stops down out of the descent,
     gathering the journey's light to one focal point where the last line resolves.
     The lens motif (focus/snow/zoom/depth) coming to rest — a MECHANICAL aperture:
     faceted blades, a glowing core, a struck rim. Claims neither the snow node's
     soft bokeh nor the mask node's straight cut. */
  .iz{position:absolute; inset:0; overflow:hidden; display:grid; place-items:center; background:#070a11;}
  .iz svg{position:absolute; inset:0; width:100%; height:100%;}
  .iz-back{fill:#070a11;}
  .iz-s0{stop-color:var(--accent); stop-opacity:.85;}
  .iz-s1{stop-color:var(--accent); stop-opacity:.20;}
  .iz-s2{stop-color:var(--accent); stop-opacity:0;}
  /* faceted iris blades — fill set per-blade at build for a pinwheel shimmer that
     turns with them; a hairline edge separates the facets */
  .iz-blade{stroke:rgba(233,240,255,.05); stroke-width:.25; stroke-linejoin:round;}
  /* the struck aperture rim — the bright inner edge of the opening N-gon */
  .iz-rim{fill:none; stroke:var(--accent); stroke-width:.7; stroke-linejoin:round; filter:drop-shadow(0 0 1.2px var(--accent));}
  .iz-word{position:relative; z-index:4; text-align:center; max-width:66%; font-family:var(--display); font-weight:600; font-variation-settings:var(--type-engrave); color:#fff; font-size:var(--type-display); line-height:1.12; letter-spacing:-.01em; text-shadow:0 2px 30px rgba(0,0,0,.9), 0 0 26px color-mix(in oklab, var(--accent) 30%, transparent);}

  /* reticle — a Reuters-style forensic tracking INSTRUMENT. The scene is a
     reconstruction plate (a perspective ground plane + located evidence markers);
     a target reticle reads it, snap-locking corner brackets onto each subject,
     drawing a MEASURED baseline between them, and running live telemetry (timecode,
     frame, magnification, bearing, coordinates). The movement's lens signature here
     is the INSTRUMENT itself — scanlines, film grain, snap-lock, measurement
     readouts — distinct from the focus node's chromatic rack and the snow node's
     depth-of-field bokeh (this node claims neither idiom). */
  .rt{position:absolute; inset:0; overflow:hidden; color:#dceaf7;
    background:radial-gradient(120% 102% at 50% 30%,#142336,#070b12 80%);
    font-family:ui-monospace,Menlo,monospace;}
  .rt-scene{position:absolute; inset:0;}
  .rt-scene svg{position:absolute; inset:0; width:100%; height:100%;}
  .rt-ground{fill:none; stroke:rgba(150,182,214,.085); stroke-width:.18;}
  .rt-horizon{stroke:rgba(150,182,214,.16); stroke-width:.22;}
  .rt-base{fill:none; stroke:rgba(170,196,224,.20); stroke-width:.4; stroke-dasharray:1.6 1.4;}
  .rt-base-lit{fill:none; stroke:var(--accent); stroke-width:.6; stroke-linejoin:round; filter:drop-shadow(0 0 .6px var(--accent));}
  /* located evidence marker — a forensic ring + letter planted at a subject */
  .rt-mark{position:absolute; transform:translate(-50%,-50%); width:clamp(15px,4cqw,24px); aspect-ratio:1;
    border:1px solid rgba(190,212,236,.42); border-radius:50%; display:grid; place-items:center; z-index:2;
    font-size:var(--type-micro); letter-spacing:.04em; color:#cfe0f2; background:rgba(10,16,26,.3);}
  /* a measured span between two markers — the distance annotation */
  .rt-dist{position:absolute; transform:translate(-50%,-50%); z-index:2; white-space:nowrap; opacity:0;
    font-size:var(--type-micro); letter-spacing:.08em; color:#eaf2ff; padding:1px 5px; border-radius:3px;
    background:rgba(8,13,22,.82); border:1px solid color-mix(in oklab, var(--accent) 38%, rgba(255,255,255,.14));}

  .rt-box{position:absolute; transform:translate(-50%,-50%); z-index:5; will-change:left,top,width,height;}
  /* four snap-lock corner brackets — they drive inward as the reticle acquires */
  .rt-cnr{position:absolute; width:11px; height:11px; border:2px solid var(--accent);}
  .rt-cnr.tl{top:0; left:0; border-right:none; border-bottom:none;}
  .rt-cnr.tr{top:0; right:0; border-left:none; border-bottom:none;}
  .rt-cnr.bl{bottom:0; left:0; border-right:none; border-top:none;}
  .rt-cnr.br{bottom:0; right:0; border-left:none; border-top:none;}
  /* centre crosshair — sharpens as lock tightens (opacity set per frame) */
  .rt-cross::before,.rt-cross::after{content:""; position:absolute; background:var(--accent);
    left:50%; top:50%; transform:translate(-50%,-50%);}
  .rt-cross::before{width:1px; height:15px;}
  .rt-cross::after{height:1px; width:15px;}
  /* acquire ping — a ring that pulses out on a fresh lock (WAAPI, motion-gated) */
  .rt-ping{position:absolute; inset:-5px; border:2px solid var(--accent); border-radius:5px; opacity:0; pointer-events:none;}
  .rt-tag{position:absolute; left:0; bottom:calc(100% + 6px); white-space:nowrap; font-size:var(--type-micro);
    letter-spacing:.1em; color:#eaf2ff; background:rgba(8,13,22,.82); border:1px solid rgba(255,255,255,.14); padding:2px 7px; border-radius:3px;}
  .rt-mag{position:absolute; right:0; top:calc(100% + 6px); font-size:var(--type-micro); letter-spacing:.08em;
    color:color-mix(in oklab, var(--accent) 55%, #dcefff);}

  /* fixed instrument frame — telemetry rails pinned to the footage corners */
  .rt-hud{position:absolute; inset:0; pointer-events:none; z-index:6; color:#a9bccf;
    font-size:var(--type-micro); letter-spacing:.14em; text-transform:uppercase;}
  .rt-hud > div{position:absolute; display:flex; flex-direction:column; gap:4px;}
  .rt-tl{top:5.5%; left:6%;} .rt-tr{top:5.5%; right:6%; align-items:flex-end; text-align:right;}
  .rt-bl{bottom:13%; left:6%;} .rt-br{bottom:13%; right:6%; align-items:flex-end; text-align:right;}
  .rt-rec{display:flex; align-items:center; gap:6px; color:#ff5b6b;}
  .rt-rec i{width:7px; height:7px; border-radius:50%; background:#ff5b6b;}
  .rt-tc, .rt-frame{font-size:var(--type-label); letter-spacing:.1em; color:#eef5ff;}
  .rt-id{color:color-mix(in oklab, var(--accent) 58%, #cfe0f2);}
  .rt-status{color:color-mix(in oklab, var(--accent) 62%, #cfe0f2);}

  .rt-scan{position:absolute; inset:0; z-index:3; pointer-events:none; mix-blend-mode:overlay;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,.045) 0 1px, transparent 1px 3px);}
  .rt-grain{position:absolute; inset:0; z-index:3; pointer-events:none; opacity:.05;
    background-image:radial-gradient(#fff .5px, transparent .6px); background-size:3px 3px;}
  .rt-vig{position:absolute; inset:0; z-index:7; pointer-events:none;
    background:radial-gradient(122% 98% at 50% 42%, transparent 54%, rgba(2,5,10,.66) 100%);}
  .rt-cap{position:absolute; bottom:6%; left:0; right:0; text-align:center; color:#dce8f5; font-size:var(--type-readout); z-index:8; text-shadow:0 1px 12px #000; padding:0 11%;}

  /* scatter — a Pudding-style data essay: a TITLED, ANNOTATED chart that builds
     itself as you scroll. Axes wipe in, dots sweep left→right into two colour-
     coded series, a trend curve draws through each, then an editorial callout
     resolves on a leader line. Pure data-ink / annotation idiom — no optics:
     deliberately avoids the focus/snow/reticle lenses (RGB split, bokeh, HUD). */
  .sct{position:absolute; inset:0; display:flex; flex-direction:column; padding:6.5% 8% 5.5%; gap:clamp(7px,1.8cqh,15px); color:#e9e6f5;}
  .sct-kicker{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.34em; text-transform:uppercase; color:color-mix(in oklab,var(--accent) 64%,#cfc9da);}
  .sct-title{font-family:var(--display); font-weight:600; font-size:var(--type-title); color:#f4f1fb; line-height:1.1; margin-top:5px;}
  .sct-dek{font-size:var(--type-label); color:#b3aec1; margin-top:3px; max-width:46ch;}
  .sct-legend{display:flex; flex-wrap:wrap; gap:clamp(11px,3cqw,24px); margin-top:2px;}
  .sct-key{display:inline-flex; align-items:center; gap:7px; font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.13em; text-transform:uppercase; color:#cbc6d6;}
  .sct-key i{width:9px; height:9px; border-radius:50%; background:var(--k); box-shadow:0 0 9px -1px var(--k);}
  /* plot grid: a y-axis tick column + the plot, with the x-axis ticks beneath */
  .sct-grid{position:relative; flex:1; display:grid; grid-template-columns:clamp(20px,7cqw,38px) 1fr; grid-template-rows:1fr clamp(13px,3cqh,20px); gap:5px; min-height:0;}
  .sct-yax{grid-column:1; grid-row:1; display:flex; flex-direction:column; justify-content:space-between; align-items:flex-end; padding-right:7px;}
  .sct-xax{grid-column:2; grid-row:2; display:flex; justify-content:space-between; align-items:flex-start; padding-top:3px;}
  .sct-tick{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); color:#8f8a9c; line-height:1;}
  .sct-plot{grid-column:2; grid-row:1; position:relative; min-height:0;}
  .sct-svg{position:absolute; inset:0; width:100%; height:100%; overflow:visible;}
  .sct-grid-l{stroke:rgba(255,255,255,.085); stroke-width:1; vector-effect:non-scaling-stroke;}
  .sct-axis-l{stroke:rgba(255,255,255,.32); stroke-width:1.4; vector-effect:non-scaling-stroke;}
  .sct-trend{fill:none; stroke:var(--k); stroke-width:2.4; vector-effect:non-scaling-stroke; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 1px 6px color-mix(in oklab,var(--k) 45%,transparent));}
  .sct-leader{stroke:#e9e6f5; stroke-width:1; vector-effect:non-scaling-stroke; opacity:.65;}
  .sct-dots{position:absolute; inset:0; pointer-events:none;}
  .sct-dot{position:absolute; width:clamp(5px,1.55cqw,9px); aspect-ratio:1; border-radius:50%; will-change:transform,opacity;}
  .sct-ann{position:absolute; top:1%; right:0; max-width:42%; text-align:right; font-size:var(--type-label); line-height:1.32; color:#f1eef9; text-shadow:0 1px 11px #000;}
  .sct-ann b{color:var(--accent); font-weight:600; white-space:nowrap;}
  .sct-cap{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.05em; color:#807b8d;}

  /* deck — a stack of letterpress SPECIMEN CARDS; scrolling lifts each plate off the
     top to reveal the next. Wears the gallery's print-specimen frame (matte jade
     crop marks + tracked mono catalogue label, no bloom) — its own implementation of
     the shared motif — while each plate is set in a DIFFERENT real type family, so the
     stack performs "the same idea, wearing many faces". */
  .dk{position:absolute; inset:0; display:grid; place-items:center; perspective:1100px;}
  .dk-stack{position:relative; width:clamp(196px,54cqw,384px); aspect-ratio:4/3; transform-style:preserve-3d;}
  .dk-card{position:absolute; inset:0; border-radius:5px; display:grid; grid-template-rows:auto 1fr; gap:clamp(8px,2cqh,16px);
    padding:clamp(15px,4cqh,28px) clamp(18px,5cqw,38px); backface-visibility:hidden;
    background:radial-gradient(125% 130% at 50% 30%, color-mix(in oklab, var(--accent) 7%, #14121c), #100e16 72%);
    border:1px solid color-mix(in oklab, var(--accent) 15%, rgba(255,255,255,.05));
    box-shadow:0 26px 52px -28px rgba(0,0,0,.85);}
  /* matte jade registration crop marks — one pseudo paints all eight strips */
  .dk-card::before{content:""; position:absolute; inset:-12px; pointer-events:none;
    --m:13px; --t:1.5px; --c:color-mix(in oklab, var(--accent) 74%, #fff);
    background:
      linear-gradient(var(--c),var(--c)) left top,    linear-gradient(var(--c),var(--c)) left top,
      linear-gradient(var(--c),var(--c)) right top,   linear-gradient(var(--c),var(--c)) right top,
      linear-gradient(var(--c),var(--c)) left bottom,  linear-gradient(var(--c),var(--c)) left bottom,
      linear-gradient(var(--c),var(--c)) right bottom, linear-gradient(var(--c),var(--c)) right bottom;
    background-repeat:no-repeat;
    background-size:var(--m) var(--t), var(--t) var(--m), var(--m) var(--t), var(--t) var(--m),
                    var(--m) var(--t), var(--t) var(--m), var(--m) var(--t), var(--t) var(--m);}
  /* catalogue plate label — honest readout: real index/total + the real face name */
  .dk-lab{font-family:ui-monospace,Menlo,monospace; font-size:var(--type-micro); letter-spacing:.3em; text-transform:uppercase;
    color:color-mix(in oklab, var(--accent) 60%, #cfe9dc);}
  .dk-t{align-self:center; text-align:center; color:#f1eef9; font-weight:600; font-size:var(--type-title); line-height:1.18;}

  /* epilogue — the active outro: the light bookend to the hero, but where the hero
     is a still masthead you scroll INTO, this one performs its own exit. The tall
     section is pure scroll runway; the stage pins (like a descent frame, but in the
     light register) and holds the closing words readable, then — as you keep
     scrolling — the deck lifts line by line and dissolves into the paper it sat on,
     until the frame is empty bone-white page: the piece ends on the blank sheet it
     began on. Driven by the single scroll owner via the self-contained `outro` part,
     NOT registered in the descent's paint loop. */
  .epilogue{position:relative; min-height:280vh;}
  .epi-stage{position:sticky; top:0; height:100vh; display:grid; place-content:center; justify-items:center; text-align:center; padding:0 28px;}
  .epi-deck{display:grid; justify-items:center; gap:6px;}
  .epi-deck>*{transform-origin:50% 50%;}   /* the rule collapses to its own centre on exit */
  .epilogue h1{font-size:clamp(34px,6vw,68px); margin-top:14px;}
  .epilogue .lede{max-width:460px; margin:18px auto 0; color:var(--muted); font-size:19px;}
  .epilogue a{margin-top:34px; font-size:13px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); text-decoration:none;}
  .epilogue a:hover{color:var(--ink);}
  .epilogue .rule{width:54px; height:3px; background:var(--ink); border-radius:3px; margin-bottom:8px;}

  @media (max-width:720px){ :root{ --bar:34px; --pad:9px; } }
</style>
</head>
<body>

<section class="hero" id="top">
  <div class="eyebrow">A short explainer</div>
  <h1>How <em>scrollytelling</em> works.</h1>
  <p class="lede">You scroll. The graphic does the rest.</p>
  <div class="scrollhint">Scroll<span class="arrow">↓</span></div>
</section>

<main id="doc"></main>

<noscript>
  <p style="max-width:640px; margin:0 auto; padding:8vh 28px 18vh; text-align:center; color:var(--muted); font-size:18px;">
    This is a scroll-driven explainer — the graphics are built and animated with
    JavaScript as you scroll. Enable JavaScript to walk through how scrollytelling works.
  </p>
</noscript>

<script>
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;

/* ── MOTION GRAMMAR (JS side) — the half of the timing authority the painters
   need at runtime. The two curve strings WAAPI uses are READ from the CSS
   :root tokens, so the stylesheet stays their single source — nothing is
   re-typed here. See the :root "MOTION GRAMMAR" block for the CSS half.
   [LAW:one-source-of-truth] ── */
// [LAW:no-silent-failure] [LAW:single-enforcer] the one place the CSS→JS mirror
// is read — so it's the one place that fails loud if a token is missing. An empty
// string here would silently become an invalid WAAPI easing (animation dies, no
// error); a renamed/dropped token must surface as a broken mirror, not dead motion.
// the single guarded reader for any CSS grammar token read back into JS (motion
// curves/durations, and the colour-story families) — one enforcer, so a renamed
// or dropped token breaks loud here instead of degrading silently downstream.
const cssVar = name => { const v=getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  if(!v) throw new Error(`CSS token ${name} is missing — a JS↔CSS grammar mirror is broken.`);
  return v; };
// WAAPI durations are numbers of ms; the CSS token is read through the same
// enforcer, then parsed — an out-of-shape token fails loud, not as NaN timing.
const cssMs = name => { const v=cssVar(name), n=parseFloat(v);
  if(!Number.isFinite(n)) throw new Error(`Motion grammar: CSS token ${name} ("${v}") is not a number of milliseconds.`);
  return n; };
// cssMs's unit-agnostic sibling: same loud-failure contract through the same
// cssVar enforcer, for unitless grammar scalars (the pacing scale's lengths).
const cssNum = name => { const v=cssVar(name), n=parseFloat(v);
  if(!Number.isFinite(n)) throw new Error(`Grammar token ${name} ("${v}") is not a number.`);
  return n; };
const MOTION = {
  ease: { land: cssVar('--ease-land'), fade: cssVar('--ease-fade') }, // WAAPI strings, mirrored from CSS
  ms:   { fade: cssMs('--ms-fade'), pop: cssMs('--ms-pop') },   // WAAPI flourish lengths (ms), mirrored from CSS
  // scroll-scrubbed deceleration: scene progress eases to rest as it completes.
  // JS-only — CSS transitions don't scrub scroll — so it lives here as the exact
  // cubic with no CSS twin to drift. A styling ticket wanting this feel in a CSS
  // transition should add --ease-drift beside this note, never re-derive it.
  drift: t => 1 - Math.pow(1 - t, 3),
};
const easeOut = MOTION.drift;   // the scroll-scrub curve, named once above

/* ── PACING (JS side) — the half the build touches ──
   The tempo scale is authored as :root --tempo-… and --pace tokens (CSS is canonical).
   A scene names its tempo as data (node.tempo); the build resolves it to a
   {len, hold} shape through the guarded cssNum() and sizes the scene from it, so
   a renamed token breaks loud, never silently re-paces the descent. Reading every
   scalar back here is what keeps the scale ONE fact — no JS/CSS twin to drift.
   [LAW:one-source-of-truth]; [LAW:one-type-per-behavior] one shape, many names. */
const PACE = cssNum('--pace');   // global tempo knob, mirrored from CSS
const TEMPO_SCALE = ['flit','pulse','phrase','passage','movement'];   // ascending; the scale's spine
const TEMPO = Object.fromEntries(TEMPO_SCALE.map(name =>
  [name, { len: cssNum(`--tempo-${name}-len`), hold: cssNum(`--tempo-${name}-hold`) }]));
const DEFAULT_TEMPO = 'phrase';   // a scene with no named tempo reads at the default — one idea, shown and read

/* Read-beat — the grammar's compositional invariant: a scene holds its WORDING
   still for an opening beat so the reader can take it in before it animates;
   ambient (non-text) motion may still breathe. The INVARIANT is fixed (wording
   waits); the LENGTH is a per-scene choice from this sanctioned palette, so the
   scenes vary by intent, not by accident. A node names its beat as data; the one
   paint loop turns it into n.w (wording progress) for every painter to draw text
   from, while raw p drives the ambient channel.
   [LAW:dataflow-not-control-flow] (the choice is data on the node)
   [LAW:one-type-per-behavior] (one transform, many values). */
const READBEAT = {
  brisk: 0.08,  // kinetic scenes — barely a breath; the motion is the message
  read:  0.16,  // default — a beat to take the words in before they move
  dwell: 0.26,  // contemplative scenes — let the idea land before anything shifts
};
// wording progress: 0 through the read-beat, then 0→1 across the remainder.
const wordingProgress = (p, node) => { const rb = READBEAT[node.beat] ?? READBEAT.read;
  return clamp((p - rb) / (1 - rb), 0, 1); };
// [LAW:one-source-of-truth] the single JS-side authority for "should decorative
// motion play" — the same OS preference the reduced-motion @media query reads.
// Tracks the live query, so toggling the OS setting mid-read stays in sync.
const motionQuery = matchMedia('(prefers-reduced-motion: reduce)');
let REDUCE_MOTION = motionQuery.matches;
motionQuery.addEventListener('change', e => { REDUCE_MOTION = e.matches; });
function setText(el,t){ if(el.textContent===t) return; el.textContent=t; if(!REDUCE_MOTION) el.animate([{opacity:0},{opacity:1}],{duration:MOTION.ms.fade,easing:MOTION.ease.fade}); }
// thousands separators so a large ticking figure stays legible mid-roll
const group=n=>(''+n).replace(/\B(?=(\d{3})+(?!\d))/g,',');
// steps stop a touch early so the LAST step is fully read during the hold spacer
const stepIdx=(p,len)=>clamp(Math.floor(clamp(p/0.9,0,1)*len),0,len-1);
// weighted variant: each step holds for its authored `dwell` weight rather than an
// equal share, so a scene can let one beat linger longer than the rest (the opener
// front-loads its first, still beat). same early-stop so the last step is read
// during the hold spacer. [LAW:dataflow-not-control-flow] the pacing is data on the steps.
const phaseAt=(w,steps)=>{ const total=steps.reduce((a,s)=>a+s.dwell,0), t=clamp(w/0.92,0,1)*total;
  let acc=0; for(let i=0;i<steps.length;i++){ acc+=steps[i].dwell; if(t<acc) return i; } return steps.length-1; };

/* =====================================================================
   One recursive engine. The page is a TREE of nodes; native CSS sticky
   nests them (an ancestor stays pinned while its descendants pin on top),
   and a fixed HOLD spacer after each node lets its last state be read
   before the next frame covers it. JS only maps each node's own scroll
   progress to its picture via a per-kind painter.
   [LAW:types-are-the-program] depth is the tree's shape
   [LAW:one-type-per-behavior] one node, painted from a registry
   [LAW:no-mode-explosion] a new technique is one registry entry
   [LAW:single-enforcer] one loop paints every node
===================================================================== */
/* ── COLOR STORY (JS side) — the half the painters touch ──
   The accent families are authored as :root --acc-* tokens (CSS is canonical).
   A node names its family as data (node.accent); accentOf resolves it through the
   guarded reader, so a misspelled family breaks loud, never silently degrades.
   PALETTE is the arc in scroll order — the journey's spine — for the one place
   that wants the whole spectrum at once (scatter's decorative cloud).
   [LAW:one-source-of-truth] the hexes live once, in :root. */
const PALETTE=['iris','azure','teal','jade','amber','ember'];
const accentOf = family => cssVar('--acc-'+family);
const ACCENTS = PALETTE.map(accentOf);   // the families' values, arc-ordered
// accent token → [r,g,b], for the painters that interpolate accent colours in JS
// per frame (CSS color-mix can't be scroll-scrubbed). Loud on a malformed token,
// never a silent NaN channel. [LAW:no-silent-failure]
const hexRGB = hex => { const m=/^#([0-9a-f]{6})$/i.exec(hex);
  if(!m) throw new Error(`hexRGB: "${hex}" is not a #rrggbb colour token.`);
  const n=parseInt(m[1],16); return [n>>16&255, n>>8&255, n&255]; };

/* ── terminal painter helpers ── the editor needs to highlight the CSS it types
   AND reveal it character-by-character. You can't slice highlighted HTML (the cut
   lands mid-tag), so the source is tokenised ONCE at build into {t,c} segments and
   the per-frame reveal walks those segments. Block-comment state carries across
   lines so a multi-line CSS comment lights as a single comment span.
   [LAW:one-source-of-truth] tokens computed once; the paint loop only reveals.
   [LAW:effects-at-boundaries] pure: lines in, highlighted segments out. */
const tmEsc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// a declaration fragment → prop/value/number/punct segments. `:` flips prop→value;
// `;` flips back, so a multi-declaration line still classes each side correctly.
function tmDecl(frag, segs){
  const re=/(\s+)|([:;{}])|([A-Za-z][A-Za-z-]*)|(\d+[a-z%]*)|(.)/g; let m, afterColon=false;
  while((m=re.exec(frag))){
    if(m[1]) segs.push({t:m[1]});                                   // whitespace — uncoloured
    else if(m[2]){ segs.push({t:m[2],c:'punc'}); afterColon = m[2]===':'; }
    else if(m[3]) segs.push({t:m[3], c: afterColon?'val':'prop'});
    else if(m[4]) segs.push({t:m[4], c:'num'});
    else segs.push({t:m[5]});
  }
}
function tmTokenize(lines){
  let inCom=false;
  return lines.map(line=>{
    const segs=[];
    if(inCom){ const close=line.indexOf('*/');
      if(close<0){ segs.push({t:line,c:'com'}); }
      else { segs.push({t:line.slice(0,close+2),c:'com'}); inCom=false; tmDecl(line.slice(close+2),segs); }
      return segs; }
    const open=line.indexOf('/*');
    if(open<0){ tmDecl(line,segs); return segs; }
    if(open>0) tmDecl(line.slice(0,open),segs);
    const close=line.indexOf('*/',open);
    if(close<0){ segs.push({t:line.slice(open),c:'com'}); inCom=true; }
    else { segs.push({t:line.slice(open,close+2),c:'com'}); tmDecl(line.slice(close+2),segs); }   // suffix after a same-line */ flows through the same parser — no input dropped
    return segs;
  });
}
const tmLen = segs => segs.reduce((a,s)=>a+s.t.length,0);
// reveal the first `take` chars of one tokenised line as highlighted HTML
function tmReveal(segs, take){ let left=take, out='';
  for(const s of segs){ if(left<=0) break;
    const t = s.t.length<=left ? s.t : s.t.slice(0,left); left-=t.length;
    out += s.c ? `<span class="t-${s.c}">${tmEsc(t)}</span>` : tmEsc(t); }
  return out; }

// the cascade title's audition set — three REAL, distinct faces the same letters
// try on (Inter is link-loaded; mono and the system serif are always present), so
// "wearing many faces" is literally true, not a faked effect. [LAW:no-silent-failure]
const CS_FACES=['Inter,system-ui,sans-serif','ui-monospace,Menlo,monospace','"Hoefler Text",Georgia,serif'];

// the deck's specimen faces — each step-card is set in ONE real family (all three
// always render: Inter is link-loaded, mono and the system serif are built in), so
// the catalogue label names the face the card is actually wearing — no fabrication.
// Distinct from cascade's CS_FACES (which morphs glyphs); here a face is static
// identity per plate. [LAW:one-source-of-truth] [LAW:no-silent-failure]
const DK_FACES={ grotesque:{fam:'Inter,system-ui,sans-serif', label:'grotesque'},
                 mono:{fam:'ui-monospace,Menlo,monospace', label:'monospace'},
                 serif:{fam:'"Hoefler Text",Georgia,serif', label:'serif'} };

const PAINTERS = {
  "steps-graphic":{
    // a tile is placed by field-percent offset from centre + its own scale, so the
    // live specimen and each static ghost share one coordinate frame and line up exactly.
    place(t,s){ t.style.left=(50+s.x)+'%'; t.style.top=(44+s.y)+'%'; t.style.transform=`translate(-50%,-50%) scale(${s.s})`; },
    build(c,node){
      const ghosts=node.steps.map((s,i)=>`<div class="sg-tile sg-ghost">${i+1}</div>`).join('');
      c.innerHTML=`<div class="sg-grid"></div><div class="sg-field">${ghosts}<div class="sg-tile sg-box">1</div></div><div class="scene-cap"></div><div class="scene-bar"><span></span></div>`;
      const gs=[...c.querySelectorAll('.sg-ghost')]; gs.forEach((g,i)=>this.place(g,node.steps[i].state));
      return {box:c.querySelector('.sg-box'), ghosts:gs, cap:c.querySelector('.scene-cap'), bar:c.querySelector('.scene-bar span')}; },
    paint(p,n){ const s=n.node.steps, i=phaseAt(n.w,s), r=n.ctx;
      // the specimen jumps to step i (CSS eases the move); every step already passed
      // stays on the field as a numbered ghost — visibility is a pure function of i.
      r.box.textContent=i+1; this.place(r.box, s[i].state);
      r.ghosts.forEach((g,gi)=>g.classList.toggle('seen', gi<i));
      setText(r.cap, s[i].cap); r.bar.style.transform=`scaleX(${p})`; }
  },
  runway:{
    // an honest position:sticky demo. The whole sticky MODEL is four fractions of
    // the window's height, defined once here; the flow-ghost, ribbon height, band
    // height and scrollbar thumb all derive from them, so CSS owns only the look.
    // [LAW:one-source-of-truth] one set of numbers, every dimension derived from it.
    build(c){ const S0=0.46, SH=0.16, R=2.4, pinEnd=1.05, maxScroll=R-1;
      // ribbon-space rows (top%,width%) read as a page of prose, skipping the band
      // around the sticky's flow slot. fixed widths — deterministic, no randomness.
      const rows=[[6,74],[10.5,60],[15,68],[30,72],[34.5,58],[39,66],[43.5,70],[48,55],
        [52.5,69],[57,62],[61.5,73],[66,59],[70.5,67],[75,64],[79.5,71],[84,57],[88.5,68],[93,61]];
      c.innerHTML=`<div class="rw"><div class="rw-win">`
        +`<div class="rw-page">${rows.map(([t,w])=>`<i class="rw-row" style="top:${t}%;width:${w}%"></i>`).join('')}</div>`
        +`<div class="rw-datum"></div>`
        +`<div class="rw-sticky"><span class="rw-tag">sticky</span><span class="rw-top"></span></div>`
        +`<div class="rw-bar"><i class="rw-thumb"></i></div>`
        +`</div></div><div class="scene-cap"></div>`;
      const page=c.querySelector('.rw-page'), sticky=c.querySelector('.rw-sticky'), thumb=c.querySelector('.rw-thumb');
      page.style.height=(R*100)+'%';
      sticky.style.height=(SH*100)+'%';
      thumb.style.height=(1/R*100)+'%';
      return {win:c.querySelector('.rw-win'), page, sticky, top:c.querySelector('.rw-top'),
        datum:c.querySelector('.rw-datum'), thumb, cap:c.querySelector('.scene-cap'),
        S0, SH, R, pinEnd, maxScroll}; },
    paint(p,n){ const r=n.ctx, scroll=p*r.maxScroll;
      // raw p (a live readout of the scroll position), not n.w — see read-beat SCOPE note
      r.page.style.transform=`translateY(${-(scroll/r.R)*100}%)`;
      r.thumb.style.top=(scroll/r.R*100)+'%';
      // the sticky model, three phases as a pure function of scroll — no branch on
      // "which frame": the phase is just which arm of topFrac the value lands in.
      const topFrac = scroll<r.S0 ? r.S0-scroll : scroll<=r.pinEnd ? 0 : r.pinEnd-scroll;
      r.sticky.style.top=(topFrac*100)+'%';
      const pinned = topFrac===0, phase = scroll<r.S0?'pre':pinned?'pin':'post';
      // live offset readout, measured from the window's real height — honest, not a constant
      setText(r.top, 'top: '+Math.round(topFrac*r.win.clientHeight)+'px');
      // paint writes state only — the lock-flash is a CSS keyframe keyed off .engaged
      // (fires on class-add), reduced-motion handled by the single CSS motion-kill.
      r.datum.classList.toggle('engaged', pinned);
      setText(r.cap, phase==='pre'?"in flow — rising with the page"
        : phase==='pin'?"pinned — stuck at top: 0" : "released — scrolling away with its section"); }
  },
  // a TURNTABLE SPECIMEN: one showpiece glyph turned on a spindle, QUANTIZED into N
  // pre-rendered frames. The integer frame — not raw scroll — drives the picture, so
  // the form's defining fact (scroll is an index into a finite sequence) is real and
  // visible: a flip-book, not a tween. The film ribbon and the counter both read that
  // one integer; nothing is fabricated. [LAW:dataflow-not-control-flow] [LAW:no-silent-failure]
  "frame-sequence":{
    build(c){ c.innerHTML=`<div class="fs"><canvas aria-hidden="true"></canvas><div class="fs-lab"></div></div><div class="scene-cap"></div>`;
      const cv=c.querySelector('canvas');
      // the jade accent resolved to a concrete colour once (one computed-style read,
      // never in the rAF write phase); canvas needs a literal, CSS needs the var.
      const accent=getComputedStyle(c).getPropertyValue('--accent').trim();
      // the lesson is static — set once, not re-faded every scroll step.
      c.querySelector('.scene-cap').textContent="Forty-eight pre-rendered frames. Your scroll is the projector.";
      return {cv, x:cv.getContext('2d'), w:0, h:0, accent, frame:-1, lab:c.querySelector('.fs-lab')}; },
    paint(p,n){ const r=n.ctx, cv=r.cv, x=r.x, d=window.devicePixelRatio||1, accent=r.accent;
      const cssW=cv.clientWidth, cssH=cv.clientHeight, W=Math.round(cssW*d), H=Math.round(cssH*d);
      // [LAW:state] backing store is a derived cache — reallocate only when its source (client size × dpr) changes
      if(W!==r.w || H!==r.h){ cv.width=W; cv.height=H; r.w=W; r.h=H; }
      x.setTransform(d,0,0,d,0,0); x.clearRect(0,0,cssW,cssH);   // work in CSS px; HiDPI-crisp

      const N=48, frame=Math.round(p*(N-1));                     // scroll → integer frame index, the one true datum
      const phi=(frame/(N-1))*2*Math.PI*2, cphi=Math.cos(phi);  // two full turns across the sequence; cos foreshortens the Y-axis spin

      // ── stage geometry: glyph above, film ribbon along the foot ──
      const ribbonH=Math.min(64,cssH*0.2), ribbonY=cssH-ribbonH-4;
      const cx=cssW/2, cy=ribbonY*0.5+6, gs=Math.max(24, Math.min(cssW*0.42, ribbonY*0.6));

      // the spindle the sheet turns on
      x.strokeStyle='rgba(255,255,255,0.06)'; x.lineWidth=1;
      x.beginPath(); x.moveTo(cx,cy-gs*0.82); x.lineTo(cx,cy+gs*0.82); x.stroke();
      // ground shadow — its width tracks the foreshorten, grounding the turn
      x.save(); x.translate(cx,cy+gs*0.54); x.scale(1,0.16);
      x.beginPath(); x.arc(0,0, gs*(0.18+0.34*Math.abs(cphi)), 0, Math.PI*2);
      x.fillStyle='rgba(0,0,0,0.42)'; x.fill(); x.restore();

      // the showpiece glyph, foreshortened by cos(phi) → a Y-axis turntable. Past 90°
      // the negative scale mirrors it automatically: the back of the printed sheet,
      // shown as a paler jade-lit face so it reads as a turned page, not a shadow.
      x.save(); x.translate(cx,cy); x.scale(cphi,1);
      x.font=`600 ${gs}px Georgia,"Hoefler Text",serif`; x.textAlign='center'; x.textBaseline='middle';
      x.fillStyle='rgba(0,0,0,0.40)'; x.fillText('&',0,gs*0.035);                 // letterpress shadow (y-only; safe under the flip)
      const front=cphi>=0, a=Math.abs(cphi);
      x.fillStyle=front?'#f1eef9':'#cfe9dc'; x.globalAlpha=0.32+(front?0.68:0.50)*a;
      x.fillText('&',0,0); x.globalAlpha=1; x.restore();
      // edge sliver — the sheet seen edge-on through the thin moment of the turn,
      // a confident jade bar so a parked edge-on frame reads as a turned page
      if(a<0.2){ const e=1-a/0.2; x.globalAlpha=e; x.fillStyle=accent;
        x.fillRect(cx-2,cy-gs*0.48,4,gs*0.96); x.globalAlpha=e*0.7; x.fillStyle='#eafff6'; x.fillRect(cx-0.6,cy-gs*0.48,1.2,gs*0.96); x.globalAlpha=1; }

      // ── film ribbon: N frame cells lit up to the live frame, with sprocket perforations ──
      x.fillStyle='#0b0910'; x.fillRect(0,ribbonY,cssW,ribbonH);
      const perfH=ribbonH*0.18; x.fillStyle='rgba(255,255,255,0.10)';
      for(let px=7;px<cssW-6;px+=14){ x.fillRect(px,ribbonY+perfH*0.3,7,perfH*0.5); x.fillRect(px,ribbonY+ribbonH-perfH*0.8,7,perfH*0.5); }
      const cellY=ribbonY+perfH+2, cellH=ribbonH-2*perfH-4, cellW=(cssW-16)/N;
      for(let i=0;i<N;i++){ const xi=8+i*cellW;
        if(i===frame){ x.globalAlpha=1; x.fillStyle=accent; }                     // the live frame, full jade
        else if(i<frame){ x.globalAlpha=0.32; x.fillStyle=accent; }               // exposed frames behind the playhead
        else { x.globalAlpha=1; x.fillStyle='rgba(255,255,255,0.05)'; }           // latent frames ahead
        x.fillRect(xi,cellY,cellW-1,cellH); }
      x.globalAlpha=1;
      // playhead marker above the live cell
      const phx=8+frame*cellW+cellW/2; x.fillStyle=accent;
      x.beginPath(); x.moveTo(phx,ribbonY-1); x.lineTo(phx-5,ribbonY-8); x.lineTo(phx+5,ribbonY-8); x.closePath(); x.fill();

      // honest live readout — written straight (a machine counter, not an animating-in
      // word), so the 48 steps don't each trigger setText's fade. Only on real change.
      if(frame!==r.frame){ r.frame=frame; r.lab.textContent=`frame ${String(frame+1).padStart(2,'0')}/${N} · turntable`; } }
  },
  horizontal:{
    build(c,node){ c.innerHTML=`<div class="hz"><div class="hz-strip">`
        +node.panels.map(pn=>`<div class="hz-panel"><div class="yr">${pn.yr}</div><h3>${pn.t}</h3><p>${pn.d}</p></div>`).join('')
        +`<div class="hz-rule"></div></div><div class="hz-caret"></div><div class="hz-mark"></div></div>`;
      return {strip:c.querySelector('.hz-strip'), plates:[...c.querySelectorAll('.hz-panel')], mark:c.querySelector('.hz-mark')}; },
    // travel is driven by n.w (read-beat applied), NOT raw p, so the opening plate
    // holds still through the beat before the galley pulls sideways. The caret is
    // fixed; the strip slides so the active plate's centre lands under it.
    paint(p,n){ const r=n.ctx, plates=r.plates, N=plates.length, vp=r.strip.parentElement, vpw=vp.clientWidth;
      // cache plate centres (offsetLeft is pre-transform, stable until a resize)
      if(vpw!==r.vpw){ r.vpw=vpw; r.first=plates[0].offsetLeft+plates[0].offsetWidth/2;
        r.last=plates[N-1].offsetLeft+plates[N-1].offsetWidth/2; }
      const center=lerp(r.first, r.last, n.w);
      r.strip.style.transform=`translateX(${(vpw/2 - center).toFixed(2)}px)`;
      const i=clamp(Math.round(n.w*(N-1)),0,N-1);                       // the plate under the caret
      plates.forEach((el,k)=>el.classList.toggle('hz-on', k===i));
      // honest catalogue readout — real index/total + the real plate title
      setText(r.mark, `PLATE ${String(i+1).padStart(2,'0')} · ${String(N).padStart(2,'0')} — ${n.node.panels[i].t}`); }
  },
  // THE FREQUENCY TABLE — a frequency chart of the printer's case (ETAOIN SHRDLU)
  // redraws itself one sort at a time. The empty ruled table is read first; then the
  // bars grow in rank order. ONE scalar drives every consumer [LAW:one-source-of-truth].
  chart:{
    build(c,node){
      // the table geometry derives from ONE baseline + value scale, never hand-placed
      // y's [LAW:one-source-of-truth]; every bar and gridline shares this SVG frame so
      // a column provably stands on the axis. tuned at 200×100 viewBox.
      const X0=24, X1=192, BASE=78, TOP=16, VMAX=14, S=(BASE-TOP)/VMAX;
      const N=node.sorts.length, band=(X1-X0)/N, w=band*0.58;
      const grids=[0,4,8,12].map(v=>{ const y=(BASE-v*S).toFixed(2);
        return `<line class="ch-grid" x1="${X0}" y1="${y}" x2="${X1}" y2="${y}"/>`
          +`<text class="ch-tick" x="${X0-2.5}" y="${(+y+1.1).toFixed(2)}">${v}${v?'%':''}</text>`; }).join('');
      const bar=(s,i)=>{ const cx=X0+(i+0.5)*band;
        return `<rect class="ch-bar" x="${(cx-w/2).toFixed(2)}" y="${BASE}" width="${w.toFixed(2)}" height="0" rx="0.8"/>`
          +`<text class="ch-glyph" x="${cx.toFixed(2)}" y="${BASE+7}">${s.g}</text>`
          +`<text class="ch-val" x="${cx.toFixed(2)}" y="${BASE}">${s.v.toFixed(1)}%</text>`; };
      c.innerHTML=`<div class="ch"><svg class="ch-plate" viewBox="0 0 200 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">`
        +`<g class="ch-grids">${grids}</g>`
        +`<line class="ch-axis" x1="${X0}" y1="${TOP}" x2="${X0}" y2="${BASE}"/>`
        +`<line class="ch-axis" x1="${X0}" y1="${BASE}" x2="${X1}" y2="${BASE}"/>`
        +`<g class="ch-bars">${node.sorts.map(bar).join('')}</g>`
        +`</svg><div class="ch-lab"></div><div class="ch-cap"></div></div>`;
      const rects=[...c.querySelectorAll('.ch-bar')], vals=[...c.querySelectorAll('.ch-val')];
      // the resting caption names the subject by deriving the sort sequence from the
      // SAME data the bars use [LAW:one-source-of-truth] — split at the midpoint, where
      // the ETAOIN / SHRDLU break falls out of N/2; no second copy of the letters to drift.
      const g=node.sorts.map(s=>s.g), h=Math.ceil(N/2);
      const rest=`English letter frequency — ${g.slice(0,h).join(' ')} · ${g.slice(h).join(' ')}`;
      return {S, BASE, rest, bars:rects.map((rect,i)=>({rect, val:vals[i]})),
        lab:c.querySelector('.ch-lab'), cap:c.querySelector('.ch-cap')}; },
    paint(p,n){ const r=n.ctx, sorts=n.node.sorts, N=sorts.length;
      // the bars grow on n.w (read-beat applied), NOT raw p, so the empty ruled table
      // holds fully legible through the opening beat — the axes are read before any
      // sort is set. LINEAR in n.w → a steady one-at-a-time cadence matched to the
      // SET count (the mask/wipe lesson: an eased picture desyncs from a linear count).
      // Completes at 0.9 so the finished table stands alone for a reading tail.
      // ONE scalar (scaled) drives bar height, the live SET count, the highlighted
      // sort AND the caption [LAW:one-source-of-truth] — table, number and words can
      // never disagree (the caption derives from `scaled`, the same value as the bars).
      const scaled=clamp(n.w/0.9,0,1)*N, active=clamp(Math.floor(scaled),0,N-1);
      let drawn=0;
      r.bars.forEach((bz,i)=>{ const t=clamp(scaled-i,0,1), h=sorts[i].v*r.S*t;
        bz.rect.setAttribute('y',(r.BASE-h).toFixed(2)); bz.rect.setAttribute('height',h.toFixed(2));
        bz.val.setAttribute('y',(r.BASE-h-2.4).toFixed(2)); bz.val.style.opacity=t.toFixed(3);
        bz.rect.classList.toggle('live', i===active); if(t>=1) drawn++; });
      setText(r.lab, `LETTER FREQUENCY · ${drawn}/${N} SET`);
      // at rest the caption is honest subject identity; once a sort begins it names
      // the sort being set — derived from the SAME `scaled` as the bars, never raw p.
      setText(r.cap, scaled>0 ? sorts[active].c : r.rest); }
  },

  // a STEREO SPECIMEN — specimen furniture spread across depth planes; scroll pulls
  // them out of register so near planes outrun far ones and the sheet opens into depth
  parallax:{
    build(c){
      // each plane's depth d (0 far → 1 near) drives drift, scale, opacity and blur
      // from ONE scalar [LAW:one-source-of-truth]; only drift moves on scroll, the
      // rest is baked here. Back-to-front order so nearer planes layer over farther.
      const planes=[
        {d:0.12, cls:'px-glyph', t:'R',                   x:6,  y:6,  fs:'52cqw'},
        {d:0.30, cls:'px-scale', t:'12 · 18 · 24 · 36 · 48 · 60', x:16, y:79, fs:'4.4cqw'},
        {d:0.48, cls:'px-rule',  t:'',                    x:12, y:50, w:'58cqw'},
        {d:0.66, cls:'px-num',   t:'48',                  x:64, y:16, fs:'27cqw'},
        {d:0.82, cls:'px-chip',  t:'',                    x:25, y:62, w:'8cqw', h:'8cqw'},
        {d:1.00, cls:'px-glyph', t:'&',                   x:57, y:53, fs:'18cqw'},
      ];
      const html=planes.map(pl=>{
        const drift=lerp(5,36,pl.d);                 // % of own box; near drifts most
        const op   =lerp(0.16,1,pl.d);               // far planes fade — atmosphere
        const blur =lerp(2.2,0,pl.d).toFixed(2);     // far planes soften — depth of field
        const sc   =lerp(0.82,1.06,pl.d).toFixed(3); // near planes a touch larger
        const style=`left:${pl.x}%;top:${pl.y}%;`+
          (pl.fs?`font-size:${pl.fs};`:'')+(pl.w?`width:${pl.w};`:'')+(pl.h?`height:${pl.h};`:'')+
          `opacity:${op.toFixed(3)};filter:blur(${blur}px);scale:${sc};`;
        return `<div class="px-el ${pl.cls}" style="${style}" data-drift="${drift.toFixed(2)}">${pl.t}</div>`;
      }).join('');
      c.innerHTML=`<div class="px"><div class="px-grid"></div>${html}`+
        `<div class="px-lab"></div>`+
        `<div class="px-cap">near planes outrun far — depth is the difference in speed</div></div>`;
      return {grid:c.querySelector('.px-grid'),
              els:[...c.querySelectorAll('.px-el')].map(el=>({el, drift:+el.dataset.drift})),
              lab:c.querySelector('.px-lab'), N:planes.length}; },
    paint(p,n){ const r=n.ctx;
      // pure differential drift: each plane rises by its own depth-scaled amount, so
      // the planes pull out of register — depth from the difference in speed. translateY
      // is % of each plane's OWN box (its drift coefficient); the grid is slowest of all.
      r.grid.style.transform=`translateY(${-2.5*p}%)`;
      for(const {el,drift} of r.els) el.style.transform=`translateY(${-drift*p}%)`;
      // honest live readout: the real depth SPREAD, 0 at rest → 100% at full pull. High
      // frequency → textContent direct, not setText (its fade would flicker every frame).
      // raw p, not n.w — a live readout of the ambient drift you can see; see read-beat SCOPE note.
      r.lab.textContent=`PARALLAX · ${r.N} PLANES · SPREAD ${Math.round(p*100)}%`; }
  },

  // THE KNOCKOUT — a circular aperture is cut through the SURFACE plate to uncover the
  // SUBSTRATE printed beneath; the same eased scalar drives the knockout, its cut edge,
  // and the readout. The cut waits out the read-beat so "the surface" is read whole first.
  mask:{
    build(c,node){
      c.innerHTML=`<div class="mk"><div class="mk-layer mk-under">${node.under||"underneath"}</div>`+
        `<div class="mk-layer mk-over">${node.over||"the surface"}</div>`+
        `<div class="mk-cut"></div><div class="mk-lab"></div><div class="mk-cap"></div></div>`;
      return {mk:c.querySelector('.mk'), over:c.querySelector('.mk-over'),
              lab:c.querySelector('.mk-lab'), cap:c.querySelector('.mk-cap')}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps;
      // the cut opens on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the surface
      // HOLDS STILL fully legible through the opening beat before the knockout starts —
      // bmf: "there needs to be room for it to breathe". A quadratic EASE-IN (t*t) keeps
      // the first nick gentle so the surface reads on PAST the dwell, then the cut
      // accelerates; this aligns the picture to the three captions (whole → cutting →
      // beneath) instead of finishing the cut while the caption still says "read it
      // whole". It completes at 0.85 so the substrate stands alone for a reading tail.
      const t=clamp(n.w/0.85,0,1), open=t*t;
      // ONE scalar drives the knockout radius, its cut-edge ring, AND the readout
      // [LAW:one-source-of-truth] — set on the scene root so both consumers inherit it.
      // 0→112% sweeps the cut fully past the corner so the surface is entirely knocked
      // out and the substrate is clean; the number can never disagree with the hole.
      r.mk.style.setProperty('--r', (open*112).toFixed(2)+'%');
      // honest live readout: the aperture's open fraction, the SAME scalar that opens it.
      // High frequency → textContent direct, not setText (its fade would flicker every
      // frame; the frame-sequence/parallax lesson). Reads n.w, like the picture it reports.
      r.lab.textContent=`APERTURE ${Math.round(open*100)}% · THE SURFACE → UNDERNEATH`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },

  // THE PROOF — a proofing blade sweeps the loose grey DRAFT into the tight jade
  // SPECIMEN: a LINEAR travelling boundary between two full states of the SAME word
  // (deliberately distinct from mask's RADIAL knockout). bmf: "before/after is boring
  // — make it longer AND give it a twist": longer via tempo 'movement' (the palette's
  // longest breath); the twist is the print-proof reading — grey→jade ink, loose→
  // tight tracking, a baseline rule drawing in behind a wet-ink blade edge.
  wipe:{
    build(c,node){
      c.innerHTML=`<div class="wp"><div class="wp-layer wp-a">${node.word||"proof"}</div>`+
        `<div class="wp-layer wp-b">${node.word||"proof"}</div>`+
        `<div class="wp-div"></div><div class="wp-lab"></div><div class="wp-cap"></div></div>`;
      return {wp:c.querySelector('.wp'), lab:c.querySelector('.wp-lab'), cap:c.querySelector('.wp-cap')}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps;
      // the blade sweeps on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the
      // grey draft HOLDS STILL fully legible through the opening beat before the proof
      // is pulled — bmf: "room to breathe". LINEAR in n.w (a press blade moves at
      // CONSTANT speed — the honest metaphor) so it stays aligned with the linear
      // stepIdx captions: an easeOut would front-load the picture and desync the
      // wording (the mask lesson). Completes at 0.85 → a reading tail with the
      // finished specimen standing alone.
      const sweep=clamp(n.w/0.85,0,1);
      // ONE scalar drives the clip, the blade position, AND the readout
      // [LAW:one-source-of-truth] — set on the scene root so both CSS consumers
      // inherit it; the blade can never leave the reveal edge.
      r.wp.style.setProperty('--s', (sweep*100).toFixed(2)+'%');
      // honest live readout: the sweep fraction, the SAME scalar that moves the blade.
      // High frequency → textContent direct, not setText (its fade would flicker every
      // frame; the frame-sequence/parallax lesson). Reads n.w, like the picture.
      r.lab.textContent=`PROOF ${Math.round(sweep*100)}% · DRAFT → SET`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },

  // a drafting pen inks a line over its own faint plan. The ink fills along the
  // shared curve via stroke-dashoffset (the draw IS the dash uncovering), the nib
  // rotates to the tangent so it points the way it travels, and the wet bead rides
  // the leading point. One D string for guide and ink keeps them a single line
  // [LAW:one-source-of-truth] — the plan and the inked line can never diverge.
  draw:{
    build(c){ const d="M3,46 C20,46 22,12 34,14 S52,44 64,30 80,8 97,12";
      c.innerHTML=`<div class="dw"><svg viewBox="0 0 100 56" preserveAspectRatio="xMidYMid meet">`
        +`<path class="dw-guide" d="${d}"/><path class="dw-ink" d="${d}"/>`
        +`<g class="dw-nib"><path d="M0,0 L-4.6,-2.5 L-3,0 L-4.6,2.5 Z"/></g>`
        +`<circle class="dw-bead" r="1.7"/></svg></div><div class="scene-cap"></div>`;
      return {ink:c.querySelector('.dw-ink'), nib:c.querySelector('.dw-nib'), bead:c.querySelector('.dw-bead'), cap:c.querySelector('.scene-cap'), len:0}; },
    paint(p,n){ const ink=n.ctx.ink; if(!n.ctx.len){ const L=ink.getTotalLength(); if(!L) return; n.ctx.len=L; ink.style.strokeDasharray=L; }
      const L=n.ctx.len, at=L*p; ink.style.strokeDashoffset=L*(1-p);
      const tip=ink.getPointAtLength(at), back=ink.getPointAtLength(clamp(at-0.6,0,L));
      const ang=Math.atan2(tip.y-back.y, tip.x-back.x)*180/Math.PI;
      n.ctx.nib.setAttribute('transform',`translate(${tip.x.toFixed(2)},${tip.y.toFixed(2)}) rotate(${ang.toFixed(1)})`);
      n.ctx.bead.setAttribute('cx',tip.x.toFixed(2)); n.ctx.bead.setAttribute('cy',tip.y.toFixed(2));
      setText(n.ctx.cap, "an inked line, laid to exactly where you've scrolled"); }
  },

  // FIGURES TICK UP — the gallery's thesis as arithmetic: one alphabet explodes
  // into the forms it can spell, the figures rolling toward each target on scroll.
  // The "data" scene of the gallery, so it keeps its warm amber identity and bare
  // figures rather than the jade specimen frame — its distinctness is the count.
  count:{
    build(c,node){
      // only the base alphabet is authored; each figure's target is base**exp, so
      // the explosion is one fact, not three literals that could drift [LAW:one-source-of-truth].
      const targets=node.stats.map(s=>node.base**s.exp);
      c.innerHTML=`<div class="cnt">${node.stats.map(s=>`<div class="cnt-stat"><div class="cnt-num">0</div><div class="cnt-lab">${s.lab}</div></div>`).join('')}</div>`;
      return {nums:[...c.querySelectorAll('.cnt-num')], targets}; },
    // ONE scalar (easeOut(n.w)) drives every figure, so they roll in lockstep and
    // none can disagree with the others [LAW:one-source-of-truth].
    paint(p,n){ const e=easeOut(n.w);
      n.ctx.nums.forEach((el,i)=>{ el.textContent=group(Math.round(n.ctx.targets[i]*e)); }); }
  },

  // each word kindles in turn — a warm ember bloom travels the sentence as you
  // scroll (the spark), trailing a smooth dim→lit fade; ahead-read words settle to
  // cool white. One scalar (n.w) sets the head position; the bloom is a bell curve
  // on each word's local ignition, so the lit edge reads as ONE travelling light.
  // [LAW:one-source-of-truth] the ember rgb is read from the node's accent token,
  // never duplicated; dim/lit are the painter's two named endpoints.
  typewriter:{
    build(c,node){ const words=node.text.split(' ');
      c.innerHTML=`<div class="tw"><p class="tw-p">${words.map(w=>`<span class="w">${w}</span>`).join(' ')}</p></div>`;
      return {words:[...c.querySelectorAll('.w')], acc:hexRGB(accentOf(node.accent)), dim:[58,54,69], lit:[241,238,249]}; },
    paint(p,n){ const {words,acc,dim,lit}=n.ctx, head=clamp(n.w/0.92,0,1)*words.length;
      words.forEach((w,i)=>{ const t=clamp(head-i,0,1), g=t*(1-t)*4;          // t: this word's ignition 0→1; g: ember bloom, peaks mid-ignition
        const r =lerp(lerp(dim[0],lit[0],t),acc[0],g*0.6),                    // dim→lit by t, then warmed toward ember by the bloom
              gr=lerp(lerp(dim[1],lit[1],t),acc[1],g*0.6),
              b =lerp(lerp(dim[2],lit[2],t),acc[2],g*0.6);
        w.style.color=`rgb(${r|0},${gr|0},${b|0})`;
        w.style.textShadow = g>0.01 ? `0 0 ${(5+g*15).toFixed(1)}px rgba(${acc[0]},${acc[1]},${acc[2]},${(g*0.8).toFixed(3)})` : 'none'; }); }
  },

  // full-bleed colour field swells
  // FULL BLEED — the specimen frame broken. The ink panel floods from a paper margin
  // out past the sheet edge; the crop marks and catalogue label (the furniture that
  // lives in the margin) are buried by OCCLUSION as it goes. ONE scalar (--bleed)
  // owns the inset AND the readout, so the figure can never disagree with the picture
  // [LAW:one-source-of-truth]. The field takes over, not the word — the headline holds
  // its size; the motion is the ink crossing the trim, the thing the form actually is.
  takeover:{
    build(c,node){ c.innerHTML=`<div class="tk"><div class="tk-lab"></div><div class="tk-ink"><div class="tk-word">${node.word||"takeover"}</div></div><div class="tk-cap"></div></div>`;
      return {ink:c.querySelector('.tk-ink'), lab:c.querySelector('.tk-lab'), cap:c.querySelector('.tk-cap')}; },
    paint(p,n){ const e=clamp(p/0.9,0,1), s=e*e*(3-2*e);   // smoothstep, complete at 0.9: the plate
      // reads as a contained specimen before the flood starts, then settles into a held full bleed
      n.ctx.ink.style.setProperty('--bleed', `${lerp(16,-8,s).toFixed(2)}%`);   // paper margin → past the trim
      n.ctx.lab.textContent=`BLEED · ${Math.round(s*100)}%`;                     // direct write: a fast readout carries no per-tick fade
      setText(n.ctx.cap, "Past the trim, no margin — full bleed."); }
  },

  // ---- text-as-graphic painters: the words themselves are the picture ----
  ring:{
    // concentric NESTED rings — a ring that holds a ring that holds a ring. Each ring
    // is one nesting level; they fill outer→inner in turn (pathLength=100 normalises
    // every radius to the same 0..100 fill), and the centre counts how deep the
    // nesting has reached — the containment idea, drawn in the round.
    build(c){ const radii=[44,31,18];
      const rings=radii.map(r=>`<circle class="rg-bg" cx="50" cy="50" r="${r}"/><circle class="rg-fg" cx="50" cy="50" r="${r}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`).join('');
      c.innerHTML=`<div class="rg"><div class="rg-rings"><svg viewBox="0 0 100 100">${rings}</svg><div class="rg-num">0</div></div><div class="rg-cap"></div></div>`;
      return {fg:[...c.querySelectorAll('.rg-fg')], num:c.querySelector('.rg-num'), cap:c.querySelector('.rg-cap')}; },
    paint(p,n){ const s=n.node.steps, fg=n.ctx.fg, R=fg.length;
      // ring k owns the scroll slice [k/R,(k+1)/R]; depth = how many have begun filling
      let depth=0;
      fg.forEach((el,k)=>{ const t=clamp((p - k/R)/(1/R),0,1); el.style.strokeDashoffset=100*(1-t); if(t>0) depth=k+1; });
      n.ctx.num.textContent=depth;
      setText(n.ctx.cap, s[stepIdx(n.w,s.length)]); }
  },
  scaleword:{
    // the punch-word lands inside concentric frame-echoes — the same nested-window
    // glyph the depth dive ends on — that ignite outer→inner as the node scrolls,
    // so the nest assembles behind the words before the chain has shown its hand.
    build(c){ const F=5;
      const frames=Array.from({length:F},()=>'<div class="scw-fr"></div>').join('');
      c.innerHTML=`<div class="scw"><div class="scw-nest">${frames}</div><div class="scw-cap"></div></div>`;
      const fr=[...c.querySelectorAll('.scw-fr')];
      fr.forEach((el,i)=>{ el.style.transform=`translate(-50%,-50%) scale(${1 - i*0.17})`; });   // concentric, receding inward
      return {cap:c.querySelector('.scw-cap'), fr, cur:-1}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), fr=n.ctx.fr, F=fr.length;
      // frames ignite with raw scroll (ambient) — outer frames brighter, inner fainter, so depth reads
      const lit=Math.round(clamp(p,0,1)*F);
      fr.forEach((el,k)=>el.style.opacity = k<lit ? (1 - k*0.16) : 0);
      if(n.ctx.cur===i) return; n.ctx.cur=i;
      n.ctx.cap.textContent=s[i]; if(!REDUCE_MOTION) n.ctx.cap.animate([{opacity:0,transform:'scale(1.35)'},{opacity:1,transform:'scale(1)'}],{duration:MOTION.ms.pop,easing:MOTION.ease.land}); }
  },
  // a syntax-lit editor that types the sticky rule character-by-character. paint
  // only WRITES state (innerHTML / textContent / class) — the caret blink is a CSS
  // @keyframes gated by the global reduced-motion kill, not an imperative branch.
  terminal:{
    build(c,node){ const tok=tmTokenize(node.steps), total=tok.reduce((a,segs)=>a+tmLen(segs),0);
      c.innerHTML=`<div class="tm"><div class="tm-top"><span class="tm-dots"><i></i><i></i><i></i></span><span class="tm-file">sticky<b>.css</b></span></div>`
        +`<div class="tm-pane"><div class="tm-code"></div></div>`
        +`<div class="tm-bar"><span class="tm-lang">CSS</span><span class="tm-pos">Ln 1, Col 1</span><span class="tm-save">typing…</span></div></div>`;
      return {code:c.querySelector('.tm-code'), pos:c.querySelector('.tm-pos'), save:c.querySelector('.tm-save'), tok, total, cur:-1}; },
    paint(p,n){ const tok=n.ctx.tok, total=n.ctx.total;
      const typed=Math.round(clamp(n.w/0.92,0,1)*total);   // text animates in → reads from n.w (waits out the read-beat)
      if(n.ctx.cur===typed) return; n.ctx.cur=typed;
      const rows=[]; let rem=typed, curLine=0, curCol=0;
      for(let li=0; li<tok.length; li++){
        if(rem<=0 && li>0) break;                          // this line hasn't started typing yet
        const len=tmLen(tok[li]), take=clamp(rem,0,len);
        rows.push(`<b class="tm-no">${li+1}</b><span class="tm-ln">${tmReveal(tok[li],take)}__CARET__</span>`);
        curLine=li; curCol=take; rem-=take;
        if(take<len) break;                                // partial line — the caret lives here
      }
      const last=rows.length-1;                            // caret + current-row highlight ride the last typed line
      n.ctx.code.innerHTML=rows.map((r,k)=>`<div class="tm-row${k===last?' cur':''}">${r.replace('__CARET__', k===last?'<span class="tm-caret"></span>':'')}</div>`).join('');
      const done=typed>=total;
      n.ctx.pos.textContent=`Ln ${curLine+1}, Col ${curCol+1}`;
      n.ctx.save.textContent=done?'saved':'typing…'; n.ctx.save.classList.toggle('done', done); }
  },
  shapemorph:{
    // a square that holds a smaller copy of itself, three deep; every level morphs in
    // lockstep (same radius + hue), so the figure is self-similar and the caption's
    // "holds another" is literally on the screen. Each level rides its parent's turn
    // and adds its own, so the nested copies wheel within the whole.
    build(c){ c.innerHTML=`<div class="shm"><div class="shm-shape"><div class="shm-shape"><div class="shm-shape"></div></div></div><div class="shm-cap"></div></div>`;
      return {shapes:[...c.querySelectorAll('.shm-shape')], cap:c.querySelector('.shm-cap')}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), t=s.length<2?n.w:i/(s.length-1);
      const r=lerp(8,50,t)+'%', hue=Math.round(lerp(250,288,t));   // stays in the iris/violet family the whole movement wears — never drifts off-palette
      n.ctx.shapes.forEach((el,k)=>{ el.style.borderRadius=r; el.style.transform=`rotate(${t*135}deg)`;
        el.style.background=`hsl(${hue} 72% ${62-k*8}%)`; });   // inner levels a shade deeper, so the nesting reads
      setText(n.ctx.cap, s[i]); }
  },

  // ---- image-based painters: one still picture, scroll works it ----
  // push into a single frame; the detail was always there
  // THE LOUPE — a uniform push into one showpiece glyph; the fine print set into its
  // counter from frame 0 grows into legibility purely by magnification ("always there")
  zoom:{
    build(c,node){
      c.innerHTML=`<div class="zm"><div class="zm-stage"><div class="zm-g">${node.glyph||'g'}</div>`+
        `<div class="zm-fine">${node.fine||'hamburgefonstiv'}</div></div>`+
        `<div class="zm-loupe"></div><div class="zm-lab"></div><div class="zm-cap"></div></div>`;
      return {stage:c.querySelector('.zm-stage'), lab:c.querySelector('.zm-lab'),
              cap:c.querySelector('.zm-cap'), basePt:node.pt||18, max:node.power||9}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps, e=easeOut(n.w);
      // ONE uniform scale about the fixed focal origin — the Ken Burns push. The push is
      // gated on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the glyph HOLDS
      // STILL at full size through the opening beat ("one glyph, set at eighteen point")
      // before the descent begins — the horizontal-node precedent for a graphic that
      // should wait out the read. The eased scale scalar then drives BOTH the transform
      // and the readout [LAW:one-source-of-truth], so the number can never disagree with
      // the picture; because the picture itself waits on n.w, so does its readout.
      const scale=lerp(1,r.max,e);
      r.stage.style.transform=`scale(${scale.toFixed(3)})`;
      // honest live readout: loupe power + the specimen size-scale climb, derived from
      // the same scale. High-frequency → textContent direct, not setText (its fade would
      // flicker every frame; the frame-sequence/parallax lesson).
      r.lab.textContent=`LOUPE ×${scale.toFixed(1)} · ${r.basePt}→${Math.round(r.basePt*scale)} PT`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },
  // THE EM — type's unit of measure, mostly air. A 10×10 unit grid IS the em
  // square (100 units); it fills in reading order to the MEASURED set width of a
  // specimen serif sort — its advance as a share of the em, taken from the very
  // font on screen, never an asserted figure. The lit cells are the sort's body;
  // the outlined dark remainder is the side-bearing air that spaces type. Its OWN
  // mechanic: a unit grid that FILLS to a part-of-whole — distinct from chart's
  // bars that GROW on an axis, from annotate's callouts, from the rest.
  waffle:{
    build(c,node){
      // the set width is measured ONCE from the rendered serif [FRAMING:representation]
      // — advance ÷ font-size IS its share of the em, so the count can never drift
      // from the glyph (no second copy to re-type). canvas is build-time only (pure
      // compute, no per-frame work); a missing 2d context breaks loud [LAW:no-silent-failure].
      const F=200, mc=document.createElement('canvas').getContext('2d');
      if(!mc) throw new Error(`waffle "${node.glyph}": no 2d context to measure set width`);
      mc.font=`${F}px Georgia, "Times New Roman", serif`;
      const units=clamp(Math.round(mc.measureText(node.glyph).width/F*100),1,100);
      c.innerHTML=`<div class="wf"><div class="wf-stage"><div class="wf-spec">${node.glyph}</div>`
        +`<div class="wf-grid">${Array.from({length:100},()=>'<i class="wf-cell"></i>').join('')}</div></div>`
        +`<div class="wf-lab"></div><div class="wf-cap"></div></div>`;
      return {units, cells:[...c.querySelectorAll('.wf-cell')],
        lab:c.querySelector('.wf-lab'), cap:c.querySelector('.wf-cap'), glyph:node.glyph}; },
    paint(p,n){ const r=n.ctx;
      // fills on n.w (read-beat applied), NOT raw p, so the empty em grid is read
      // whole through the opening beat — the field is the em, taken in before any
      // unit lights (the chart/annotate beat). LINEAR in n.w to 0.9 → a steady
      // tally that settles for a reading tail. ONE scalar (scaled) drives the lit
      // count, the live readout AND when the caption turns from identity to lesson
      // [LAW:one-source-of-truth] — picture, number and words cannot disagree.
      const scaled=clamp(n.w/0.9,0,1)*r.units, lit=clamp(Math.floor(scaled),0,r.units);
      r.cells.forEach((el,i)=>el.classList.toggle('on', i<lit));
      setText(r.lab, `THE EM · SET ${lit}/100 UNITS`);
      // at rest the caption is honest specimen identity; the lesson appears only
      // once a unit actually lights — gated on lit>0, the SAME condition the cells
      // toggle on, so the empty grid, the 0/100 readout and the resting caption
      // turn together [LAW:one-source-of-truth]. words only; the figure lives once
      // in the readout above.
      setText(r.cap, lit>0
        ? `set width — the share of the em a sort is cast on; the rest is the air that keeps letters apart`
        : `“${r.glyph}” on the em — type’s own square`); }
  },
  // THE ANATOMY PLATE — anatomical callouts land one at a time on a held specimen word.
  annotate:{
    build(c,node){
      // the four metric rules derive from ONE font-size + baseline [LAW:one-source-of-truth];
      // Georgia's em ratios place each rule on the rendered glyph, never hand-tuned y's.
      const F=30, B=58, G={asc:0.70, xh:0.48, desc:0.21};
      const rules=[['ASCENDER',B-G.asc*F],['X-HEIGHT',B-G.xh*F],['BASELINE',B],['DESCENDER',B+G.desc*F]];
      const rule=([t,y])=>`<line class="an-rule" x1="18" y1="${y.toFixed(2)}" x2="182" y2="${y.toFixed(2)}"/>`
        +`<text class="an-mtag" x="16" y="${(y+0.9).toFixed(2)}">${t}</text>`;
      // a callout: leader from the glyph target to the margin term, a target ring, the term.
      const call=pn=>`<g class="an-call"><line class="an-lead" x1="${pn.tx}" y1="${pn.ty}" x2="${pn.lx}" y2="${(pn.ly+(pn.ly<50?2.4:-3.2)).toFixed(2)}"/>`
        +`<circle class="an-tgt" cx="${pn.tx}" cy="${pn.ty}" r="1.4"/>`
        +`<text class="an-term" x="${pn.lx}" y="${pn.ly}">${pn.t}</text></g>`;
      c.innerHTML=`<div class="an"><svg class="an-plate" viewBox="0 0 200 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">`
        +`<g class="an-rules">${rules.map(rule).join('')}</g>`
        +`<text class="an-word" x="100" y="${B}">${node.word}</text>`
        +`<g class="an-calls">${node.pins.map(call).join('')}</g>`
        +`</svg><div class="an-lab"></div><div class="an-cap"></div></div>`;
      // set the serif face in JS — a quoted family in an inline attribute closes it and
      // silently drops to default (the deck/frame-sequence silent-fallback lesson).
      c.querySelector('.an-word').style.fontFamily='Georgia, "Times New Roman", serif';
      return {calls:[...c.querySelectorAll('.an-call')], lab:c.querySelector('.an-lab'),
        cap:c.querySelector('.an-cap'), word:node.word}; },
    paint(p,n){ const pins=n.node.pins, r=n.ctx;
      // callouts land on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the word
      // holds still on its metric rules through the opening beat — the specimen is read
      // whole before any part is named. LINEAR in n.w → a steady, deliberate cadence
      // (one part at a time), completing at 0.9 so the last term is read in the hold.
      // ONE scalar (shown) drives BOTH which callouts are on AND the honest count
      // readout [LAW:one-source-of-truth] — the number can never disagree with the plate.
      const shown=Math.round(clamp(n.w/0.9,0,1)*pins.length);
      r.calls.forEach((el,i)=>el.classList.toggle('on', i<shown));
      setText(r.lab, `ANATOMY OF TYPE · ${shown}/${pins.length} NAMED`);
      // at rest the caption is honest specimen identity (the real word + face), not a
      // meta line about the form; once parts arrive it states the current part's term.
      setText(r.cap, shown ? pins[shown-1].c : `“${r.word}” — set in Georgia`); }
  },
  // a graduated measurement instrument — a 240° dial whose needle measures runway
  // length (a taller sticky track is a longer pin). The dial FACE is a constant
  // 0–100 proportion scale: that is exactly what the needle position geometrically
  // IS, so the baked tick labels can never go stale or fabricate a px figure. The
  // single px reading lives in the LCD and is the node's OWN runway height (n.h —
  // the run element the engine's measure() reads), the real scene geometry, not a
  // fabricated scale. So "runway length in px" has ONE representation (n.h,
  // recomputed on resize), with no second scale to drift from the real track.
  // [LAW:one-source-of-truth] [LAW:dataflow-not-control-flow] tick/label geometry
  // derives from one polar() helper — angles flow to coordinates, never hand-placed.
  gauge:{
    build(c){ const SEG=5, A=120, MINOR=5;   // ±A° → a 240° sweep; SEG segments → a clean 0–100 face
      const polar=(deg,r)=>[(50+r*Math.sin(deg*Math.PI/180)).toFixed(2), (50-r*Math.cos(deg*Math.PI/180)).toFixed(2)];
      const arc=r=>{ const a=polar(-A,r), b=polar(A,r); return `M ${a[0]} ${a[1]} A ${r} ${r} 0 1 1 ${b[0]} ${b[1]}`; };   // 240°>180° → large-arc
      let ticks='', nums='';
      for(let i=0;i<=SEG*MINOR;i++){ const f=i/(SEG*MINOR), maj=i%MINOR===0, deg=lerp(-A,A,f);
        const o=polar(deg,41), inr=polar(deg, maj?34:37);
        ticks+=`<line class="gg-tick${maj?' maj':''}" x1="${o[0]}" y1="${o[1]}" x2="${inr[0]}" y2="${inr[1]}"/>`;
        if(maj){ const lp=polar(deg,46.5); nums+=`<text class="gg-num" x="${lp[0]}" y="${lp[1]}">${Math.round(f*100)}</text>`; } }
      c.innerHTML=`<div class="gg"><div class="gg-inst"><svg viewBox="0 0 100 100">`
        +`<circle class="gg-bezel" cx="50" cy="50" r="48.5"/>`
        +`<path class="gg-arc" d="${arc(38)}"/>`
        +`<path class="gg-fill" d="${arc(38)}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`
        +`<g class="gg-ticks">${ticks}</g>${nums}`
        +`<text class="gg-face" x="50" y="63">% pinned</text>`
        +`<g class="gg-needle"><line class="gg-n-tail" x1="50" y1="50" x2="50" y2="59"/>`
        +`<line class="gg-n-main" x1="50" y1="50" x2="50" y2="15"/><circle class="gg-n-tip" cx="50" cy="15" r="2.4"/></g>`
        +`<circle class="gg-hub" cx="50" cy="50" r="4"/></svg>`
        +`<div class="gg-lcd"><span class="gg-val">0</span><span class="gg-unit">px</span><span class="gg-lbl">runway</span></div>`
        +`</div><div class="gg-cap"></div></div>`;
      return {fill:c.querySelector('.gg-fill'), needle:c.querySelector('.gg-needle'),
        val:c.querySelector('.gg-val'), cap:c.querySelector('.gg-cap'), ang:A}; },
    paint(p,n){ const s=n.node.steps, r=n.ctx, deg=lerp(-r.ang,r.ang,p);
      r.fill.style.strokeDashoffset=100*(1-p);
      r.needle.setAttribute('transform',`rotate(${deg.toFixed(2)} 50 50)`);
      // needle + fill + LCD track scroll position (raw p, the instrument the reader
      // watches sweep); the caption is wording, so it waits on n.w (read-beat).
      // the px is this node's OWN runway from real layout: p*n.h is the pixels
      // scrolled into the scene's runway, n.h its full length. [LAW:one-source-of-truth]
      setText(r.val, String(Math.round(p*n.h/10)*10));
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },
  // scroll wired to animation — the connector energizes, a pulse rides it
  // the same oscilloscope in X-Y (Lissajous) mode: CH1 scroll on the X axis, CH2
  // animation on the Y axis, and a phosphor dot riding the y=x diagonal — a straight
  // diagonal IS the proof scroll and animation are bound 1:1 (animation-timeline).
  bind:{
    // [LAW:one-source-of-truth] x and y are the SAME p: the dot is plotted at (p,p),
    // the trace is the ideal diagonal revealed up to it, and the lock is read off
    // Δ=|x−y| (structurally 0) — never a second fabricated signal. The diagonal is a
    // consequence of the data, not an asserted decoration. [LAW:dataflow-not-control-flow]
    // paint writes state only; the dot's glow is a CSS @keyframes the global
    // reduced-motion kill stops.
    build(c){ c.innerHTML=`<div class="sc xy">`
      +`<div class="sc-tag tl">CH1 ▸ scroll</div><div class="sc-tag tr">CH2 ▸ animation</div>`
      +`<div class="xy-ideal"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="xy-vx"></div><div class="xy-hz"></div><div class="xy-dot"></div>`
      +`<div class="xy-note"></div>`
      +`<div class="sc-read"><span class="xy-co"></span><b class="xy-lock"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), vx:c.querySelector('.xy-vx'), hz:c.querySelector('.xy-hz'),
        dot:c.querySelector('.xy-dot'), co:c.querySelector('.xy-co'), lock:c.querySelector('.xy-lock'), note:c.querySelector('.xy-note')}; },
    paint(p,n){ const x=p, y=p, X=(x*100).toFixed(2), Y=((1-y)*100).toFixed(2);   // CH1=scroll→X, CH2=animation→Y; both ARE p
      n.ctx.trace.style.clipPath=`inset(0 ${((1-p)*100).toFixed(2)}% 0 0)`;        // reveal the diagonal up to the dot
      n.ctx.dot.style.left=X+'%'; n.ctx.dot.style.top=Y+'%';
      n.ctx.vx.style.left=X+'%'; n.ctx.vx.style.height=(y*100).toFixed(2)+'%';     // scroll's X projected up from the axis
      n.ctx.hz.style.top=Y+'%'; n.ctx.hz.style.width=(x*100).toFixed(2)+'%';       // animation's Y projected across from the axis
      // raw p, not n.w — these readouts report the live beam coordinates; see read-beat SCOPE note
      setText(n.ctx.co, `X ${x.toFixed(2)} · Y ${y.toFixed(2)} · Δ ${Math.abs(x-y).toFixed(2)}`);
      setText(n.ctx.lock, 'LOCKED 1:1');
      setText(n.ctx.note, p<.5 ? "animation-timeline binds them…" : "…a straight diagonal is 1:1. No JavaScript."); }
  },
  // the exploded assembly schematic: numbered part-plates thread onto a dash-dot
  // assembly axis and slide apart along it — the anatomy, exploded and annotated
  explode:{
    // each part foreshadows the descent: its colour is the accent FAMILY of the
    // section that movement opens, resolved from the one palette — so the exploded
    // map previews the journey the page is about to take. [LAW:one-source-of-truth]
    // the part NUMBER is derived from index, never stored — the manifest reads 01..N
    // straight off the data order. [LAW:dataflow-not-control-flow]
    build(c,node){ c.innerHTML=`<div class="xp"><div class="xp-stack"><i class="xp-spindle"></i>`
      +node.layers.map((l,i)=>`<div class="xp-layer" style="background:${accentOf(l.c)}"><b class="xp-no">${String(i+1).padStart(2,'0')}</b><span class="xp-nm">${l.t}</span></div>`).join('')
      +`</div><div class="xp-dim"><span class="xp-dim-bar"></span><span class="xp-dim-lab">exploded view</span></div></div><div class="scene-cap"></div>`;
      return {layers:[...c.querySelectorAll('.xp-layer')], cap:c.querySelector('.scene-cap'),
        spindle:c.querySelector('.xp-spindle'), dim:c.querySelector('.xp-dim')}; },
    paint(p,n){ const L=n.ctx.layers, mid=(L.length-1)/2, e=easeOut(p), a=clamp(e/0.3,0,1);
      L.forEach((el,i)=>{ el.style.transform=`translateZ(${(i-mid)*70*e}px)`; });
      // the schematic chrome draws itself on as the parts separate — at rest it reads
      // as one solid block, so the axis and dimension only appear once there's a gap
      // to annotate. raw-p-derived (the visual's own separation, not n.w).
      n.ctx.spindle.style.opacity=a;
      n.ctx.dim.style.opacity=a; n.ctx.dim.style.height=lerp(18,232,e)+'px';
      // raw p, not n.w — this caption reports the slab's separation you can see; see read-beat SCOPE note
      setText(n.ctx.cap, p<.5 ? "Looks like one thing." : "It's a stack of separable parts."); }
  },
  // an oscilloscope: the steps are a pulse train on a phosphor trace, the beam
  // sweeps with scroll, and each pulse crossing the TRIGGER LEVEL latches its
  // onStep — the IntersectionObserver shown as a scope trigger.
  trigger:{
    // [LAW:one-source-of-truth] trig (the trigger level, % from top) is authored
    // ONCE here. It flows JS→CSS via --sc-trig (the dashed line's top) AND JS→SVG
    // as the band the pulses must cross: each pulse peaks ABOVE trig and rests
    // BELOW it by construction (peak<trig<base), so "the beam swept past pulse i's
    // centre" IS "pulse i crossed the trigger" — the fired latch derives from that
    // one geometric fact, never a parallel threshold that could drift.
    // [LAW:dataflow-not-control-flow] the trace is built once from the data; paint
    // only reveals it (clip) and reads which centres the beam has passed.
    build(c,node){ const s=node.steps, N=s.length, trig=46, base=70, peak=24;
      const cen=s.map((_,i)=>(i+0.5)/N*100);   // each event's X (sweep time), segment centre
      let d=`M0,${base}`;
      cen.forEach(c0=>{ const hw=100/N*0.34;    // a rounded pulse: rests at base, crests at peak (above trig), back to base
        d+=` L${(c0-hw).toFixed(1)},${base} C${(c0-hw*0.5).toFixed(1)},${base} ${(c0-hw*0.5).toFixed(1)},${peak} ${c0.toFixed(1)},${peak}`
          +` C${(c0+hw*0.5).toFixed(1)},${peak} ${(c0+hw*0.5).toFixed(1)},${base} ${(c0+hw).toFixed(1)},${base}`; });
      d+=` L100,${base}`;
      c.innerHTML=`<div class="sc" style="--sc-trig:${trig}%">`
        +`<div class="sc-tag tl">CH1 ▸ onStep</div><div class="sc-tag tr">new IntersectionObserver()</div>`
        +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${d}"/></svg></div>`
        +`<div class="sc-trig"></div><div class="sc-beam"></div>`
        +s.map((_,i)=>`<div class="sc-ev" style="left:${cen[i].toFixed(1)}%; top:${peak-9}%">onStep(${i+1})</div>`).join('')
        +`<div class="sc-read"><span class="sc-now"></span><b class="sc-cnt"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), beam:c.querySelector('.sc-beam'),
        evs:[...c.querySelectorAll('.sc-ev')], now:c.querySelector('.sc-now'), cnt:c.querySelector('.sc-cnt'), cen}; },
    paint(p,n){ const s=n.node.steps, N=s.length, e=clamp(p/0.9,0,1);
      n.ctx.trace.style.clipPath=`inset(0 ${((1-e)*100).toFixed(2)}% 0 0)`;   // beam draws the trace
      n.ctx.beam.style.left=(e*100)+'%';
      let fired=0;
      n.ctx.evs.forEach((el,i)=>{ const on=e>=n.ctx.cen[i]/100; el.classList.toggle('fired',on); if(on) fired++; });
