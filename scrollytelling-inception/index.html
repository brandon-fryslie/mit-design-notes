  // ---- text-as-graphic painters: the words themselves are the picture ----
  ring:{
    // concentric NESTED rings — a ring that holds a ring that holds a ring. Each ring
    // is one nesting level; they fill outer→inner in turn (pathLength=100 normalises
    // every radius to the same 0..100 fill), and the centre counts how deep the
    // nesting has reached — the containment idea, drawn in the round.
    build(c){ const radii=[44,31,18];
      const rings=radii.map(r=>`<circle class="rg-bg" cx="50" cy="50" r="${r}"/><circle class="rg-fg" cx="50" cy="50" r="${r}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`).join('');
      c.innerHTML=`<div class="rg"><div class="rg-rings"><svg viewBox="0 0 100 100">${rings}</svg><div class="rg-num">0</div></div><div class="rg-cap"></div></div>`;
      return {fg:[...c.querySelectorAll('.rg-fg')], num:c.querySelector('.rg-num'), cap:c.querySelector('.rg-cap')}; },
    paint(p,n){ const s=n.node.steps, fg=n.ctx.fg, R=fg.length;
      // ring k owns the scroll slice [k/R,(k+1)/R]; depth = how many have begun filling
      let depth=0;
      fg.forEach((el,k)=>{ const t=clamp((p - k/R)/(1/R),0,1); el.style.strokeDashoffset=100*(1-t); if(t>0) depth=k+1; });
      n.ctx.num.textContent=depth;
      setText(n.ctx.cap, s[stepIdx(n.w,s.length)]); }
  },
  scaleword:{
    // the punch-word lands inside concentric frame-echoes — the same nested-window
    // glyph the depth dive ends on — that ignite outer→inner as the node scrolls,
    // so the nest assembles behind the words before the chain has shown its hand.
    build(c){ const F=5;
      const frames=Array.from({length:F},()=>'<div class="scw-fr"></div>').join('');
      c.innerHTML=`<div class="scw"><div class="scw-nest">${frames}</div><div class="scw-cap"></div></div>`;
      const fr=[...c.querySelectorAll('.scw-fr')];
      fr.forEach((el,i)=>{ el.style.transform=`translate(-50%,-50%) scale(${1 - i*0.17})`; });   // concentric, receding inward
      return {cap:c.querySelector('.scw-cap'), fr, cur:-1}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), fr=n.ctx.fr, F=fr.length;
      // frames ignite with raw scroll (ambient) — outer frames brighter, inner fainter, so depth reads
      const lit=Math.round(clamp(p,0,1)*F);
      fr.forEach((el,k)=>el.style.opacity = k<lit ? (1 - k*0.16) : 0);
      if(n.ctx.cur===i) return; n.ctx.cur=i;
      n.ctx.cap.textContent=s[i]; if(!REDUCE_MOTION) n.ctx.cap.animate([{opacity:0,transform:'scale(1.35)'},{opacity:1,transform:'scale(1)'}],{duration:MOTION.ms.pop,easing:MOTION.ease.land}); }
  },
  // a syntax-lit editor that types the sticky rule character-by-character. paint
  // only WRITES state (innerHTML / textContent / class) — the caret blink is a CSS
  // @keyframes gated by the global reduced-motion kill, not an imperative branch.
  terminal:{
    build(c,node){ const tok=tmTokenize(node.steps), total=tok.reduce((a,segs)=>a+tmLen(segs),0);
      c.innerHTML=`<div class="tm"><div class="tm-top"><span class="tm-dots"><i></i><i></i><i></i></span><span class="tm-file">sticky<b>.css</b></span></div>`
        +`<div class="tm-pane"><div class="tm-code"></div></div>`
        +`<div class="tm-bar"><span class="tm-lang">CSS</span><span class="tm-pos">Ln 1, Col 1</span><span class="tm-save">typing…</span></div></div>`;
      return {code:c.querySelector('.tm-code'), pos:c.querySelector('.tm-pos'), save:c.querySelector('.tm-save'), tok, total, cur:-1}; },
    paint(p,n){ const tok=n.ctx.tok, total=n.ctx.total;
      const typed=Math.round(clamp(n.w/0.92,0,1)*total);   // text animates in → reads from n.w (waits out the read-beat)
      if(n.ctx.cur===typed) return; n.ctx.cur=typed;
      const rows=[]; let rem=typed, curLine=0, curCol=0;
      for(let li=0; li<tok.length; li++){
        if(rem<=0 && li>0) break;                          // this line hasn't started typing yet
        const len=tmLen(tok[li]), take=clamp(rem,0,len);
        rows.push(`<b class="tm-no">${li+1}</b><span class="tm-ln">${tmReveal(tok[li],take)}__CARET__</span>`);
        curLine=li; curCol=take; rem-=take;
        if(take<len) break;                                // partial line — the caret lives here
      }
      const last=rows.length-1;                            // caret + current-row highlight ride the last typed line
      n.ctx.code.innerHTML=rows.map((r,k)=>`<div class="tm-row${k===last?' cur':''}">${r.replace('__CARET__', k===last?'<span class="tm-caret"></span>':'')}</div>`).join('');
      const done=typed>=total;
      n.ctx.pos.textContent=`Ln ${curLine+1}, Col ${curCol+1}`;
      n.ctx.save.textContent=done?'saved':'typing…'; n.ctx.save.classList.toggle('done', done); }
  },
  shapemorph:{
    // a square that holds a smaller copy of itself, three deep; every level morphs in
    // lockstep (same radius + hue), so the figure is self-similar and the caption's
    // "holds another" is literally on the screen. Each level rides its parent's turn
    // and adds its own, so the nested copies wheel within the whole.
    build(c){ c.innerHTML=`<div class="shm"><div class="shm-shape"><div class="shm-shape"><div class="shm-shape"></div></div></div><div class="shm-cap"></div></div>`;
      return {shapes:[...c.querySelectorAll('.shm-shape')], cap:c.querySelector('.shm-cap')}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), t=s.length<2?n.w:i/(s.length-1);
      const r=lerp(8,50,t)+'%', hue=Math.round(lerp(250,288,t));   // stays in the iris/violet family the whole movement wears — never drifts off-palette
      n.ctx.shapes.forEach((el,k)=>{ el.style.borderRadius=r; el.style.transform=`rotate(${t*135}deg)`;
        el.style.background=`hsl(${hue} 72% ${62-k*8}%)`; });   // inner levels a shade deeper, so the nesting reads
      setText(n.ctx.cap, s[i]); }
  },

  // ---- image-based painters: one still picture, scroll works it ----
  // push into a single frame; the detail was always there
  zoom:{
    build(c){ c.innerHTML=`<div class="zm"><div class="zm-img"></div><div class="zm-cap"></div></div>`;
      return {img:c.querySelector('.zm-img'), cap:c.querySelector('.zm-cap')}; },
    paint(p,n){ const s=n.node.steps, e=easeOut(p);
      n.ctx.img.style.transform=`scale(${lerp(1,2.5,e)}) translate(${lerp(0,-9,e)}%, ${lerp(0,-7,e)}%)`;
      setText(n.ctx.cap, s[stepIdx(n.w,s.length)]); }
  },
  // a unit grid fills toward a share
  waffle:{
    build(c){ c.innerHTML=`<div class="wf"><div class="wf-grid">${Array.from({length:100},()=>'<i class="wf-cell"></i>').join('')}</div><div class="wf-cap"></div></div>`;
      return {cells:[...c.querySelectorAll('.wf-cell')], cap:c.querySelector('.wf-cap')}; },
    paint(p,n){ const on=Math.round(easeOut(p)*100); n.ctx.cells.forEach((el,i)=>el.classList.toggle('on', i<on));
      // raw p, not n.w — the % must match the filled cells it reports; see read-beat SCOPE note
      setText(n.ctx.cap, on+'% '+(n.node.lab||'')); }
  },
  // labels pin onto one still image, one at a time (the satellite-annotation form)
  annotate:{
    build(c,node){ c.innerHTML=`<div class="an"><div class="an-terrain"></div>${node.pins.map(pn=>`<div class="an-pin" style="left:${pn.x}%;top:${pn.y}%"><div class="an-dot"></div><div class="an-lab">${pn.t}</div></div>`).join('')}<div class="an-cap"></div></div>`;
      return {pins:[...c.querySelectorAll('.an-pin')], cap:c.querySelector('.an-cap')}; },
    paint(p,n){ const pins=n.node.pins, shown=Math.round(clamp(n.w/0.9,0,1)*pins.length);
      n.ctx.pins.forEach((el,i)=>el.classList.toggle('on', i<shown));
      setText(n.ctx.cap, shown ? pins[shown-1].c : ''); }
  },
  // a graduated measurement instrument — a 240° dial whose needle measures runway
  // length (a taller sticky track is a longer pin). The dial FACE is a constant
  // 0–100 proportion scale: that is exactly what the needle position geometrically
  // IS, so the baked tick labels can never go stale or fabricate a px figure. The
  // single px reading lives in the LCD and is the node's OWN runway height (n.h —
  // the run element the engine's measure() reads), the real scene geometry, not a
  // fabricated scale. So "runway length in px" has ONE representation (n.h,
  // recomputed on resize), with no second scale to drift from the real track.
  // [LAW:one-source-of-truth] [LAW:dataflow-not-control-flow] tick/label geometry
  // derives from one polar() helper — angles flow to coordinates, never hand-placed.
  gauge:{
    build(c){ const SEG=5, A=120, MINOR=5;   // ±A° → a 240° sweep; SEG segments → a clean 0–100 face
      const polar=(deg,r)=>[(50+r*Math.sin(deg*Math.PI/180)).toFixed(2), (50-r*Math.cos(deg*Math.PI/180)).toFixed(2)];
      const arc=r=>{ const a=polar(-A,r), b=polar(A,r); return `M ${a[0]} ${a[1]} A ${r} ${r} 0 1 1 ${b[0]} ${b[1]}`; };   // 240°>180° → large-arc
      let ticks='', nums='';
      for(let i=0;i<=SEG*MINOR;i++){ const f=i/(SEG*MINOR), maj=i%MINOR===0, deg=lerp(-A,A,f);
        const o=polar(deg,41), inr=polar(deg, maj?34:37);
        ticks+=`<line class="gg-tick${maj?' maj':''}" x1="${o[0]}" y1="${o[1]}" x2="${inr[0]}" y2="${inr[1]}"/>`;
        if(maj){ const lp=polar(deg,46.5); nums+=`<text class="gg-num" x="${lp[0]}" y="${lp[1]}">${Math.round(f*100)}</text>`; } }
      c.innerHTML=`<div class="gg"><div class="gg-inst"><svg viewBox="0 0 100 100">`
        +`<circle class="gg-bezel" cx="50" cy="50" r="48.5"/>`
        +`<path class="gg-arc" d="${arc(38)}"/>`
        +`<path class="gg-fill" d="${arc(38)}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`
        +`<g class="gg-ticks">${ticks}</g>${nums}`
        +`<text class="gg-face" x="50" y="63">% pinned</text>`
        +`<g class="gg-needle"><line class="gg-n-tail" x1="50" y1="50" x2="50" y2="59"/>`
        +`<line class="gg-n-main" x1="50" y1="50" x2="50" y2="15"/><circle class="gg-n-tip" cx="50" cy="15" r="2.4"/></g>`
        +`<circle class="gg-hub" cx="50" cy="50" r="4"/></svg>`
        +`<div class="gg-lcd"><span class="gg-val">0</span><span class="gg-unit">px</span><span class="gg-lbl">runway</span></div>`
        +`</div><div class="gg-cap"></div></div>`;
      return {fill:c.querySelector('.gg-fill'), needle:c.querySelector('.gg-needle'),
        val:c.querySelector('.gg-val'), cap:c.querySelector('.gg-cap'), ang:A}; },
    paint(p,n){ const s=n.node.steps, r=n.ctx, deg=lerp(-r.ang,r.ang,p);
      r.fill.style.strokeDashoffset=100*(1-p);
      r.needle.setAttribute('transform',`rotate(${deg.toFixed(2)} 50 50)`);
      // needle + fill + LCD track scroll position (raw p, the instrument the reader
      // watches sweep); the caption is wording, so it waits on n.w (read-beat).
      // the px is this node's OWN runway from real layout: p*n.h is the pixels
      // scrolled into the scene's runway, n.h its full length. [LAW:one-source-of-truth]
      setText(r.val, String(Math.round(p*n.h/10)*10));
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },
  // scroll wired to animation — the connector energizes, a pulse rides it
  // the same oscilloscope in X-Y (Lissajous) mode: CH1 scroll on the X axis, CH2
  // animation on the Y axis, and a phosphor dot riding the y=x diagonal — a straight
  // diagonal IS the proof scroll and animation are bound 1:1 (animation-timeline).
  bind:{
    // [LAW:one-source-of-truth] x and y are the SAME p: the dot is plotted at (p,p),
    // the trace is the ideal diagonal revealed up to it, and the lock is read off
    // Δ=|x−y| (structurally 0) — never a second fabricated signal. The diagonal is a
    // consequence of the data, not an asserted decoration. [LAW:dataflow-not-control-flow]
    // paint writes state only; the dot's glow is a CSS @keyframes the global
    // reduced-motion kill stops.
    build(c){ c.innerHTML=`<div class="sc xy">`
      +`<div class="sc-tag tl">CH1 ▸ scroll</div><div class="sc-tag tr">CH2 ▸ animation</div>`
      +`<div class="xy-ideal"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="xy-vx"></div><div class="xy-hz"></div><div class="xy-dot"></div>`
      +`<div class="xy-note"></div>`
      +`<div class="sc-read"><span class="xy-co"></span><b class="xy-lock"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), vx:c.querySelector('.xy-vx'), hz:c.querySelector('.xy-hz'),
        dot:c.querySelector('.xy-dot'), co:c.querySelector('.xy-co'), lock:c.querySelector('.xy-lock'), note:c.querySelector('.xy-note')}; },
    paint(p,n){ const x=p, y=p, X=(x*100).toFixed(2), Y=((1-y)*100).toFixed(2);   // CH1=scroll→X, CH2=animation→Y; both ARE p
      n.ctx.trace.style.clipPath=`inset(0 ${((1-p)*100).toFixed(2)}% 0 0)`;        // reveal the diagonal up to the dot
      n.ctx.dot.style.left=X+'%'; n.ctx.dot.style.top=Y+'%';
      n.ctx.vx.style.left=X+'%'; n.ctx.vx.style.height=(y*100).toFixed(2)+'%';     // scroll's X projected up from the axis
      n.ctx.hz.style.top=Y+'%'; n.ctx.hz.style.width=(x*100).toFixed(2)+'%';       // animation's Y projected across from the axis
      // raw p, not n.w — these readouts report the live beam coordinates; see read-beat SCOPE note
      setText(n.ctx.co, `X ${x.toFixed(2)} · Y ${y.toFixed(2)} · Δ ${Math.abs(x-y).toFixed(2)}`);
      setText(n.ctx.lock, 'LOCKED 1:1');
      setText(n.ctx.note, p<.5 ? "animation-timeline binds them…" : "…a straight diagonal is 1:1. No JS."); }
  },
  // the exploded assembly schematic: numbered part-plates thread onto a dash-dot
  // assembly axis and slide apart along it — the anatomy, exploded and annotated
  explode:{
    // each part foreshadows the descent: its colour is the accent FAMILY of the
    // section that movement opens, resolved from the one palette — so the exploded
    // map previews the journey the page is about to take. [LAW:one-source-of-truth]
    // the part NUMBER is derived from index, never stored — the manifest reads 01..N
    // straight off the data order. [LAW:dataflow-not-control-flow]
    build(c,node){ c.innerHTML=`<div class="xp"><div class="xp-stack"><i class="xp-spindle"></i>`
      +node.layers.map((l,i)=>`<div class="xp-layer" style="background:${accentOf(l.c)}"><b class="xp-no">${String(i+1).padStart(2,'0')}</b><span class="xp-nm">${l.t}</span></div>`).join('')
      +`</div><div class="xp-dim"><span class="xp-dim-bar"></span><span class="xp-dim-lab">exploded view</span></div></div><div class="scene-cap"></div>`;
      return {layers:[...c.querySelectorAll('.xp-layer')], cap:c.querySelector('.scene-cap'),
        spindle:c.querySelector('.xp-spindle'), dim:c.querySelector('.xp-dim')}; },
    paint(p,n){ const L=n.ctx.layers, mid=(L.length-1)/2, e=easeOut(p), a=clamp(e/0.3,0,1);
      L.forEach((el,i)=>{ el.style.transform=`translateZ(${(i-mid)*70*e}px)`; });
      // the schematic chrome draws itself on as the parts separate — at rest it reads
      // as one solid block, so the axis and dimension only appear once there's a gap
      // to annotate. raw-p-derived (the visual's own separation, not n.w).
      n.ctx.spindle.style.opacity=a;
      n.ctx.dim.style.opacity=a; n.ctx.dim.style.height=lerp(18,232,e)+'px';
      // raw p, not n.w — this caption reports the slab's separation you can see; see read-beat SCOPE note
      setText(n.ctx.cap, p<.5 ? "Looks like one thing." : "It's a stack of separable parts."); }
  },
  // an oscilloscope: the steps are a pulse train on a phosphor trace, the beam
  // sweeps with scroll, and each pulse crossing the TRIGGER LEVEL latches its
  // onStep — the IntersectionObserver shown as a scope trigger.
  trigger:{
    // [LAW:one-source-of-truth] trig (the trigger level, % from top) is authored
    // ONCE here. It flows JS→CSS via --sc-trig (the dashed line's top) AND JS→SVG
    // as the band the pulses must cross: each pulse peaks ABOVE trig and rests
    // BELOW it by construction (peak<trig<base), so "the beam swept past pulse i's
    // centre" IS "pulse i crossed the trigger" — the fired latch derives from that
    // one geometric fact, never a parallel threshold that could drift.
    // [LAW:dataflow-not-control-flow] the trace is built once from the data; paint
    // only reveals it (clip) and reads which centres the beam has passed.
    build(c,node){ const s=node.steps, N=s.length, trig=46, base=70, peak=24;
      const cen=s.map((_,i)=>(i+0.5)/N*100);   // each event's X (sweep time), segment centre
      let d=`M0,${base}`;
      cen.forEach(c0=>{ const hw=100/N*0.34;    // a rounded pulse: rests at base, crests at peak (above trig), back to base
        d+=` L${(c0-hw).toFixed(1)},${base} C${(c0-hw*0.5).toFixed(1)},${base} ${(c0-hw*0.5).toFixed(1)},${peak} ${c0.toFixed(1)},${peak}`
          +` C${(c0+hw*0.5).toFixed(1)},${peak} ${(c0+hw*0.5).toFixed(1)},${base} ${(c0+hw).toFixed(1)},${base}`; });
      d+=` L100,${base}`;
      c.innerHTML=`<div class="sc" style="--sc-trig:${trig}%">`
        +`<div class="sc-tag tl">CH1 ▸ onStep</div><div class="sc-tag tr">new IntersectionObserver()</div>`
        +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${d}"/></svg></div>`
        +`<div class="sc-trig"></div><div class="sc-beam"></div>`
        +s.map((_,i)=>`<div class="sc-ev" style="left:${cen[i].toFixed(1)}%; top:${peak-9}%">onStep(${i+1})</div>`).join('')
        +`<div class="sc-read"><span class="sc-now"></span><b class="sc-cnt"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), beam:c.querySelector('.sc-beam'),
        evs:[...c.querySelectorAll('.sc-ev')], now:c.querySelector('.sc-now'), cnt:c.querySelector('.sc-cnt'), cen}; },
    paint(p,n){ const s=n.node.steps, N=s.length, e=clamp(p/0.9,0,1);
      n.ctx.trace.style.clipPath=`inset(0 ${((1-e)*100).toFixed(2)}% 0 0)`;   // beam draws the trace
      n.ctx.beam.style.left=(e*100)+'%';
      let fired=0;
      n.ctx.evs.forEach((el,i)=>{ const on=e>=n.ctx.cen[i]/100; el.classList.toggle('fired',on); if(on) fired++; });
      // raw e (p), not n.w — these readouts report the live sweep state; see read-beat SCOPE note
      setText(n.ctx.now, '▸ '+s[clamp(Math.floor(e*N),0,N-1)]);
      setText(n.ctx.cnt, 'FIRED '+fired+'/'+N); }
  },
  // characters rise + fade into place, left to right, paced by scroll
  cascade:{
    // glyph structure is markup, but each character is set as textContent — the
    // data is display text, so authored copy renders verbatim (a literal < or &
    // can never become markup). white-space:pre on .cs-c preserves the spaces.
    // Each glyph AUDITIONS many faces and settles: it morphs from a per-index-
    // seeded wild face (a real other family + a Fraunces opsz/wght/slant cut)
    // toward the house engraved face, left to right as the scroll front (e)
    // sweeps past — "the same idea, wearing many faces" performing its meaning.
    build(c,node){ c.innerHTML=`<div class="cs"><div class="cs-plate"><div class="cs-p"></div></div><div class="cs-mark">specimen · the forms</div></div>`;
      const wrap=c.querySelector('.cs-p'), chs=[], ctx={chs, count:0, locked:false};
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln';
        for(const ch of line){ const g=document.createElement('span'); g.className='cs-c'; g.textContent=ch; ln.append(g); chs.push(g); }
        wrap.append(ln); });
      ctx.count=chs.length;
      // Lock each cell to its SETTLED (house-face) width once Fraunces is active —
      // measured with all face overrides cleared, batch read then batch write — so
      // the audition's family/axis swaps restyle in place and never reflow the
      // centred line. Mirrors how `draw` lazily reads getTotalLength once it exists.
      // [LAW:no-ambient-temporal-coupling] the width owner is fonts.ready, named.
      document.fonts.ready.then(()=>{ chs.forEach(el=>{ el.style.width=''; el.style.fontFamily=''; el.style.letterSpacing=''; el.style.fontVariationSettings=''; });
        const ws=chs.map(el=>el.offsetWidth); chs.forEach((el,i)=>{ el.style.width=ws[i]+'px'; }); ctx.locked=true; });
      return ctx; },
    paint(p,n){ const chs=n.ctx.chs, N=n.ctx.count, e=clamp(n.w/0.85,0,1)*N;
      chs.forEach((el,i)=>{ const o=easeOut(clamp(e-i,0,1));   // settle progress as the front sweeps past char i
        // calm reveal — the only motion — when reduced-motion is asked for, or before
        // widths are locked (face swaps would jitter the centred line until then).
        if(REDUCE_MOTION || !n.ctx.locked){ el.style.opacity=o; el.style.transform=''; el.style.fontFamily=''; el.style.fontVariationSettings=''; el.style.letterSpacing=''; return; }
        const a=1-o;                                            // audition amount: 1 wild → 0 settled
        const fam=CS_FACES[(i+Math.floor(a*CS_FACES.length))%CS_FACES.length];   // steps through real families as it settles
        const opsz=lerp(144,12,a*((i*7)%5/4*0.6+0.4));          // dip toward a spindly text-cut, depth varied per glyph
        const wght=lerp(600,400,a), slnt=lerp(0,(i%2?-9:9),a), trk=lerp(0,0.16,a);
        el.style.fontFamily=o>=1?'':fam;
        el.style.fontVariationSettings=`"opsz" ${opsz.toFixed(0)}, "wght" ${wght.toFixed(0)}`;
        el.style.letterSpacing=trk.toFixed(3)+'em';
        el.style.opacity=lerp(0.12,1,o).toFixed(3);
        el.style.transform=`translateY(${lerp(22,0,o).toFixed(2)}px) skewX(${slnt.toFixed(2)}deg)`;
      }); }
  },
  // the phrase pulls from blur into sharp focus — a focus rack on the words
  focus:{
    build(c,node){ c.innerHTML=`<div class="fc"><div class="fc-p"></div></div>`;
      const wrap=c.querySelector('.fc-p');
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln'; ln.textContent=line; wrap.append(ln); });
      return {el:wrap}; },
    paint(p,n){ const el=n.ctx.el;
      el.style.filter=`blur(${lerp(14,0,clamp(n.w/0.8,0,1))}px)`;
      el.style.opacity=lerp(0.25,1,clamp(n.w/0.6,0,1));
      el.style.transform=`scale(${lerp(1.08,1,easeOut(n.w))})`; }
  },
  // an endless dive: nested window-frames recede into 3D depth and recycle, so
  // the descent never bottoms out — the nesting demo's punchline, made literal
  depth:{
    build(c,node){ const rings=12, step=200;
      c.innerHTML=`<div class="dp"><div class="dp-field">${Array.from({length:rings},()=>'<div class="dp-ring"></div>').join('')}</div><div class="dp-word"></div></div>`;
      const word=c.querySelector('.dp-word'); word.textContent=node.word||'';
      return {rings:[...c.querySelectorAll('.dp-ring')], word, span:rings*step, step}; },
    paint(p,n){ const {rings,span,step}=n.ctx;
      rings.forEach((el,i)=>{ const z=-span + ((i*step + p*span) % span), d=-z;   // z: -span..0, ring nears the camera as p grows, then recycles to the back
        el.style.transform=`translate(-50%,-50%) translateZ(${z}px)`;
        el.style.opacity=clamp(d/300,0,1)*clamp((span-d)/500,0,1); });           // fade in from the depths, dissolve at the surface
      n.ctx.word.style.opacity=clamp((n.w-0.1)/0.5,0,1); }
  },
  // parallax snowfall behind a masthead — the NYT "Snow Fall" reference, in motion
  snow:{
    build(c,node){ const N=46, flakes=Array.from({length:N},(_,i)=>{ const d=i%3;
        return {x:(i*61)%100, by:(i*37)%100, size:[2,3.4,5.4][d], op:[.45,.7,1][d], speed:55+d*55, amp:5+d*6, ph:i*0.7}; });
      c.innerHTML=`<div class="sn">${flakes.map(f=>`<i class="sn-flake" style="left:${f.x}%;width:${f.size}px;height:${f.size}px;opacity:${f.op}"></i>`).join('')}<div class="sn-title"><h2></h2><div class="sub"></div></div></div>`;
      c.querySelector('.sn-title h2').textContent=node.title||'';
      c.querySelector('.sn-title .sub').textContent=node.sub||'';
      return {els:[...c.querySelectorAll('.sn-flake')], flakes, title:c.querySelector('.sn-title')}; },
    paint(p,n){ n.ctx.els.forEach((el,i)=>{ const f=n.ctx.flakes[i];
        const y=((f.by + p*f.speed) % 120) - 10;                                  // %-of-container fall, wraps for an endless field
        el.style.transform=`translate(${Math.sin(p*3 + f.ph)*f.amp}px, ${y}cqh)`; });
      n.ctx.title.style.opacity=clamp((n.w-0.05)/0.4,0,1); }
  },
  // threads weave from the edges into a single point as the closing line resolves
  converge:{
    build(c,node){ const N=14, cx=50, cy=46;
      const paths=Array.from({length:N},(_,i)=>{ const a=(i/N)*Math.PI*2;
        const ex=cx+Math.cos(a)*82, ey=cy+Math.sin(a)*82, c1x=cx+Math.cos(a+0.6)*42, c1y=cy+Math.sin(a+0.6)*42, c2x=cx+Math.cos(a-0.3)*15, c2y=cy+Math.sin(a-0.3)*15;
        return `M${ex.toFixed(1)},${ey.toFixed(1)} C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${cx},${cy}`; });
      c.innerHTML=`<div class="cv"><svg viewBox="0 0 100 100" preserveAspectRatio="none">${paths.map(d=>`<path d="${d}"/>`).join('')}</svg><div class="cv-word"></div></div>`;
      const ps=[...c.querySelectorAll('.cv path')]; ps.forEach(pa=>{ const L=pa.getTotalLength(); pa.style.strokeDasharray=L; pa.style.strokeDashoffset=L; pa.dataset.len=L; });
      const word=c.querySelector('.cv-word'); word.textContent=node.word||'';
      return {ps, word}; },
    paint(p,n){ const e=easeOut(clamp(p/0.8,0,1)), reveal=clamp((n.w-0.45)/0.4,0,1);
      n.ctx.ps.forEach(pa=>{ pa.style.strokeDashoffset=(+pa.dataset.len)*(1-e); });
      n.ctx.word.style.opacity=reveal; n.ctx.word.style.transform=`scale(${lerp(0.9,1,reveal)})`; }
  },
  // a forensic viewfinder glides + zooms from subject to subject — visual tracking
  reticle:{
    build(c,node){ c.innerHTML=`<div class="rt"><div class="rt-scene"></div><div class="rt-box"><div class="rt-tag"></div></div><div class="rt-cap"></div></div>`;
      return {box:c.querySelector('.rt-box'), tag:c.querySelector('.rt-tag'), cap:c.querySelector('.rt-cap'), subs:node.subjects}; },
    paint(p,n){ const s=n.ctx.subs, N=s.length, f=clamp(n.w/0.92,0,1)*(N-1), i=Math.floor(f), frac=f-i, j=Math.min(i+1,N-1);
      const e=frac<.5?2*frac*frac:1-Math.pow(-2*frac+2,2)/2;                       // ease the glide between subjects
      const a=s[i], b=s[j], box=n.ctx.box;
      box.style.left=lerp(a.x,b.x,e)+'%'; box.style.top=lerp(a.y,b.y,e)+'%';
      box.style.width=lerp(a.w,b.w,e)+'%'; box.style.height=lerp(a.h,b.h,e)+'%';
      const cur=e<.5?a:b; setText(n.ctx.tag,cur.t); setText(n.ctx.cap, cur.cap||''); }
  },
  // points fly up into a plotted distribution, swept left to right — a data essay
  scatter:{
    build(c,node){ const N=64, dots=Array.from({length:N},(_,i)=>{ const x=(i+0.5)/N*100;
        const trend=70*Math.exp(-Math.pow((x-46)/24,2)) + 16*Math.sin(x/9);       // a humped distribution + gentle wave
        return {x, y:clamp(trend + 8*Math.sin(i*1.7), 4, 92), c:ACCENTS[i%ACCENTS.length]}; });
      c.innerHTML=`<div class="sct"><div class="sct-plot">${dots.map(d=>`<i class="sct-dot" style="left:${d.x}%;background:${d.c}"></i>`).join('')}<div class="sct-axis"></div></div><div class="sct-cap"></div></div>`;
      const els=[...c.querySelectorAll('.sct-dot')]; c.querySelector('.sct-cap').textContent=node.lab||'';
      return {els, dots}; },
    paint(p,n){ n.ctx.els.forEach((el,i)=>{ const d=n.ctx.dots[i], e=easeOut(clamp((p - d.x/200)/0.5,0,1));
        el.style.bottom=(d.y*e)+'%'; el.style.opacity=e; }); }                     // stagger by x so the cloud assembles as a sweep
  },
  // a stack of step-cards; each scrolls off the top to reveal the next
  deck:{
    build(c,node){ const cards=node.cards;
      c.innerHTML=`<div class="dk"><div class="dk-stack">${cards.map(cd=>`<div class="dk-card" style="background:linear-gradient(150deg, ${cd.c}, #16141d)"></div>`).join('')}</div></div>`;
      const els=[...c.querySelectorAll('.dk-card')]; els.forEach((el,i)=>el.textContent=cards[i].t);
      return {els}; },
    paint(p,n){ const els=n.ctx.els, N=els.length, f=clamp(n.w/0.92,0,1)*(N-1);     // (N-1) so the last card lands as the terminal state, not flung past
      els.forEach((el,i)=>{ const d=i-f;                                           // d<0: flung off the top; d>=0: still in the stack
        if(d<=-1){ el.style.opacity=0; el.style.transform='translateY(-130%) rotateX(45deg)'; el.style.zIndex='0'; return; }
        el.style.zIndex=String(100-i);
        if(d<0){ el.style.opacity=clamp(1+d,0,1); el.style.transform=`translateY(${d*120}%) rotateX(${-d*45}deg) scale(${1+d*0.06})`; }
        else { el.style.opacity=clamp(1-d*0.32,0,1); el.style.transform=`translateY(${-d*5}%) translateZ(${-d*55}px) scale(${1-d*0.05})`; } }); }
  },
};

/* ---- build the tree; register every node for the single paint loop ---- */
const doc=document.getElementById('doc');
const nodes=[];
function buildNode(node, frameDepth){
  const lvl=document.createElement('section'); lvl.className='lvl'+(node.framed?' framed':''); lvl.style.setProperty('--d', frameDepth);
  const frame=document.createElement('div'); frame.className='frame';
  const inner=document.createElement('div'); inner.className='inner';
  // [LAW:dataflow-not-control-flow] the accent is authored data on the node — the
  // colour journey is the sequence of families the tree names, not a side effect
  // of build order. [LAW:no-silent-failure] a node with no accent (or a misspelled
  // family, via accentOf) breaks the build loud, so the arc can't silently gap.
  if(!node.accent) throw new Error(`Node "${node.t}" names no accent — every node must pick one of: ${PALETTE.join(', ')}`);
  inner.style.setProperty('--accent', accentOf(node.accent));
  const bar=document.createElement('div'); bar.className='bar';
  bar.innerHTML=`<span class="dot"></span><span class="ttl">${node.t}</span><span class="barfill"></span>`;
  const content=document.createElement('div'); content.className='content';
  inner.append(bar, content); frame.append(inner); lvl.append(frame);

  const painter=PAINTERS[node.kind];
  // [LAW:errors] fail loud and self-describing if a node names a painter the
  // registry lacks — a typo localises to itself, not a cryptic later crash.
  if(!painter) throw new Error(`Unknown painter kind "${node.kind}" on node "${node.t}"`);
  // [LAW:no-silent-failure] same guard for the read-beat: an undefined beat is the
  // authorised default (handled in wordingProgress), but a MISSPELLED one would
  // silently fall back to 'read' and the scene's timing would lie with no signal.
  if(node.beat!==undefined && !(node.beat in READBEAT)) throw new Error(`Unknown read-beat "${node.beat}" on node "${node.t}" — use one of: ${Object.keys(READBEAT).join(', ')}`);
  // [LAW:no-silent-failure] same guard for the tempo: an undefined tempo is the
  // authorised default, but a MISSPELLED one would silently fall back and the
  // scene's pacing would lie with no signal.
  if(node.tempo!==undefined && !(node.tempo in TEMPO)) throw new Error(`Unknown tempo "${node.tempo}" on node "${node.t}" — use one of: ${Object.keys(TEMPO).join(', ')}`);
  const ctx=painter.build(content, node)||{};
  ctx.barfill=bar.querySelector('.barfill');

  // [LAW:dataflow-not-control-flow] pacing is data: the node's named tempo carries
  // both the scroll length and the trailing hold; the build is uniform, the variety
  // lives in the value. [LAW:one-source-of-truth] every scalar is read from :root.
  const tempo=TEMPO[node.tempo] ?? TEMPO[DEFAULT_TEMPO];
  const run=document.createElement('div'); run.className='run'; run.style.height=(tempo.len*PACE*100)+'vh';
  const hold=document.createElement('div'); hold.className='hold'; hold.style.height=(tempo.hold*PACE*100)+'vh';   // last state stays readable before the next frame covers it
  lvl.append(run, hold);
  nodes.push({node, painter, ctx, lvl, run});

  // [LAW:dataflow-not-control-flow] chrome depth is data: a framed node insets
  // its kids one notch deeper; a bleed node resets it to 0, so window chrome
  // can't leak past the nesting demo into the full-bleed descent below.
  if(node.kids){ const kids=document.createElement('div'); kids.className='kids';
    node.kids.forEach(k=>kids.append(buildNode(k, node.framed?frameDepth+1:0))); lvl.append(kids); }
  return lvl;
}
doc.append(buildNode(OPENING, 0), buildNode(NEST, 0), buildNode(TREE, 0));

// gentle release after the whole descent
const epi=document.createElement('section'); epi.className='epilogue';
epi.innerHTML=`<div class="rule"></div><div class="eyebrow">Out the other side</div>
  <h1>That's scrollytelling.</h1>
  <p class="lede">One sticky graphic, nested into an entire vocabulary of scroll-driven form. You made it all the way through.</p>
  <a href="#top">↑ Back to the top</a>`;
doc.append(epi);

let raf=false;
// [LAW:state] node geometry is a derived cache — each node's document-space top
// and run height. It only changes when layout can change (resize, late font/img
// load), so it's recomputed there and nowhere else. [LAW:one-source-of-truth]
function measure(){ const y=window.scrollY; for(const n of nodes){ n.top=n.lvl.getBoundingClientRect().top+y; n.h=n.run.offsetHeight; } }
function tick(){
  raf=false;
  // one layout read for the whole frame (scrollY), then pure compute + writes —
  // no per-node getBoundingClientRect, so the read/write phases never thrash.
  const y=window.scrollY;
  for(const n of nodes){
    // progress from this node's top, so stepping begins the instant the frame
    // pins (even pacing); the hold spacer keeps the last state readable.
    const p=clamp((y - n.top) / n.h, 0, 1);
    // raw p drives ambient (non-text) motion; n.w is the read-beat-applied
    // wording progress. SCOPE of the read-beat, stated once here so per-painter
    // use of p vs n.w is a declared rule, not a silent choice: text that ANIMATES
    // IN (appears / advances / illuminates) draws from n.w, so it waits out the
    // opening beat. Text that is a LIVE READOUT of the ambient channel (runway's
    // in-flow/pinned/released top:N readout, waffle's "47%") or that is ITSELF the ambient
    // graphic (takeover's swelling word, horizontal's sideways filmstrip) tracks
    // raw p by design — gating it would desync the label from what it reports, or
    // hold a stage that has nothing to read yet. [LAW:single-enforcer] the invariant
    // is computed in exactly one place, here. [LAW:comments-explain-why-only]
    n.w=wordingProgress(p, n.node);
    n.painter.paint(p, n);
    n.ctx.barfill.style.transform=`scaleX(${p})`;
  }
}
const onScroll=()=>{ if(!raf){ raf=true; requestAnimationFrame(tick); } };
const remeasure=()=>{ measure(); onScroll(); };
addEventListener('scroll',onScroll,{passive:true});
addEventListener('resize',remeasure);
addEventListener('load',remeasure);   // re-cache after fonts/images settle layout
document.fonts.ready.then(remeasure); // and once web fonts swap in (can reflow after load)
measure(); tick();
</script>
</body>
</html>
