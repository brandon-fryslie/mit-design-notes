/* ---- build the tree; register every node for the single paint loop ---- */
const doc=document.getElementById('doc');
const nodes=[];
function buildNode(node, frameDepth){
  const lvl=document.createElement('section'); lvl.className='lvl'+(node.framed?' framed':''); lvl.style.setProperty('--d', frameDepth);
  const frame=document.createElement('div'); frame.className='frame';
  const inner=document.createElement('div'); inner.className='inner';
  // [LAW:dataflow-not-control-flow] the accent is authored data on the node — the
  // colour journey is the sequence of families the tree names, not a side effect
  // of build order. [LAW:no-silent-failure] a node with no accent (or a misspelled
  // family, via accentOf) breaks the build loud, so the arc can't silently gap.
  if(!node.accent) throw new Error(`Node "${node.t}" names no accent — every node must pick one of: ${PALETTE.join(', ')}`);
  inner.style.setProperty('--accent', accentOf(node.accent));
  const bar=document.createElement('div'); bar.className='bar';
  bar.innerHTML=`<span class="dot"></span><span class="ttl">${node.t}</span><span class="barfill"></span>`;
  const content=document.createElement('div'); content.className='content';
  inner.append(bar, content); frame.append(inner); lvl.append(frame);

  const painter=PAINTERS[node.kind];
  // [LAW:errors] fail loud and self-describing if a node names a painter the
  // registry lacks — a typo localises to itself, not a cryptic later crash.
  if(!painter) throw new Error(`Unknown painter kind "${node.kind}" on node "${node.t}"`);
  // [LAW:no-silent-failure] same guard for the read-beat: an undefined beat is the
  // authorised default (handled in wordingProgress), but a MISSPELLED one would
  // silently fall back to 'read' and the scene's timing would lie with no signal.
  if(node.beat!==undefined && !(node.beat in READBEAT)) throw new Error(`Unknown read-beat "${node.beat}" on node "${node.t}" — use one of: ${Object.keys(READBEAT).join(', ')}`);
  // [LAW:no-silent-failure] same guard for the tempo: an undefined tempo is the
  // authorised default, but a MISSPELLED one would silently fall back and the
  // scene's pacing would lie with no signal.
  if(node.tempo!==undefined && !(node.tempo in TEMPO)) throw new Error(`Unknown tempo "${node.tempo}" on node "${node.t}" — use one of: ${Object.keys(TEMPO).join(', ')}`);
  const ctx=painter.build(content, node)||{};
  ctx.barfill=bar.querySelector('.barfill');

  // [LAW:dataflow-not-control-flow] pacing is data: the node's named tempo carries
  // both the scroll length and the trailing hold; the build is uniform, the variety
  // lives in the value. [LAW:one-source-of-truth] every scalar is read from :root.
  const tempo=TEMPO[node.tempo] ?? TEMPO[DEFAULT_TEMPO];
  const run=document.createElement('div'); run.className='run'; run.style.height=(tempo.len*PACE*100)+'vh';
  const hold=document.createElement('div'); hold.className='hold'; hold.style.height=(tempo.hold*PACE*100)+'vh';   // last state stays readable before the next frame covers it
  lvl.append(run, hold);
  nodes.push({node, painter, ctx, lvl, run});

  // [LAW:dataflow-not-control-flow] chrome depth is data: a framed node insets
  // its kids one notch deeper; a bleed node resets it to 0, so window chrome
  // can't leak past the nesting demo into the full-bleed descent below.
  if(node.kids){ const kids=document.createElement('div'); kids.className='kids';
    node.kids.forEach(k=>kids.append(buildNode(k, node.framed?frameDepth+1:0))); lvl.append(kids); }
  return lvl;
}
doc.append(buildNode(OPENING, 0), buildNode(NEST, 0), buildNode(TREE, 0));

// gentle release after the whole descent
const epi=document.createElement('section'); epi.className='epilogue';
epi.innerHTML=`<div class="rule"></div><div class="eyebrow">Out the other side</div>
  <h1>That's scrollytelling.</h1>
  <p class="lede">One sticky graphic, nested into an entire vocabulary of scroll-driven form. You made it all the way through.</p>
  <a href="#top">↑ Back to the top</a>`;
doc.append(epi);

let raf=false;

    // pins (even pacing); the hold spacer keeps the last state readable.

    // wording progress. SCOPE of the read-beat, stated once here so per-painter

    // IN (appears / advances / illuminates) draws from n.w, so it waits out the
    // opening beat. Text that is a LIVE READOUT of the ambient channel (runway's
    // "approaching/pinned/released", waffle's "47%") or that is ITSELF the ambient
    // graphic (takeover's swelling word, horizontal's sideways filmstrip) tracks
    // raw p by design — gating it would desync the label from what it reports, or
    // hold a stage that has nothing to read yet. [LAW:single-enforcer] the invariant
    // is computed in exactly one place, here. [LAW:comments-explain-why-only]
    n.w=wordingProgress(p, n.node);

  }

measure(); tick();
</script>
<script><!-- gh-pages-multiplexer:nav-widget -->

  var SHADOW_CSS = "\n:host { all: initial; }\n*, *::before, *::after { box-sizing: border-box; }\n.root {\n  --widget-bg: #ffffff;\n  --widget-bg-hover: #f6f8fa;\n  --widget-fg: #1f2328;\n  --widget-fg-muted: #656d76;\n  --widget-border: #d0d7de;\n  --widget-accent: #0969da;\n  --widget-accent-hover: #0550ae;\n  --widget-current-bg: #ddf4ff;\n  /* Handle colors — intentionally bright and theme-independent so the tab is obvious on any host page.\n     --handle-bg is overridden at runtime by the user's --widget-color when set. The hover state\n     uses CSS filter rather than a separate color variable, so it works for any base color. */\n  --handle-bg: #f97316;\n  --handle-fg: #ffffff;\n  /* Drawer geometry (single source of truth for the slide math). */\n  --panel-width: 240px;\n  --handle-width: 44px;\n  --peek: 10px;\n  /* Position and edge are runtime-configurable. The drawer's center sits on this y-line. */\n  --position-y: 80%;\n  font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  font-size: 13px;\n  line-height: 1.4;\n  color: var(--widget-fg);\n}\n@media (prefers-color-scheme: dark) {\n  .root {\n    --widget-bg: #161b22;\n    --widget-bg-hover: #21262d;\n    --widget-fg: #e6edf3;\n    --widget-fg-muted: #8d96a0;\n    --widget-border: #30363d;\n    --widget-accent: #2f81f7;\n    --widget-accent-hover: #539bf5;\n    --widget-current-bg: #0c2d6b;\n  }\n}\n.drawer {\n  position: fixed;\n  /* The drawer's vertical center sits on --position-y (configurable; default 80%). */\n  top: var(--position-y);\n  display: flex;\n  flex-direction: row;\n  align-items: center;\n  z-index: 2147483647;\n  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);\n  will-change: transform;\n}\n@media (prefers-reduced-motion: reduce) {\n  .drawer { transition: none; }\n}\n/* [LAW:dataflow-not-control-flow] Edge variant is data: a class on the drawer picks\n   the right anchor + transform direction. No JS state-toggling for layout — only the\n   class assignment at construction time, then CSS does the rest. */\n.drawer.edge-right {\n  right: 0;\n  transform: translate(var(--panel-width), -50%);\n}\n.drawer.edge-right:hover:not(.open) {\n  transform: translate(calc(var(--panel-width) - var(--peek)), -50%);\n}\n.drawer.edge-right.open {\n  transform: translate(0, -50%);\n}\n.drawer.edge-left {\n  left: 0;\n  flex-direction: row-reverse;\n  transform: translate(calc(-1 * var(--panel-width)), -50%);\n}\n.drawer.edge-left:hover:not(.open) {\n  transform: translate(calc(-1 * (var(--panel-width) - var(--peek))), -50%);\n}\n.drawer.edge-left.open {\n  transform: translate(0, -50%);\n}\n.handle {\n  width: var(--handle-width);\n  background: var(--handle-bg);\n  color: var(--handle-fg);\n  border: none;\n  cursor: pointer;\n  /* Padding is content-driven; the icon and label have their own transitions and the\n     handle shrink-wraps to match (no min-height). */\n  padding: 8px 6px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 0;\n  font-family: inherit;\n  font-weight: 600;\n  letter-spacing: 0.01em;\n  flex: 0 0 auto;\n  transition: padding 180ms ease-out, filter 180ms ease-out;\n}\n/* [LAW:single-enforcer] Hover darkening uses CSS filter rather than a separate\n   --handle-bg-hover variable so it works for any user-provided color without forcing\n   the user to specify two shades. */\n.handle:hover { filter: brightness(0.92); }\n.handle:focus-visible {\n  outline: 2px solid #ffffff;\n  outline-offset: -4px;\n}\n/* Right-edge handle: rounded LEFT side (the side facing the viewport). */\n.drawer.edge-right .handle {\n  border-top-left-radius: 14px;\n  border-bottom-left-radius: 14px;\n  box-shadow: -4px 0 16px rgba(0,0,0,0.22), inset 1px 0 0 rgba(255,255,255,0.15);\n}\n/* Left-edge handle: rounded RIGHT side (the side facing the viewport). */\n.drawer.edge-left .handle {\n  border-top-right-radius: 14px;\n  border-bottom-right-radius: 14px;\n  box-shadow: 4px 0 16px rgba(0,0,0,0.22), inset -1px 0 0 rgba(255,255,255,0.15);\n}\n/* [LAW:dataflow-not-control-flow] Closed state shows a small icon only. Hover or open\n   state expands the icon and reveals the label. The CSS always applies, the difference\n   is data — the .open class and the :hover pseudo. No JS state-toggling for these. */\n.handle svg {\n  width: 12px;\n  height: 12px;\n  flex-shrink: 0;\n  display: block;\n  transition: width 180ms ease-out, height 180ms ease-out;\n}\n.drawer:hover .handle svg,\n.drawer.open .handle svg {\n  width: 22px;\n  height: 22px;\n}\n.handle .ver {\n  font-size: 11px;\n  line-height: 1.15;\n  max-width: 40px;\n  max-height: 0;\n  margin-top: 0;\n  opacity: 0;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n  text-align: center;\n  transition: max-height 180ms ease-out, opacity 180ms ease-out, margin-top 180ms ease-out;\n}\n.drawer:hover .handle .ver,\n.drawer.open .handle .ver {\n  max-height: 16px;\n  margin-top: 6px;\n  opacity: 1;\n}\n.panel {\n  width: var(--panel-width);\n  max-height: 60vh;\n  overflow-y: auto;\n  background: var(--widget-bg);\n  color: var(--widget-fg);\n  border: 1px solid var(--widget-border);\n  padding: 12px;\n  flex: 0 0 auto;\n}\n.drawer.edge-right .panel {\n  border-right: none;\n  box-shadow: -8px 0 24px rgba(0,0,0,0.18);\n}\n.drawer.edge-left .panel {\n  border-left: none;\n  box-shadow: 8px 0 24px rgba(0,0,0,0.18);\n}\n.panel h2 { font-size: 13px; margin: 0 0 8px 0; font-weight: 600; }\n.index-link {\n  display: block;\n  padding: 8px 12px;\n  color: var(--widget-accent);\n  text-decoration: none;\n  border-radius: 6px;\n  margin-bottom: 4px;\n}\n.index-link:hover { background: var(--widget-bg-hover); }\n.index-link:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.rows { display: flex; flex-direction: column; gap: 2px; }\n.row {\n  display: block;\n  padding: 8px 12px;\n  border-radius: 6px;\n  text-decoration: none;\n  color: var(--widget-fg);\n}\n.row:hover { background: var(--widget-bg-hover); }\n.row:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.row .ver { font-weight: 600; }\n.row.current { background: var(--widget-current-bg); cursor: default; }\n.row .ref { font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace; font-size: 12px; color: var(--widget-fg-muted); }\n.badge {\n  display: inline-block;\n  font-size: 10px;\n  padding: 1px 6px;\n  border-radius: 10px;\n  background: var(--widget-accent);\n  color: #fff;\n  margin-left: 6px;\n  vertical-align: middle;\n}\n.state { padding: 8px 12px; color: var(--widget-fg-muted); }\n@media (max-width: 600px) {\n  .root { --panel-width: calc(100vw - 72px); }\n}\n";
  var SHADOW_HTML = "\n<div class=\"root\">\n  <div class=\"drawer\" role=\"region\" aria-label=\"Version switcher\">\n    <button class=\"handle\" type=\"button\" aria-expanded=\"false\" aria-controls=\"gh-pm-nav-panel\" aria-label=\"Switch version\">\n      <span class=\"icon-slot\"><\/span>\n      <span class=\"ver\"><\/span>\n    <\/button>\n    <div class=\"panel\" id=\"gh-pm-nav-panel\" role=\"dialog\" aria-label=\"Versions\">\n      <h2>Versions<\/h2>\n      <a class=\"index-link\" href=\"\">← Index<\/a>\n      <div class=\"rows\"><div class=\"state\">Loading versions…<\/div><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n";
  if (customElements.get('gh-pm-nav')) return;

        this._rows = root.querySelector('.rows');
