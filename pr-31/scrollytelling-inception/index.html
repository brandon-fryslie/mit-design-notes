   nests them (an ancestor stays pinned while its descendants pin on top),
   and a fixed HOLD spacer after each node lets its last state be read
   before the next frame covers it. JS only maps each node's own scroll
   progress to its picture via a per-kind painter.
   [LAW:types-are-the-program] depth is the tree's shape
   [LAW:one-type-per-behavior] one node, painted from a registry
   [LAW:no-mode-explosion] a new technique is one registry entry
   [LAW:single-enforcer] one loop paints every node
===================================================================== */
/* ── COLOR STORY (JS side) — the half the painters touch ──
   The accent families are authored as :root --acc-* tokens (CSS is canonical).
   A node names its family as data (node.accent); accentOf resolves it through the
   guarded reader, so a misspelled family breaks loud, never silently degrades.
   PALETTE is the arc in scroll order — the journey's spine — for the one place
   that wants the whole spectrum at once (scatter's decorative cloud).
   [LAW:one-source-of-truth] the hexes live once, in :root. */
const PALETTE=['iris','azure','teal','jade','amber','ember'];
const accentOf = family => cssVar('--acc-'+family);
const ACCENTS = PALETTE.map(accentOf);   // the families' values, arc-ordered

/* ── terminal painter helpers ── the editor needs to highlight the CSS it types
   AND reveal it character-by-character. You can't slice highlighted HTML (the cut
   lands mid-tag), so the source is tokenised ONCE at build into {t,c} segments and
   the per-frame reveal walks those segments. Block-comment state carries across
   lines so a multi-line CSS comment lights as a single comment span.
   [LAW:one-source-of-truth] tokens computed once; the paint loop only reveals.
   [LAW:effects-at-boundaries] pure: lines in, highlighted segments out. */
const tmEsc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
// a declaration fragment → prop/value/number/punct segments. `:` flips prop→value;
// `;` flips back, so a multi-declaration line still classes each side correctly.
function tmDecl(frag, segs){
  const re=/(\s+)|([:;{}])|([A-Za-z][A-Za-z-]*)|(\d+[a-z%]*)|(.)/g; let m, afterColon=false;
  while((m=re.exec(frag))){
    if(m[1]) segs.push({t:m[1]});                                   // whitespace — uncoloured
    else if(m[2]){ segs.push({t:m[2],c:'punc'}); afterColon = m[2]===':'; }
    else if(m[3]) segs.push({t:m[3], c: afterColon?'val':'prop'});
    else if(m[4]) segs.push({t:m[4], c:'num'});
    else segs.push({t:m[5]});
  }
}
function tmTokenize(lines){
  let inCom=false;
  return lines.map(line=>{
    const segs=[];
    if(inCom){ const close=line.indexOf('*/');
      if(close<0){ segs.push({t:line,c:'com'}); }
      else { segs.push({t:line.slice(0,close+2),c:'com'}); inCom=false; tmDecl(line.slice(close+2),segs); }
      return segs; }
    const open=line.indexOf('/*');
    if(open<0){ tmDecl(line,segs); return segs; }
    if(open>0) tmDecl(line.slice(0,open),segs);
    const close=line.indexOf('*/',open);
    if(close<0){ segs.push({t:line.slice(open),c:'com'}); inCom=true; }
    else { segs.push({t:line.slice(open,close+2),c:'com'}); tmDecl(line.slice(close+2),segs); }   // suffix after a same-line */ flows through the same parser — no input dropped
    return segs;
  });
}
const tmLen = segs => segs.reduce((a,s)=>a+s.t.length,0);
// reveal the first `take` chars of one tokenised line as highlighted HTML
function tmReveal(segs, take){ let left=take, out='';
  for(const s of segs){ if(left<=0) break;
    const t = s.t.length<=left ? s.t : s.t.slice(0,left); left-=t.length;
    out += s.c ? `<span class="t-${s.c}">${tmEsc(t)}</span>` : tmEsc(t); }
  return out; }

// the cascade title's audition set — three REAL, distinct faces the same letters
// try on (Inter is link-loaded; mono and the system serif are always present), so
// "wearing many faces" is literally true, not a faked effect. [LAW:no-silent-failure]
const CS_FACES=['Inter,system-ui,sans-serif','ui-monospace,Menlo,monospace','"Hoefler Text",Georgia,serif'];

// the deck's specimen faces — each step-card is set in ONE real family (all three
// always render: Inter is link-loaded, mono and the system serif are built in), so
// the catalogue label names the face the card is actually wearing — no fabrication.
// Distinct from cascade's CS_FACES (which morphs glyphs); here a face is static
// identity per plate. [LAW:one-source-of-truth] [LAW:no-silent-failure]
const DK_FACES={ grotesque:{fam:'Inter,system-ui,sans-serif', label:'grotesque'},
                 mono:{fam:'ui-monospace,Menlo,monospace', label:'monospace'},
                 serif:{fam:'"Hoefler Text",Georgia,serif', label:'serif'} };

const PAINTERS = {
  "steps-graphic":{
    // a tile is placed by field-percent offset from centre + its own scale, so the
    // live specimen and each static ghost share one coordinate frame and line up exactly.
    place(t,s){ t.style.left=(50+s.x)+'%'; t.style.top=(44+s.y)+'%'; t.style.transform=`translate(-50%,-50%) scale(${s.s})`; },
    build(c,node){
      const ghosts=node.steps.map((s,i)=>`<div class="sg-tile sg-ghost">${i+1}</div>`).join('');
      c.innerHTML=`<div class="sg-grid"></div><div class="sg-field">${ghosts}<div class="sg-tile sg-box">1</div></div><div class="scene-cap"></div><div class="scene-bar"><span></span></div>`;
      const gs=[...c.querySelectorAll('.sg-ghost')]; gs.forEach((g,i)=>this.place(g,node.steps[i].state));
      return {box:c.querySelector('.sg-box'), ghosts:gs, cap:c.querySelector('.scene-cap'), bar:c.querySelector('.scene-bar span')}; },
    paint(p,n){ const s=n.node.steps, i=phaseAt(n.w,s), r=n.ctx;
      // the specimen jumps to step i (CSS eases the move); every step already passed
      // stays on the field as a numbered ghost — visibility is a pure function of i.
      r.box.textContent=i+1; this.place(r.box, s[i].state);
      r.ghosts.forEach((g,gi)=>g.classList.toggle('seen', gi<i));
      setText(r.cap, s[i].cap); r.bar.style.transform=`scaleX(${p})`; }
  },
  runway:{
    // an honest position:sticky demo. The whole sticky MODEL is four fractions of
    // the window's height, defined once here; the flow-ghost, ribbon height, band
    // height and scrollbar thumb all derive from them, so CSS owns only the look.
    // [LAW:one-source-of-truth] one set of numbers, every dimension derived from it.
    build(c){ const S0=0.46, SH=0.16, R=2.4, pinEnd=1.05, maxScroll=R-1;
      // ribbon-space rows (top%,width%) read as a page of prose, skipping the band
      // around the sticky's flow slot. fixed widths — deterministic, no randomness.
      const rows=[[6,74],[10.5,60],[15,68],[30,72],[34.5,58],[39,66],[43.5,70],[48,55],
        [52.5,69],[57,62],[61.5,73],[66,59],[70.5,67],[75,64],[79.5,71],[84,57],[88.5,68],[93,61]];
      c.innerHTML=`<div class="rw"><div class="rw-win">`
        +`<div class="rw-page">${rows.map(([t,w])=>`<i class="rw-row" style="top:${t}%;width:${w}%"></i>`).join('')}</div>`
        +`<div class="rw-datum"></div>`
        +`<div class="rw-sticky"><span class="rw-tag">sticky</span><span class="rw-top"></span></div>`
        +`<div class="rw-bar"><i class="rw-thumb"></i></div>`
        +`</div></div><div class="scene-cap"></div>`;
      const page=c.querySelector('.rw-page'), sticky=c.querySelector('.rw-sticky'), thumb=c.querySelector('.rw-thumb');
      page.style.height=(R*100)+'%';
      sticky.style.height=(SH*100)+'%';
      thumb.style.height=(1/R*100)+'%';
      return {win:c.querySelector('.rw-win'), page, sticky, top:c.querySelector('.rw-top'),
        datum:c.querySelector('.rw-datum'), thumb, cap:c.querySelector('.scene-cap'),
        S0, SH, R, pinEnd, maxScroll}; },
    paint(p,n){ const r=n.ctx, scroll=p*r.maxScroll;
      // raw p (a live readout of the scroll position), not n.w — see read-beat SCOPE note
      r.page.style.transform=`translateY(${-(scroll/r.R)*100}%)`;
      r.thumb.style.top=(scroll/r.R*100)+'%';
      // the sticky model, three phases as a pure function of scroll — no branch on
      // "which frame": the phase is just which arm of topFrac the value lands in.
      const topFrac = scroll<r.S0 ? r.S0-scroll : scroll<=r.pinEnd ? 0 : r.pinEnd-scroll;
      r.sticky.style.top=(topFrac*100)+'%';
      const pinned = topFrac===0, phase = scroll<r.S0?'pre':pinned?'pin':'post';
      // live offset readout, measured from the window's real height — honest, not a constant
      setText(r.top, 'top: '+Math.round(topFrac*r.win.clientHeight)+'px');
      // paint writes state only — the lock-flash is a CSS keyframe keyed off .engaged
      // (fires on class-add), reduced-motion handled by the single CSS motion-kill.
      r.datum.classList.toggle('engaged', pinned);
      setText(r.cap, phase==='pre'?"in flow — rising with the page"
        : phase==='pin'?"pinned — stuck at top: 0" : "released — scrolling away with its section"); }
  },
  // a TURNTABLE SPECIMEN: one showpiece glyph turned on a spindle, QUANTIZED into N
  // pre-rendered frames. The integer frame — not raw scroll — drives the picture, so
  // the form's defining fact (scroll is an index into a finite sequence) is real and
  // visible: a flip-book, not a tween. The film ribbon and the counter both read that
  // one integer; nothing is fabricated. [LAW:dataflow-not-control-flow] [LAW:no-silent-failure]
  "frame-sequence":{
    build(c){ c.innerHTML=`<div class="fs"><canvas aria-hidden="true"></canvas><div class="fs-lab"></div></div><div class="scene-cap"></div>`;
      const cv=c.querySelector('canvas');
      // the jade accent resolved to a concrete colour once (one computed-style read,
      // never in the rAF write phase); canvas needs a literal, CSS needs the var.
      const accent=getComputedStyle(c).getPropertyValue('--accent').trim();
      // the lesson is static — set once, not re-faded every scroll step.
      c.querySelector('.scene-cap').textContent="Forty-eight pre-rendered frames. Your scroll is the projector.";
      return {cv, x:cv.getContext('2d'), w:0, h:0, accent, frame:-1, lab:c.querySelector('.fs-lab')}; },
    paint(p,n){ const r=n.ctx, cv=r.cv, x=r.x, d=window.devicePixelRatio||1, accent=r.accent;
      const cssW=cv.clientWidth, cssH=cv.clientHeight, W=Math.round(cssW*d), H=Math.round(cssH*d);
      // [LAW:state] backing store is a derived cache — reallocate only when its source (client size × dpr) changes
      if(W!==r.w || H!==r.h){ cv.width=W; cv.height=H; r.w=W; r.h=H; }
      x.setTransform(d,0,0,d,0,0); x.clearRect(0,0,cssW,cssH);   // work in CSS px; HiDPI-crisp

      const N=48, frame=Math.round(p*(N-1));                     // scroll → integer frame index, the one true datum
      const phi=(frame/(N-1))*2*Math.PI*2, cphi=Math.cos(phi);  // two full turns across the sequence; cos foreshortens the Y-axis spin

      // ── stage geometry: glyph above, film ribbon along the foot ──
      const ribbonH=Math.min(64,cssH*0.2), ribbonY=cssH-ribbonH-4;
      const cx=cssW/2, cy=ribbonY*0.5+6, gs=Math.max(24, Math.min(cssW*0.42, ribbonY*0.6));

      // the spindle the sheet turns on
      x.strokeStyle='rgba(255,255,255,0.06)'; x.lineWidth=1;
      x.beginPath(); x.moveTo(cx,cy-gs*0.82); x.lineTo(cx,cy+gs*0.82); x.stroke();
      // ground shadow — its width tracks the foreshorten, grounding the turn
      x.save(); x.translate(cx,cy+gs*0.54); x.scale(1,0.16);
      x.beginPath(); x.arc(0,0, gs*(0.18+0.34*Math.abs(cphi)), 0, Math.PI*2);
      x.fillStyle='rgba(0,0,0,0.42)'; x.fill(); x.restore();

      // the showpiece glyph, foreshortened by cos(phi) → a Y-axis turntable. Past 90°
      // the negative scale mirrors it automatically: the back of the printed sheet,
      // shown as a paler jade-lit face so it reads as a turned page, not a shadow.
      x.save(); x.translate(cx,cy); x.scale(cphi,1);
      x.font=`600 ${gs}px Georgia,"Hoefler Text",serif`; x.textAlign='center'; x.textBaseline='middle';
      x.fillStyle='rgba(0,0,0,0.40)'; x.fillText('&',0,gs*0.035);                 // letterpress shadow (y-only; safe under the flip)
      const front=cphi>=0, a=Math.abs(cphi);
      x.fillStyle=front?'#f1eef9':'#cfe9dc'; x.globalAlpha=0.32+(front?0.68:0.50)*a;
      x.fillText('&',0,0); x.globalAlpha=1; x.restore();
      // edge sliver — the sheet seen edge-on through the thin moment of the turn,
      // a confident jade bar so a parked edge-on frame reads as a turned page
      if(a<0.2){ const e=1-a/0.2; x.globalAlpha=e; x.fillStyle=accent;
        x.fillRect(cx-2,cy-gs*0.48,4,gs*0.96); x.globalAlpha=e*0.7; x.fillStyle='#eafff6'; x.fillRect(cx-0.6,cy-gs*0.48,1.2,gs*0.96); x.globalAlpha=1; }

      // ── film ribbon: N frame cells lit up to the live frame, with sprocket perforations ──
      x.fillStyle='#0b0910'; x.fillRect(0,ribbonY,cssW,ribbonH);
      const perfH=ribbonH*0.18; x.fillStyle='rgba(255,255,255,0.10)';
      for(let px=7;px<cssW-6;px+=14){ x.fillRect(px,ribbonY+perfH*0.3,7,perfH*0.5); x.fillRect(px,ribbonY+ribbonH-perfH*0.8,7,perfH*0.5); }
      const cellY=ribbonY+perfH+2, cellH=ribbonH-2*perfH-4, cellW=(cssW-16)/N;
      for(let i=0;i<N;i++){ const xi=8+i*cellW;
        if(i===frame){ x.globalAlpha=1; x.fillStyle=accent; }                     // the live frame, full jade
        else if(i<frame){ x.globalAlpha=0.32; x.fillStyle=accent; }               // exposed frames behind the playhead
        else { x.globalAlpha=1; x.fillStyle='rgba(255,255,255,0.05)'; }           // latent frames ahead
        x.fillRect(xi,cellY,cellW-1,cellH); }
      x.globalAlpha=1;
      // playhead marker above the live cell
      const phx=8+frame*cellW+cellW/2; x.fillStyle=accent;
      x.beginPath(); x.moveTo(phx,ribbonY-1); x.lineTo(phx-5,ribbonY-8); x.lineTo(phx+5,ribbonY-8); x.closePath(); x.fill();

      // honest live readout — written straight (a machine counter, not an animating-in
      // word), so the 48 steps don't each trigger setText's fade. Only on real change.
      if(frame!==r.frame){ r.frame=frame; r.lab.textContent=`frame ${String(frame+1).padStart(2,'0')}/${N} · turntable`; } }
  },
  horizontal:{
    build(c,node){ c.innerHTML=`<div class="hz"><div class="hz-strip">`
        +node.panels.map(pn=>`<div class="hz-panel"><div class="yr">${pn.yr}</div><h3>${pn.t}</h3><p>${pn.d}</p></div>`).join('')
        +`<div class="hz-rule"></div></div><div class="hz-caret"></div><div class="hz-mark"></div></div>`;
      return {strip:c.querySelector('.hz-strip'), plates:[...c.querySelectorAll('.hz-panel')], mark:c.querySelector('.hz-mark')}; },
    // travel is driven by n.w (read-beat applied), NOT raw p, so the opening plate
    // holds still through the beat before the galley pulls sideways. The caret is
    // fixed; the strip slides so the active plate's centre lands under it.
    paint(p,n){ const r=n.ctx, plates=r.plates, N=plates.length, vp=r.strip.parentElement, vpw=vp.clientWidth;
      // cache plate centres (offsetLeft is pre-transform, stable until a resize)
      if(vpw!==r.vpw){ r.vpw=vpw; r.first=plates[0].offsetLeft+plates[0].offsetWidth/2;
        r.last=plates[N-1].offsetLeft+plates[N-1].offsetWidth/2; }
      const center=lerp(r.first, r.last, n.w);
      r.strip.style.transform=`translateX(${(vpw/2 - center).toFixed(2)}px)`;
      const i=clamp(Math.round(n.w*(N-1)),0,N-1);                       // the plate under the caret
      plates.forEach((el,k)=>el.classList.toggle('hz-on', k===i));
      // honest catalogue readout — real index/total + the real plate title
      setText(r.mark, `PLATE ${String(i+1).padStart(2,'0')} · ${String(N).padStart(2,'0')} — ${n.node.panels[i].t}`); }
  },
  chart:{
    build(c,node){ c.innerHTML=`<div class="ch">${node.bars.map(b=>`<div class="ch-bar"><span class="ch-fill"></span><label>${b.k}</label></div>`).join('')}</div><div class="scene-cap"></div><div class="scene-bar"><span></span></div>`;
      return {fills:[...c.querySelectorAll('.ch-fill')], cap:c.querySelector('.scene-cap'), bar:c.querySelector('.scene-bar span')}; },
    paint(p,n){ const b=n.node.bars, N=b.length; n.ctx.fills.forEach((f,i)=>{ const t=clamp((p-i/N)/(1/N),0,1);
        f.style.height=(b[i].v*t)+'%'; f.style.background=`linear-gradient(180deg, ${b[i].c}, ${b[i].c}aa)`; });
      // raw p, not n.w — this caption names the bar currently drawing beside it; see read-beat SCOPE note
      setText(n.ctx.cap, b[clamp(Math.floor(p*N),0,N-1)].cap); n.ctx.bar.style.transform=`scaleX(${p})`; }
  },

  // a STEREO SPECIMEN — specimen furniture spread across depth planes; scroll pulls
  // them out of register so near planes outrun far ones and the sheet opens into depth
  parallax:{
    build(c){
      // each plane's depth d (0 far → 1 near) drives drift, scale, opacity and blur
      // from ONE scalar [LAW:one-source-of-truth]; only drift moves on scroll, the
      // rest is baked here. Back-to-front order so nearer planes layer over farther.
      const planes=[
        {d:0.12, cls:'px-glyph', t:'R',                   x:6,  y:6,  fs:'52cqw'},
        {d:0.30, cls:'px-scale', t:'12 · 18 · 24 · 36 · 48 · 60', x:16, y:79, fs:'4.4cqw'},
        {d:0.48, cls:'px-rule',  t:'',                    x:12, y:50, w:'58cqw'},
        {d:0.66, cls:'px-num',   t:'48',                  x:64, y:16, fs:'27cqw'},
        {d:0.82, cls:'px-chip',  t:'',                    x:25, y:62, w:'8cqw', h:'8cqw'},
        {d:1.00, cls:'px-glyph', t:'&',                   x:57, y:53, fs:'18cqw'},
      ];
      const html=planes.map(pl=>{
        const drift=lerp(5,36,pl.d);                 // % of own box; near drifts most
        const op   =lerp(0.16,1,pl.d);               // far planes fade — atmosphere
        const blur =lerp(2.2,0,pl.d).toFixed(2);     // far planes soften — depth of field
        const sc   =lerp(0.82,1.06,pl.d).toFixed(3); // near planes a touch larger
        const style=`left:${pl.x}%;top:${pl.y}%;`+
          (pl.fs?`font-size:${pl.fs};`:'')+(pl.w?`width:${pl.w};`:'')+(pl.h?`height:${pl.h};`:'')+
          `opacity:${op.toFixed(3)};filter:blur(${blur}px);scale:${sc};`;
        return `<div class="px-el ${pl.cls}" style="${style}" data-drift="${drift.toFixed(2)}">${pl.t}</div>`;
      }).join('');
      c.innerHTML=`<div class="px"><div class="px-grid"></div>${html}`+
        `<div class="px-lab"></div>`+
        `<div class="px-cap">near planes outrun far — depth is the difference in speed</div></div>`;
      return {grid:c.querySelector('.px-grid'),
              els:[...c.querySelectorAll('.px-el')].map(el=>({el, drift:+el.dataset.drift})),
              lab:c.querySelector('.px-lab'), N:planes.length}; },
    paint(p,n){ const r=n.ctx;
      // pure differential drift: each plane rises by its own depth-scaled amount, so
      // the planes pull out of register — depth from the difference in speed. translateY
      // is % of each plane's OWN box (its drift coefficient); the grid is slowest of all.
      r.grid.style.transform=`translateY(${-2.5*p}%)`;
      for(const {el,drift} of r.els) el.style.transform=`translateY(${-drift*p}%)`;
      // honest live readout: the real depth SPREAD, 0 at rest → 100% at full pull. High
      // frequency → textContent direct, not setText (its fade would flicker every frame).
      // raw p, not n.w — a live readout of the ambient drift you can see; see read-beat SCOPE note.
      r.lab.textContent=`PARALLAX · ${r.N} PLANES · SPREAD ${Math.round(p*100)}%`; }
  },

  // THE KNOCKOUT — a circular aperture is cut through the SURFACE plate to uncover the
  // SUBSTRATE printed beneath; the same eased scalar drives the knockout, its cut edge,
  // and the readout. The cut waits out the read-beat so "the surface" is read whole first.
  mask:{
    build(c,node){
      c.innerHTML=`<div class="mk"><div class="mk-layer mk-under">${node.under||"underneath"}</div>`+
        `<div class="mk-layer mk-over">${node.over||"the surface"}</div>`+
        `<div class="mk-cut"></div><div class="mk-lab"></div><div class="mk-cap"></div></div>`;
      return {mk:c.querySelector('.mk'), over:c.querySelector('.mk-over'),
              lab:c.querySelector('.mk-lab'), cap:c.querySelector('.mk-cap')}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps;
      // the cut opens on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the surface
      // HOLDS STILL fully legible through the opening beat before the knockout starts —
      // bmf: "there needs to be room for it to breathe". A quadratic EASE-IN (t*t) keeps
      // the first nick gentle so the surface reads on PAST the dwell, then the cut
      // accelerates; this aligns the picture to the three captions (whole → cutting →
      // beneath) instead of finishing the cut while the caption still says "read it
      // whole". It completes at 0.85 so the substrate stands alone for a reading tail.
      const t=clamp(n.w/0.85,0,1), open=t*t;
      // ONE scalar drives the knockout radius, its cut-edge ring, AND the readout
      // [LAW:one-source-of-truth] — set on the scene root so both consumers inherit it.
      // 0→112% sweeps the cut fully past the corner so the surface is entirely knocked
      // out and the substrate is clean; the number can never disagree with the hole.
      r.mk.style.setProperty('--r', (open*112).toFixed(2)+'%');
      // honest live readout: the aperture's open fraction, the SAME scalar that opens it.
      // High frequency → textContent direct, not setText (its fade would flicker every
      // frame; the frame-sequence/parallax lesson). Reads n.w, like the picture it reports.
      r.lab.textContent=`APERTURE ${Math.round(open*100)}% · THE SURFACE → UNDERNEATH`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },

  // THE PROOF — a proofing blade sweeps the loose grey DRAFT into the tight jade
  // SPECIMEN: a LINEAR travelling boundary between two full states of the SAME word
  // (deliberately distinct from mask's RADIAL knockout). bmf: "before/after is boring
  // — make it longer AND give it a twist": longer via tempo 'movement' (the palette's
  // longest breath); the twist is the print-proof reading — grey→jade ink, loose→
  // tight tracking, a baseline rule drawing in behind a wet-ink blade edge.
  wipe:{
    build(c,node){
      c.innerHTML=`<div class="wp"><div class="wp-layer wp-a">${node.word||"proof"}</div>`+
        `<div class="wp-layer wp-b">${node.word||"proof"}</div>`+
        `<div class="wp-div"></div><div class="wp-lab"></div><div class="wp-cap"></div></div>`;
      return {wp:c.querySelector('.wp'), lab:c.querySelector('.wp-lab'), cap:c.querySelector('.wp-cap')}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps;
      // the blade sweeps on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the
      // grey draft HOLDS STILL fully legible through the opening beat before the proof
      // is pulled — bmf: "room to breathe". LINEAR in n.w (a press blade moves at
      // CONSTANT speed — the honest metaphor) so it stays aligned with the linear
      // stepIdx captions: an easeOut would front-load the picture and desync the
      // wording (the mask lesson). Completes at 0.85 → a reading tail with the
      // finished specimen standing alone.
      const sweep=clamp(n.w/0.85,0,1);
      // ONE scalar drives the clip, the blade position, AND the readout
      // [LAW:one-source-of-truth] — set on the scene root so both CSS consumers
      // inherit it; the blade can never leave the reveal edge.
      r.wp.style.setProperty('--s', (sweep*100).toFixed(2)+'%');
      // honest live readout: the sweep fraction, the SAME scalar that moves the blade.
      // High frequency → textContent direct, not setText (its fade would flicker every
      // frame; the frame-sequence/parallax lesson). Reads n.w, like the picture.
      r.lab.textContent=`PROOF ${Math.round(sweep*100)}% · DRAFT → SET`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },

  // an SVG line draws itself
  draw:{
    build(c){ c.innerHTML=`<div class="dw"><svg viewBox="0 0 100 56" preserveAspectRatio="none"><path d="M3,46 C20,46 22,12 34,14 S52,44 64,30 80,8 97,12"/><circle r="2.6"/></svg></div><div class="scene-cap"></div>`;
      return {path:c.querySelector('path'), dot:c.querySelector('circle'), cap:c.querySelector('.scene-cap'), len:0}; },
    paint(p,n){ const path=n.ctx.path; if(!n.ctx.len){ const L=path.getTotalLength(); if(!L) return; n.ctx.len=L; path.style.strokeDasharray=L; }
      path.style.strokeDashoffset=n.ctx.len*(1-p); const pt=path.getPointAtLength(n.ctx.len*p);
      n.ctx.dot.setAttribute('cx',pt.x); n.ctx.dot.setAttribute('cy',pt.y);
      setText(n.ctx.cap, "the path is drawn to exactly where you've scrolled"); }
  },

  // figures tick up
  count:{
    build(c,node){ c.innerHTML=`<div class="cnt">${node.stats.map(s=>`<div class="cnt-stat"><div class="cnt-num">0</div><div class="cnt-lab">${s.lab}</div></div>`).join('')}</div>`;
      return {nums:[...c.querySelectorAll('.cnt-num')]}; },
    paint(p,n){ const s=n.node.stats, e=easeOut(n.w); n.ctx.nums.forEach((el,i)=>{ el.textContent=(s[i].pre||'')+Math.round(s[i].v*e)+(s[i].suf||''); }); }
  },

  // words illuminate progressively
  typewriter:{
    build(c,node){ const words=node.text.split(' ');
      c.innerHTML=`<div class="tw"><p class="tw-p">${words.map(w=>`<span class="w">${w}</span>`).join(' ')}</p></div>`;
      return {words:[...c.querySelectorAll('.w')]}; },
    paint(p,n){ const lit=Math.floor(clamp(n.w/0.92,0,1)*n.ctx.words.length); n.ctx.words.forEach((w,i)=>{ w.style.color=i<lit?'#f1eef9':'#3a3645'; }); }
  },

  // full-bleed colour field swells
  takeover:{
    build(c,node){ c.innerHTML=`<div class="tk"><div class="tk-word">${node.word||"takeover"}</div></div>`;
      return {tk:c.querySelector('.tk'), word:c.querySelector('.tk-word')}; },
    paint(p,n){ const h=Math.round(lerp(250,330,p));
      n.ctx.tk.style.background=`linear-gradient(135deg, hsl(${h} 65% 14%), hsl(${h+40} 70% 9%))`;
      n.ctx.word.style.transform=`scale(${1+p*0.7})`; n.ctx.word.style.letterSpacing=`${p*4}px`;
      n.ctx.word.style.opacity=`${lerp(0.35,1,clamp(p*1.4,0,1))}`; }
  },

  // ---- text-as-graphic painters: the words themselves are the picture ----
  ring:{
    // concentric NESTED rings — a ring that holds a ring that holds a ring. Each ring
    // is one nesting level; they fill outer→inner in turn (pathLength=100 normalises
    // every radius to the same 0..100 fill), and the centre counts how deep the
    // nesting has reached — the containment idea, drawn in the round.
    build(c){ const radii=[44,31,18];
      const rings=radii.map(r=>`<circle class="rg-bg" cx="50" cy="50" r="${r}"/><circle class="rg-fg" cx="50" cy="50" r="${r}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`).join('');
      c.innerHTML=`<div class="rg"><div class="rg-rings"><svg viewBox="0 0 100 100">${rings}</svg><div class="rg-num">0</div></div><div class="rg-cap"></div></div>`;
      return {fg:[...c.querySelectorAll('.rg-fg')], num:c.querySelector('.rg-num'), cap:c.querySelector('.rg-cap')}; },
    paint(p,n){ const s=n.node.steps, fg=n.ctx.fg, R=fg.length;
      // ring k owns the scroll slice [k/R,(k+1)/R]; depth = how many have begun filling
      let depth=0;
      fg.forEach((el,k)=>{ const t=clamp((p - k/R)/(1/R),0,1); el.style.strokeDashoffset=100*(1-t); if(t>0) depth=k+1; });
      n.ctx.num.textContent=depth;
      setText(n.ctx.cap, s[stepIdx(n.w,s.length)]); }
  },
  scaleword:{
    // the punch-word lands inside concentric frame-echoes — the same nested-window
    // glyph the depth dive ends on — that ignite outer→inner as the node scrolls,
    // so the nest assembles behind the words before the chain has shown its hand.
    build(c){ const F=5;
      const frames=Array.from({length:F},()=>'<div class="scw-fr"></div>').join('');
      c.innerHTML=`<div class="scw"><div class="scw-nest">${frames}</div><div class="scw-cap"></div></div>`;
      const fr=[...c.querySelectorAll('.scw-fr')];
      fr.forEach((el,i)=>{ el.style.transform=`translate(-50%,-50%) scale(${1 - i*0.17})`; });   // concentric, receding inward
      return {cap:c.querySelector('.scw-cap'), fr, cur:-1}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), fr=n.ctx.fr, F=fr.length;
      // frames ignite with raw scroll (ambient) — outer frames brighter, inner fainter, so depth reads
      const lit=Math.round(clamp(p,0,1)*F);
      fr.forEach((el,k)=>el.style.opacity = k<lit ? (1 - k*0.16) : 0);
      if(n.ctx.cur===i) return; n.ctx.cur=i;
      n.ctx.cap.textContent=s[i]; if(!REDUCE_MOTION) n.ctx.cap.animate([{opacity:0,transform:'scale(1.35)'},{opacity:1,transform:'scale(1)'}],{duration:MOTION.ms.pop,easing:MOTION.ease.land}); }
  },
  // a syntax-lit editor that types the sticky rule character-by-character. paint
  // only WRITES state (innerHTML / textContent / class) — the caret blink is a CSS
  // @keyframes gated by the global reduced-motion kill, not an imperative branch.
  terminal:{
    build(c,node){ const tok=tmTokenize(node.steps), total=tok.reduce((a,segs)=>a+tmLen(segs),0);
      c.innerHTML=`<div class="tm"><div class="tm-top"><span class="tm-dots"><i></i><i></i><i></i></span><span class="tm-file">sticky<b>.css</b></span></div>`
        +`<div class="tm-pane"><div class="tm-code"></div></div>`
        +`<div class="tm-bar"><span class="tm-lang">CSS</span><span class="tm-pos">Ln 1, Col 1</span><span class="tm-save">typing…</span></div></div>`;
      return {code:c.querySelector('.tm-code'), pos:c.querySelector('.tm-pos'), save:c.querySelector('.tm-save'), tok, total, cur:-1}; },
    paint(p,n){ const tok=n.ctx.tok, total=n.ctx.total;
      const typed=Math.round(clamp(n.w/0.92,0,1)*total);   // text animates in → reads from n.w (waits out the read-beat)
      if(n.ctx.cur===typed) return; n.ctx.cur=typed;
      const rows=[]; let rem=typed, curLine=0, curCol=0;
      for(let li=0; li<tok.length; li++){
        if(rem<=0 && li>0) break;                          // this line hasn't started typing yet
        const len=tmLen(tok[li]), take=clamp(rem,0,len);
        rows.push(`<b class="tm-no">${li+1}</b><span class="tm-ln">${tmReveal(tok[li],take)}__CARET__</span>`);
        curLine=li; curCol=take; rem-=take;
        if(take<len) break;                                // partial line — the caret lives here
      }
      const last=rows.length-1;                            // caret + current-row highlight ride the last typed line
      n.ctx.code.innerHTML=rows.map((r,k)=>`<div class="tm-row${k===last?' cur':''}">${r.replace('__CARET__', k===last?'<span class="tm-caret"></span>':'')}</div>`).join('');
      const done=typed>=total;
      n.ctx.pos.textContent=`Ln ${curLine+1}, Col ${curCol+1}`;
      n.ctx.save.textContent=done?'saved':'typing…'; n.ctx.save.classList.toggle('done', done); }
  },
  shapemorph:{
    // a square that holds a smaller copy of itself, three deep; every level morphs in
    // lockstep (same radius + hue), so the figure is self-similar and the caption's
    // "holds another" is literally on the screen. Each level rides its parent's turn
    // and adds its own, so the nested copies wheel within the whole.
    build(c){ c.innerHTML=`<div class="shm"><div class="shm-shape"><div class="shm-shape"><div class="shm-shape"></div></div></div><div class="shm-cap"></div></div>`;
      return {shapes:[...c.querySelectorAll('.shm-shape')], cap:c.querySelector('.shm-cap')}; },
    paint(p,n){ const s=n.node.steps, i=stepIdx(n.w,s.length), t=s.length<2?n.w:i/(s.length-1);
      const r=lerp(8,50,t)+'%', hue=Math.round(lerp(250,288,t));   // stays in the iris/violet family the whole movement wears — never drifts off-palette
      n.ctx.shapes.forEach((el,k)=>{ el.style.borderRadius=r; el.style.transform=`rotate(${t*135}deg)`;
        el.style.background=`hsl(${hue} 72% ${62-k*8}%)`; });   // inner levels a shade deeper, so the nesting reads
      setText(n.ctx.cap, s[i]); }
  },

  // ---- image-based painters: one still picture, scroll works it ----
  // push into a single frame; the detail was always there
  // THE LOUPE — a uniform push into one showpiece glyph; the fine print set into its
  // counter from frame 0 grows into legibility purely by magnification ("always there")
  zoom:{
    build(c,node){
      c.innerHTML=`<div class="zm"><div class="zm-stage"><div class="zm-g">${node.glyph||'g'}</div>`+
        `<div class="zm-fine">${node.fine||'hamburgefonstiv'}</div></div>`+
        `<div class="zm-loupe"></div><div class="zm-lab"></div><div class="zm-cap"></div></div>`;
      return {stage:c.querySelector('.zm-stage'), lab:c.querySelector('.zm-lab'),
              cap:c.querySelector('.zm-cap'), basePt:node.pt||18, max:node.power||9}; },
    paint(p,n){ const r=n.ctx, s=n.node.steps, e=easeOut(n.w);
      // ONE uniform scale about the fixed focal origin — the Ken Burns push. The push is
      // gated on n.w (read-beat applied, beat:'dwell'), NOT raw p, so the glyph HOLDS
      // STILL at full size through the opening beat ("one glyph, set at eighteen point")
      // before the descent begins — the horizontal-node precedent for a graphic that
      // should wait out the read. The eased scale scalar then drives BOTH the transform
      // and the readout [LAW:one-source-of-truth], so the number can never disagree with
      // the picture; because the picture itself waits on n.w, so does its readout.
      const scale=lerp(1,r.max,e);
      r.stage.style.transform=`scale(${scale.toFixed(3)})`;
      // honest live readout: loupe power + the specimen size-scale climb, derived from
      // the same scale. High-frequency → textContent direct, not setText (its fade would
      // flicker every frame; the frame-sequence/parallax lesson).
      r.lab.textContent=`LOUPE ×${scale.toFixed(1)} · ${r.basePt}→${Math.round(r.basePt*scale)} PT`;
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },
  // a unit grid fills toward a share
  waffle:{
    build(c){ c.innerHTML=`<div class="wf"><div class="wf-grid">${Array.from({length:100},()=>'<i class="wf-cell"></i>').join('')}</div><div class="wf-cap"></div></div>`;
      return {cells:[...c.querySelectorAll('.wf-cell')], cap:c.querySelector('.wf-cap')}; },
    paint(p,n){ const on=Math.round(easeOut(p)*100); n.ctx.cells.forEach((el,i)=>el.classList.toggle('on', i<on));
      // raw p, not n.w — the % must match the filled cells it reports; see read-beat SCOPE note
      setText(n.ctx.cap, on+'% '+(n.node.lab||'')); }
  },
  // labels pin onto one still image, one at a time (the satellite-annotation form)
  annotate:{
    build(c,node){ c.innerHTML=`<div class="an"><div class="an-terrain"></div>${node.pins.map(pn=>`<div class="an-pin" style="left:${pn.x}%;top:${pn.y}%"><div class="an-dot"></div><div class="an-lab">${pn.t}</div></div>`).join('')}<div class="an-cap"></div></div>`;
      return {pins:[...c.querySelectorAll('.an-pin')], cap:c.querySelector('.an-cap')}; },
    paint(p,n){ const pins=n.node.pins, shown=Math.round(clamp(n.w/0.9,0,1)*pins.length);
      n.ctx.pins.forEach((el,i)=>el.classList.toggle('on', i<shown));
      setText(n.ctx.cap, shown ? pins[shown-1].c : ''); }
  },
  // a graduated measurement instrument — a 240° dial whose needle measures runway
  // length (a taller sticky track is a longer pin). The dial FACE is a constant
  // 0–100 proportion scale: that is exactly what the needle position geometrically
  // IS, so the baked tick labels can never go stale or fabricate a px figure. The
  // single px reading lives in the LCD and is the node's OWN runway height (n.h —
  // the run element the engine's measure() reads), the real scene geometry, not a
  // fabricated scale. So "runway length in px" has ONE representation (n.h,
  // recomputed on resize), with no second scale to drift from the real track.
  // [LAW:one-source-of-truth] [LAW:dataflow-not-control-flow] tick/label geometry
  // derives from one polar() helper — angles flow to coordinates, never hand-placed.
  gauge:{
    build(c){ const SEG=5, A=120, MINOR=5;   // ±A° → a 240° sweep; SEG segments → a clean 0–100 face
      const polar=(deg,r)=>[(50+r*Math.sin(deg*Math.PI/180)).toFixed(2), (50-r*Math.cos(deg*Math.PI/180)).toFixed(2)];
      const arc=r=>{ const a=polar(-A,r), b=polar(A,r); return `M ${a[0]} ${a[1]} A ${r} ${r} 0 1 1 ${b[0]} ${b[1]}`; };   // 240°>180° → large-arc
      let ticks='', nums='';
      for(let i=0;i<=SEG*MINOR;i++){ const f=i/(SEG*MINOR), maj=i%MINOR===0, deg=lerp(-A,A,f);
        const o=polar(deg,41), inr=polar(deg, maj?34:37);
        ticks+=`<line class="gg-tick${maj?' maj':''}" x1="${o[0]}" y1="${o[1]}" x2="${inr[0]}" y2="${inr[1]}"/>`;
        if(maj){ const lp=polar(deg,46.5); nums+=`<text class="gg-num" x="${lp[0]}" y="${lp[1]}">${Math.round(f*100)}</text>`; } }
      c.innerHTML=`<div class="gg"><div class="gg-inst"><svg viewBox="0 0 100 100">`
        +`<circle class="gg-bezel" cx="50" cy="50" r="48.5"/>`
        +`<path class="gg-arc" d="${arc(38)}"/>`
        +`<path class="gg-fill" d="${arc(38)}" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"/>`
        +`<g class="gg-ticks">${ticks}</g>${nums}`
        +`<text class="gg-face" x="50" y="63">% pinned</text>`
        +`<g class="gg-needle"><line class="gg-n-tail" x1="50" y1="50" x2="50" y2="59"/>`
        +`<line class="gg-n-main" x1="50" y1="50" x2="50" y2="15"/><circle class="gg-n-tip" cx="50" cy="15" r="2.4"/></g>`
        +`<circle class="gg-hub" cx="50" cy="50" r="4"/></svg>`
        +`<div class="gg-lcd"><span class="gg-val">0</span><span class="gg-unit">px</span><span class="gg-lbl">runway</span></div>`
        +`</div><div class="gg-cap"></div></div>`;
      return {fill:c.querySelector('.gg-fill'), needle:c.querySelector('.gg-needle'),
        val:c.querySelector('.gg-val'), cap:c.querySelector('.gg-cap'), ang:A}; },
    paint(p,n){ const s=n.node.steps, r=n.ctx, deg=lerp(-r.ang,r.ang,p);
      r.fill.style.strokeDashoffset=100*(1-p);
      r.needle.setAttribute('transform',`rotate(${deg.toFixed(2)} 50 50)`);
      // needle + fill + LCD track scroll position (raw p, the instrument the reader
      // watches sweep); the caption is wording, so it waits on n.w (read-beat).
      // the px is this node's OWN runway from real layout: p*n.h is the pixels
      // scrolled into the scene's runway, n.h its full length. [LAW:one-source-of-truth]
      setText(r.val, String(Math.round(p*n.h/10)*10));
      setText(r.cap, s[stepIdx(n.w,s.length)]); }
  },
  // scroll wired to animation — the connector energizes, a pulse rides it
  // the same oscilloscope in X-Y (Lissajous) mode: CH1 scroll on the X axis, CH2
  // animation on the Y axis, and a phosphor dot riding the y=x diagonal — a straight
  // diagonal IS the proof scroll and animation are bound 1:1 (animation-timeline).
  bind:{
    // [LAW:one-source-of-truth] x and y are the SAME p: the dot is plotted at (p,p),
    // the trace is the ideal diagonal revealed up to it, and the lock is read off
    // Δ=|x−y| (structurally 0) — never a second fabricated signal. The diagonal is a
    // consequence of the data, not an asserted decoration. [LAW:dataflow-not-control-flow]
    // paint writes state only; the dot's glow is a CSS @keyframes the global
    // reduced-motion kill stops.
    build(c){ c.innerHTML=`<div class="sc xy">`
      +`<div class="sc-tag tl">CH1 ▸ scroll</div><div class="sc-tag tr">CH2 ▸ animation</div>`
      +`<div class="xy-ideal"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="M0,100 L100,0"/></svg></div>`
      +`<div class="xy-vx"></div><div class="xy-hz"></div><div class="xy-dot"></div>`
      +`<div class="xy-note"></div>`
      +`<div class="sc-read"><span class="xy-co"></span><b class="xy-lock"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), vx:c.querySelector('.xy-vx'), hz:c.querySelector('.xy-hz'),
        dot:c.querySelector('.xy-dot'), co:c.querySelector('.xy-co'), lock:c.querySelector('.xy-lock'), note:c.querySelector('.xy-note')}; },
    paint(p,n){ const x=p, y=p, X=(x*100).toFixed(2), Y=((1-y)*100).toFixed(2);   // CH1=scroll→X, CH2=animation→Y; both ARE p
      n.ctx.trace.style.clipPath=`inset(0 ${((1-p)*100).toFixed(2)}% 0 0)`;        // reveal the diagonal up to the dot
      n.ctx.dot.style.left=X+'%'; n.ctx.dot.style.top=Y+'%';
      n.ctx.vx.style.left=X+'%'; n.ctx.vx.style.height=(y*100).toFixed(2)+'%';     // scroll's X projected up from the axis
      n.ctx.hz.style.top=Y+'%'; n.ctx.hz.style.width=(x*100).toFixed(2)+'%';       // animation's Y projected across from the axis
      // raw p, not n.w — these readouts report the live beam coordinates; see read-beat SCOPE note
      setText(n.ctx.co, `X ${x.toFixed(2)} · Y ${y.toFixed(2)} · Δ ${Math.abs(x-y).toFixed(2)}`);
      setText(n.ctx.lock, 'LOCKED 1:1');
      setText(n.ctx.note, p<.5 ? "animation-timeline binds them…" : "…a straight diagonal is 1:1. No JS."); }
  },
  // the exploded assembly schematic: numbered part-plates thread onto a dash-dot
  // assembly axis and slide apart along it — the anatomy, exploded and annotated
  explode:{
    // each part foreshadows the descent: its colour is the accent FAMILY of the
    // section that movement opens, resolved from the one palette — so the exploded
    // map previews the journey the page is about to take. [LAW:one-source-of-truth]
    // the part NUMBER is derived from index, never stored — the manifest reads 01..N
    // straight off the data order. [LAW:dataflow-not-control-flow]
    build(c,node){ c.innerHTML=`<div class="xp"><div class="xp-stack"><i class="xp-spindle"></i>`
      +node.layers.map((l,i)=>`<div class="xp-layer" style="background:${accentOf(l.c)}"><b class="xp-no">${String(i+1).padStart(2,'0')}</b><span class="xp-nm">${l.t}</span></div>`).join('')
      +`</div><div class="xp-dim"><span class="xp-dim-bar"></span><span class="xp-dim-lab">exploded view</span></div></div><div class="scene-cap"></div>`;
      return {layers:[...c.querySelectorAll('.xp-layer')], cap:c.querySelector('.scene-cap'),
        spindle:c.querySelector('.xp-spindle'), dim:c.querySelector('.xp-dim')}; },
    paint(p,n){ const L=n.ctx.layers, mid=(L.length-1)/2, e=easeOut(p), a=clamp(e/0.3,0,1);
      L.forEach((el,i)=>{ el.style.transform=`translateZ(${(i-mid)*70*e}px)`; });
      // the schematic chrome draws itself on as the parts separate — at rest it reads
      // as one solid block, so the axis and dimension only appear once there's a gap
      // to annotate. raw-p-derived (the visual's own separation, not n.w).
      n.ctx.spindle.style.opacity=a;
      n.ctx.dim.style.opacity=a; n.ctx.dim.style.height=lerp(18,232,e)+'px';
      // raw p, not n.w — this caption reports the slab's separation you can see; see read-beat SCOPE note
      setText(n.ctx.cap, p<.5 ? "Looks like one thing." : "It's a stack of separable parts."); }
  },
  // an oscilloscope: the steps are a pulse train on a phosphor trace, the beam
  // sweeps with scroll, and each pulse crossing the TRIGGER LEVEL latches its
  // onStep — the IntersectionObserver shown as a scope trigger.
  trigger:{
    // [LAW:one-source-of-truth] trig (the trigger level, % from top) is authored
    // ONCE here. It flows JS→CSS via --sc-trig (the dashed line's top) AND JS→SVG
    // as the band the pulses must cross: each pulse peaks ABOVE trig and rests
    // BELOW it by construction (peak<trig<base), so "the beam swept past pulse i's
    // centre" IS "pulse i crossed the trigger" — the fired latch derives from that
    // one geometric fact, never a parallel threshold that could drift.
    // [LAW:dataflow-not-control-flow] the trace is built once from the data; paint
    // only reveals it (clip) and reads which centres the beam has passed.
    build(c,node){ const s=node.steps, N=s.length, trig=46, base=70, peak=24;
      const cen=s.map((_,i)=>(i+0.5)/N*100);   // each event's X (sweep time), segment centre
      let d=`M0,${base}`;
      cen.forEach(c0=>{ const hw=100/N*0.34;    // a rounded pulse: rests at base, crests at peak (above trig), back to base
        d+=` L${(c0-hw).toFixed(1)},${base} C${(c0-hw*0.5).toFixed(1)},${base} ${(c0-hw*0.5).toFixed(1)},${peak} ${c0.toFixed(1)},${peak}`
          +` C${(c0+hw*0.5).toFixed(1)},${peak} ${(c0+hw*0.5).toFixed(1)},${base} ${(c0+hw).toFixed(1)},${base}`; });
      d+=` L100,${base}`;
      c.innerHTML=`<div class="sc" style="--sc-trig:${trig}%">`
        +`<div class="sc-tag tl">CH1 ▸ onStep</div><div class="sc-tag tr">new IntersectionObserver()</div>`
        +`<div class="sc-trace"><svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${d}"/></svg></div>`
        +`<div class="sc-trig"></div><div class="sc-beam"></div>`
        +s.map((_,i)=>`<div class="sc-ev" style="left:${cen[i].toFixed(1)}%; top:${peak-9}%">onStep(${i+1})</div>`).join('')
        +`<div class="sc-read"><span class="sc-now"></span><b class="sc-cnt"></b></div></div>`;
      return {trace:c.querySelector('.sc-trace'), beam:c.querySelector('.sc-beam'),
        evs:[...c.querySelectorAll('.sc-ev')], now:c.querySelector('.sc-now'), cnt:c.querySelector('.sc-cnt'), cen}; },
    paint(p,n){ const s=n.node.steps, N=s.length, e=clamp(p/0.9,0,1);
      n.ctx.trace.style.clipPath=`inset(0 ${((1-e)*100).toFixed(2)}% 0 0)`;   // beam draws the trace
      n.ctx.beam.style.left=(e*100)+'%';
      let fired=0;
      n.ctx.evs.forEach((el,i)=>{ const on=e>=n.ctx.cen[i]/100; el.classList.toggle('fired',on); if(on) fired++; });
      // raw e (p), not n.w — these readouts report the live sweep state; see read-beat SCOPE note
      setText(n.ctx.now, '▸ '+s[clamp(Math.floor(e*N),0,N-1)]);
      setText(n.ctx.cnt, 'FIRED '+fired+'/'+N); }
  },
  // characters rise + fade into place, left to right, paced by scroll
  cascade:{
    // glyph structure is markup, but each character is set as textContent — the
    // data is display text, so authored copy renders verbatim (a literal < or &
    // can never become markup). white-space:pre on .cs-c preserves the spaces.
    // Each glyph AUDITIONS many faces and settles: it morphs from a per-index-
    // seeded wild face (a real other family + a Fraunces opsz/wght/slant cut)
    // toward the house engraved face, left to right as the scroll front (e)
    // sweeps past — "the same idea, wearing many faces" performing its meaning.
    build(c,node){ c.innerHTML=`<div class="cs"><div class="cs-plate"><div class="cs-p"></div></div><div class="cs-mark">specimen · the forms</div></div>`;
      const wrap=c.querySelector('.cs-p'), chs=[], ctx={chs, count:0, locked:false};
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln';
        for(const ch of line){ const g=document.createElement('span'); g.className='cs-c'; g.textContent=ch; ln.append(g); chs.push(g); }
        wrap.append(ln); });
      ctx.count=chs.length;
      // Lock each cell to its SETTLED (house-face) width once Fraunces is active —
      // measured with all face overrides cleared, batch read then batch write — so
      // the audition's family/axis swaps restyle in place and never reflow the
      // centred line. Mirrors how `draw` lazily reads getTotalLength once it exists.
      // [LAW:no-ambient-temporal-coupling] the width owner is fonts.ready, named.
      document.fonts.ready.then(()=>{ chs.forEach(el=>{ el.style.width=''; el.style.fontFamily=''; el.style.letterSpacing=''; el.style.fontVariationSettings=''; });
        const ws=chs.map(el=>el.offsetWidth); chs.forEach((el,i)=>{ el.style.width=ws[i]+'px'; }); ctx.locked=true; });
      return ctx; },
    paint(p,n){ const chs=n.ctx.chs, N=n.ctx.count, e=clamp(n.w/0.85,0,1)*N;
      chs.forEach((el,i)=>{ const o=easeOut(clamp(e-i,0,1));   // settle progress as the front sweeps past char i
        // calm reveal — the only motion — when reduced-motion is asked for, or before
        // widths are locked (face swaps would jitter the centred line until then).
        if(REDUCE_MOTION || !n.ctx.locked){ el.style.opacity=o; el.style.transform=''; el.style.fontFamily=''; el.style.fontVariationSettings=''; el.style.letterSpacing=''; return; }
        const a=1-o;                                            // audition amount: 1 wild → 0 settled
        const fam=CS_FACES[(i+Math.floor(a*CS_FACES.length))%CS_FACES.length];   // steps through real families as it settles
        const opsz=lerp(144,12,a*((i*7)%5/4*0.6+0.4));          // dip toward a spindly text-cut, depth varied per glyph
        const wght=lerp(600,400,a), slnt=lerp(0,(i%2?-9:9),a), trk=lerp(0,0.16,a);
        el.style.fontFamily=o>=1?'':fam;
        el.style.fontVariationSettings=`"opsz" ${opsz.toFixed(0)}, "wght" ${wght.toFixed(0)}`;
        el.style.letterSpacing=trk.toFixed(3)+'em';
        el.style.opacity=lerp(0.12,1,o).toFixed(3);
        el.style.transform=`translateY(${lerp(22,0,o).toFixed(2)}px) skewX(${slnt.toFixed(2)}deg)`;
      }); }
  },
  // the phrase pulls from blur into sharp focus — a focus rack on the words
  focus:{
    build(c,node){ c.innerHTML=`<div class="fc"><div class="fc-p"></div></div>`;
      const wrap=c.querySelector('.fc-p');
      node.steps.forEach(line=>{ const ln=document.createElement('span'); ln.className='ln'; ln.textContent=line; wrap.append(ln); });
      return {el:wrap}; },
    paint(p,n){ const el=n.ctx.el;
      el.style.filter=`blur(${lerp(14,0,clamp(n.w/0.8,0,1))}px)`;
      el.style.opacity=lerp(0.25,1,clamp(n.w/0.6,0,1));
      el.style.transform=`scale(${lerp(1.08,1,easeOut(n.w))})`; }
  },
  // an endless dive: nested window-frames recede into 3D depth and recycle, so
  // the descent never bottoms out — the nesting demo's punchline, made literal
  depth:{
    build(c,node){ const rings=12, step=200;
      c.innerHTML=`<div class="dp"><div class="dp-field">${Array.from({length:rings},()=>'<div class="dp-ring"></div>').join('')}</div><div class="dp-word"></div></div>`;
      const word=c.querySelector('.dp-word'); word.textContent=node.word||'';
      return {rings:[...c.querySelectorAll('.dp-ring')], word, span:rings*step, step}; },
    paint(p,n){ const {rings,span,step}=n.ctx;
      rings.forEach((el,i)=>{ const z=-span + ((i*step + p*span) % span), d=-z;   // z: -span..0, ring nears the camera as p grows, then recycles to the back
        el.style.transform=`translate(-50%,-50%) translateZ(${z}px)`;
        el.style.opacity=clamp(d/300,0,1)*clamp((span-d)/500,0,1); });           // fade in from the depths, dissolve at the surface
      n.ctx.word.style.opacity=clamp((n.w-0.1)/0.5,0,1); }
  },
  // parallax snowfall behind a masthead — the NYT "Snow Fall" reference, in motion
  snow:{
    build(c,node){ const N=46, flakes=Array.from({length:N},(_,i)=>{ const d=i%3;
        return {x:(i*61)%100, by:(i*37)%100, size:[2,3.4,5.4][d], op:[.45,.7,1][d], speed:55+d*55, amp:5+d*6, ph:i*0.7}; });
      c.innerHTML=`<div class="sn">${flakes.map(f=>`<i class="sn-flake" style="left:${f.x}%;width:${f.size}px;height:${f.size}px;opacity:${f.op}"></i>`).join('')}<div class="sn-title"><h2></h2><div class="sub"></div></div></div>`;
      c.querySelector('.sn-title h2').textContent=node.title||'';
      c.querySelector('.sn-title .sub').textContent=node.sub||'';
      return {els:[...c.querySelectorAll('.sn-flake')], flakes, title:c.querySelector('.sn-title')}; },
    paint(p,n){ n.ctx.els.forEach((el,i)=>{ const f=n.ctx.flakes[i];
        const y=((f.by + p*f.speed) % 120) - 10;                                  // %-of-container fall, wraps for an endless field
        el.style.transform=`translate(${Math.sin(p*3 + f.ph)*f.amp}px, ${y}cqh)`; });
      n.ctx.title.style.opacity=clamp((n.w-0.05)/0.4,0,1); }
  },
  // threads weave from the edges into a single point as the closing line resolves
  converge:{
    build(c,node){ const N=14, cx=50, cy=46;
      const paths=Array.from({length:N},(_,i)=>{ const a=(i/N)*Math.PI*2;
        const ex=cx+Math.cos(a)*82, ey=cy+Math.sin(a)*82, c1x=cx+Math.cos(a+0.6)*42, c1y=cy+Math.sin(a+0.6)*42, c2x=cx+Math.cos(a-0.3)*15, c2y=cy+Math.sin(a-0.3)*15;
        return `M${ex.toFixed(1)},${ey.toFixed(1)} C${c1x.toFixed(1)},${c1y.toFixed(1)} ${c2x.toFixed(1)},${c2y.toFixed(1)} ${cx},${cy}`; });
      c.innerHTML=`<div class="cv"><svg viewBox="0 0 100 100" preserveAspectRatio="none">${paths.map(d=>`<path d="${d}"/>`).join('')}</svg><div class="cv-word"></div></div>`;
      const ps=[...c.querySelectorAll('.cv path')]; ps.forEach(pa=>{ const L=pa.getTotalLength(); pa.style.strokeDasharray=L; pa.style.strokeDashoffset=L; pa.dataset.len=L; });
      const word=c.querySelector('.cv-word'); word.textContent=node.word||'';
      return {ps, word}; },
    paint(p,n){ const e=easeOut(clamp(p/0.8,0,1)), reveal=clamp((n.w-0.45)/0.4,0,1);
      n.ctx.ps.forEach(pa=>{ pa.style.strokeDashoffset=(+pa.dataset.len)*(1-e); });
      n.ctx.word.style.opacity=reveal; n.ctx.word.style.transform=`scale(${lerp(0.9,1,reveal)})`; }
  },
  // a forensic viewfinder glides + zooms from subject to subject — visual tracking
  reticle:{
    build(c,node){ c.innerHTML=`<div class="rt"><div class="rt-scene"></div><div class="rt-box"><div class="rt-tag"></div></div><div class="rt-cap"></div></div>`;
      return {box:c.querySelector('.rt-box'), tag:c.querySelector('.rt-tag'), cap:c.querySelector('.rt-cap'), subs:node.subjects}; },
    paint(p,n){ const s=n.ctx.subs, N=s.length, f=clamp(n.w/0.92,0,1)*(N-1), i=Math.floor(f), frac=f-i, j=Math.min(i+1,N-1);
      const e=frac<.5?2*frac*frac:1-Math.pow(-2*frac+2,2)/2;                       // ease the glide between subjects
      const a=s[i], b=s[j], box=n.ctx.box;
      box.style.left=lerp(a.x,b.x,e)+'%'; box.style.top=lerp(a.y,b.y,e)+'%';
      box.style.width=lerp(a.w,b.w,e)+'%'; box.style.height=lerp(a.h,b.h,e)+'%';
      const cur=e<.5?a:b; setText(n.ctx.tag,cur.t); setText(n.ctx.cap, cur.cap||''); }
  },
  // points fly up into a plotted distribution, swept left to right — a data essay
  scatter:{
    build(c,node){ const N=64, dots=Array.from({length:N},(_,i)=>{ const x=(i+0.5)/N*100;
        const trend=70*Math.exp(-Math.pow((x-46)/24,2)) + 16*Math.sin(x/9);       // a humped distribution + gentle wave
        return {x, y:clamp(trend + 8*Math.sin(i*1.7), 4, 92), c:ACCENTS[i%ACCENTS.length]}; });
      c.innerHTML=`<div class="sct"><div class="sct-plot">${dots.map(d=>`<i class="sct-dot" style="left:${d.x}%;background:${d.c}"></i>`).join('')}<div class="sct-axis"></div></div><div class="sct-cap"></div></div>`;
      const els=[...c.querySelectorAll('.sct-dot')]; c.querySelector('.sct-cap').textContent=node.lab||'';
      return {els, dots}; },
    paint(p,n){ n.ctx.els.forEach((el,i)=>{ const d=n.ctx.dots[i], e=easeOut(clamp((p - d.x/200)/0.5,0,1));
        el.style.bottom=(d.y*e)+'%'; el.style.opacity=e; }); }                     // stagger by x so the cloud assembles as a sweep
  },
  // a stack of letterpress specimen cards; each plate scrolls off the top to reveal
  // the next, the last landing as the terminal state. Each plate wears a different
  // real face (grotesque/mono/serif) — the movement's thesis, made physical.
  deck:{
    build(c,node){ const cards=node.cards, N=cards.length;
      c.innerHTML=`<div class="dk"><div class="dk-stack">${cards.map((cd,i)=>{
        const f=DK_FACES[cd.face];                                                  // fail loud if a card names an unknown face
        const idx=String(i+1).padStart(2,'0'), tot=String(N).padStart(2,'0');
        return `<div class="dk-card"><div class="dk-lab">plate ${idx}/${tot} · ${f.label}</div><div class="dk-t"></div></div>`;
      }).join('')}</div></div>`;
      const els=[...c.querySelectorAll('.dk-card')], ts=[...c.querySelectorAll('.dk-t')];
      // set copy + face in JS: textContent keeps copy verbatim (never markup), and the
      // family string (a serif stack carries quotes) sets cleanly off the HTML attribute.
      ts.forEach((el,i)=>{ el.textContent=cards[i].t; el.style.fontFamily=DK_FACES[cards[i].face].fam; });
      return {els}; },
    paint(p,n){ const els=n.ctx.els, N=els.length, f=clamp(n.w/0.92,0,1)*(N-1);     // (N-1) so the last card lands as the terminal state, not flung past
      els.forEach((el,i)=>{ const d=i-f;                                           // d<0: flung off the top; d>=0: still in the stack
        if(d<=-1){ el.style.opacity=0; el.style.transform='translateY(-130%) rotateX(45deg)'; el.style.zIndex='0'; return; }
        el.style.zIndex=String(100-i);
        if(d<0){ el.style.opacity=clamp(1+d,0,1); el.style.transform=`translateY(${d*120}%) rotateX(${-d*45}deg) scale(${1+d*0.06})`; }
        else { el.style.opacity=clamp(1-d*0.32,0,1); el.style.transform=`translateY(${-d*5}%) translateZ(${-d*55}px) scale(${1-d*0.05})`; } }); }
  },
};

/* =====================================================================
   THE TREE — depth-first, this is the order you scroll. Nest a node in
   `kids` and it pins inside its parent. Deeper/broader = more entries.
===================================================================== */
const OPENING = {
  // the first scene — a plain, canonical scrollytelling. Full-bleed, no chrome,
  // nothing that hints the page continues past it.
  t:"the effect", kind:"steps-graphic", accent:'iris', beat:'dwell', tempo:'movement',   // the opener — the longest breath, each stage lands before it moves

  // `dwell` is each step's pacing weight (front-loaded onto step 1, so the opening
  // still graphic holds longest before anything moves); x/y are field-percent offsets
  // from centre, s is scale. number + colour are derived (index, --acc-iris), not stored.
  steps:[
    {dwell:1.55, cap:"A graphic enters and holds your gaze.",         state:{x:-36, y:10,  s:.9}},
    {dwell:1.05, cap:"It grows — the detail that matters, up close.", state:{x:-2,  y:-7,  s:1.6}},
    {dwell:1.0,  cap:"It steps aside for what comes next.",           state:{x:33,  y:11,  s:1.05}},
    {dwell:1.25, cap:"It settles. You never touched a button.",       state:{x:10,  y:0,   s:1.0}},

/* The one place the page wears its nesting on its sleeve: a short chain of
   framed "windows", each holding the next, to show that a scrollytelling can

          steps:["And that one holds another.","Each keeps its place in the stack."],
          kids:[
            { t:"…all the way down", kind:"depth", accent:'iris', beat:'brisk', framed:true, tempo:'flit',   // an endless dive — barely a breath

/* The long descent — all full-bleed now. Depth is real (frames stack and
   unwind), but the page reads as one varied scrolly. Variety lives in WHICH
   painter a node names; explanation rides as captions/code inside the visuals,
   not as standalone text cards. [LAW:one-type-per-behavior] */
const TREE = {
  t:"root", kind:"explode", accent:'iris', tempo:'passage',   // caption is a live readout of the slab's separation — no read-beat (tracks raw p)
  // the five movements, each tinted the family its section wears below — the map previews the arc
  layers:[{t:"the pin",c:'azure'},{t:"the step",c:'teal'},{t:"the forms",c:'jade'},{t:"the data",c:'amber'},{t:"the words",c:'ember'}],
  kids:[
    // ── the pin ──

      kids:[
        { t:"sticky", kind:"terminal", accent:'azure', beat:'brisk', tempo:'phrase',   // code types out — kinetic

        "onStep marks that step the active one.",
        "The next arms itself — no scroll math.",
      ],
      kids:[
        { t:"or, no JS at all", kind:"bind", accent:'teal', tempo:'phrase' },   // caption tracks the energizing wire — no read-beat (tracks raw p)

      kids:[

            {t:"Each step lifts to the next.", face:"mono"},
            {t:"Everything else is a remix.", face:"serif"},

/* ---- build the tree; register every node for the single paint loop ---- */
const doc=document.getElementById('doc');
const nodes=[];
function buildNode(node, frameDepth){
  const lvl=document.createElement('section'); lvl.className='lvl'+(node.framed?' framed':''); lvl.style.setProperty('--d', frameDepth);
  const frame=document.createElement('div'); frame.className='frame';
  const inner=document.createElement('div'); inner.className='inner';
  // [LAW:dataflow-not-control-flow] the accent is authored data on the node — the
  // colour journey is the sequence of families the tree names, not a side effect
  // of build order. [LAW:no-silent-failure] a node with no accent (or a misspelled
  // family, via accentOf) breaks the build loud, so the arc can't silently gap.
  if(!node.accent) throw new Error(`Node "${node.t}" names no accent — every node must pick one of: ${PALETTE.join(', ')}`);
  inner.style.setProperty('--accent', accentOf(node.accent));
  const bar=document.createElement('div'); bar.className='bar';
  bar.innerHTML=`<span class="dot"></span><span class="ttl">${node.t}</span><span class="barfill"></span>`;
  const content=document.createElement('div'); content.className='content';
  inner.append(bar, content); frame.append(inner); lvl.append(frame);

  const painter=PAINTERS[node.kind];
  // [LAW:errors] fail loud and self-describing if a node names a painter the
  // registry lacks — a typo localises to itself, not a cryptic later crash.
  if(!painter) throw new Error(`Unknown painter kind "${node.kind}" on node "${node.t}"`);
  // [LAW:no-silent-failure] same guard for the read-beat: an undefined beat is the
  // authorised default (handled in wordingProgress), but a MISSPELLED one would
  // silently fall back to 'read' and the scene's timing would lie with no signal.
  if(node.beat!==undefined && !(node.beat in READBEAT)) throw new Error(`Unknown read-beat "${node.beat}" on node "${node.t}" — use one of: ${Object.keys(READBEAT).join(', ')}`);
  // [LAW:no-silent-failure] same guard for the tempo: an undefined tempo is the
  // authorised default, but a MISSPELLED one would silently fall back and the
  // scene's pacing would lie with no signal.
  if(node.tempo!==undefined && !(node.tempo in TEMPO)) throw new Error(`Unknown tempo "${node.tempo}" on node "${node.t}" — use one of: ${Object.keys(TEMPO).join(', ')}`);
  const ctx=painter.build(content, node)||{};
  ctx.barfill=bar.querySelector('.barfill');

  // [LAW:dataflow-not-control-flow] pacing is data: the node's named tempo carries
  // both the scroll length and the trailing hold; the build is uniform, the variety
  // lives in the value. [LAW:one-source-of-truth] every scalar is read from :root.
  const tempo=TEMPO[node.tempo] ?? TEMPO[DEFAULT_TEMPO];
  const run=document.createElement('div'); run.className='run'; run.style.height=(tempo.len*PACE*100)+'vh';
  const hold=document.createElement('div'); hold.className='hold'; hold.style.height=(tempo.hold*PACE*100)+'vh';   // last state stays readable before the next frame covers it
  lvl.append(run, hold);
  nodes.push({node, painter, ctx, lvl, run});

  // [LAW:dataflow-not-control-flow] chrome depth is data: a framed node insets
  // its kids one notch deeper; a bleed node resets it to 0, so window chrome
  // can't leak past the nesting demo into the full-bleed descent below.
  if(node.kids){ const kids=document.createElement('div'); kids.className='kids';
    node.kids.forEach(k=>kids.append(buildNode(k, node.framed?frameDepth+1:0))); lvl.append(kids); }
  return lvl;
}
doc.append(buildNode(OPENING, 0), buildNode(NEST, 0), buildNode(TREE, 0));

// gentle release after the whole descent
const epi=document.createElement('section'); epi.className='epilogue';
epi.innerHTML=`<div class="rule"></div><div class="eyebrow">Out the other side</div>
  <h1>That's scrollytelling.</h1>
  <p class="lede">One sticky graphic, nested into an entire vocabulary of scroll-driven form. You made it all the way through.</p>
  <a href="#top">↑ Back to the top</a>`;
doc.append(epi);

let raf=false;
// [LAW:state] node geometry is a derived cache — each node's document-space top
// and run height. It only changes when layout can change (resize, late font/img
// load), so it's recomputed there and nowhere else. [LAW:one-source-of-truth]
function measure(){ const y=window.scrollY; for(const n of nodes){ n.top=n.lvl.getBoundingClientRect().top+y; n.h=n.run.offsetHeight; } }
function tick(){
  raf=false;
  // one layout read for the whole frame (scrollY), then pure compute + writes —
  // no per-node getBoundingClientRect, so the read/write phases never thrash.
  const y=window.scrollY;
  for(const n of nodes){
    // progress from this node's top, so stepping begins the instant the frame
    // pins (even pacing); the hold spacer keeps the last state readable.
    const p=clamp((y - n.top) / n.h, 0, 1);
    // raw p drives ambient (non-text) motion; n.w is the read-beat-applied
    // wording progress. SCOPE of the read-beat, stated once here so per-painter
    // use of p vs n.w is a declared rule, not a silent choice: text that ANIMATES
    // IN (appears / advances / illuminates) draws from n.w, so it waits out the
    // opening beat. Text that is a LIVE READOUT of the ambient channel (runway's
    // in-flow/pinned/released top:N readout, waffle's "47%") or that is ITSELF the ambient
    // graphic (takeover's swelling word) tracks
    // raw p by design — gating it would desync the label from what it reports, or
    // hold a stage that has nothing to read yet. [LAW:single-enforcer] the invariant
    // is computed in exactly one place, here. [LAW:comments-explain-why-only]
    n.w=wordingProgress(p, n.node);
    n.painter.paint(p, n);
    n.ctx.barfill.style.transform=`scaleX(${p})`;
  }
}
const onScroll=()=>{ if(!raf){ raf=true; requestAnimationFrame(tick); } };
const remeasure=()=>{ measure(); onScroll(); };
addEventListener('scroll',onScroll,{passive:true});
addEventListener('resize',remeasure);
addEventListener('load',remeasure);   // re-cache after fonts/images settle layout
document.fonts.ready.then(remeasure); // and once web fonts swap in (can reflow after load)
measure(); tick();
</script>

 class assignment at construction time, then CSS does the rest. */\n.drawer.edge-right {\n  right: 0;\n  transform: translate(var(--panel-width), -50%);\n}\n.drawer.edge-right:hover:not(.open) {\n  transform: translate(calc(var(--panel-width) - var(--peek)), -50%);\n}\n.drawer.edge-right.open {\n  transform: translate(0, -50%);\n}\n.drawer.edge-left {\n  left: 0;\n  flex-direction: row-reverse;\n  transform: translate(calc(-1 * var(--panel-width)), -50%);\n}\n.drawer.edge-left:hover:not(.open) {\n  transform: translate(calc(-1 * (var(--panel-width) - var(--peek))), -50%);\n}\n.drawer.edge-left.open {\n  transform: translate(0, -50%);\n}\n.handle {\n  width: var(--handle-width);\n  background: var(--handle-bg);\n  color: var(--handle-fg);\n  border: none;\n  cursor: pointer;\n  /* Padding is content-driven; the icon and label have their own transitions and the\n     handle shrink-wraps to match (no min-height). */\n  padding: 8px 6px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 0;\n  font-family: inherit;\n  font-weight: 600;\n  letter-spacing: 0.01em;\n  flex: 0 0 auto;\n  transition: padding 180ms ease-out, filter 180ms ease-out;\n}\n/* [LAW:single-enforcer] Hover darkening uses CSS filter rather than a separate\n   --handle-bg-hover variable so it works for any user-provided color without forcing\n   the user to specify two shades. */\n.handle:hover { filter: brightness(0.92); }\n.handle:focus-visible {\n  outline: 2px solid #ffffff;\n  outline-offset: -4px;\n}\n/* Right-edge handle: rounded LEFT side (the side facing the viewport). */\n.drawer.edge-right .handle {\n  border-top-left-radius: 14px;\n  border-bottom-left-radius: 14px;\n  box-shadow: -4px 0 16px rgba(0,0,0,0.22), inset 1px 0 0 rgba(255,255,255,0.15);\n}\n/* Left-edge handle: rounded RIGHT side (the side facing the viewport). */\n.drawer.edge-left .handle {\n  border-top-right-radius: 14px;\n  border-bottom-right-radius: 14px;\n  box-shadow: 4px 0 16px rgba(0,0,0,0.22), inset -1px 0 0 rgba(255,255,255,0.15);\n}\n/* [LAW:dataflow-not-control-flow] Closed state shows a small icon only. Hover or open\n   state expands the icon and reveals the label. The CSS always applies, the difference\n   is data — the .open class and the :hover pseudo. No JS state-toggling for these. */\n.handle svg {\n  width: 12px;\n  height: 12px;\n  flex-shrink: 0;\n  display: block;\n  transition: width 180ms ease-out, height 180ms ease-out;\n}\n.drawer:hover .handle svg,\n.drawer.open .handle svg {\n  width: 22px;\n  height: 22px;\n}\n.handle .ver {\n  font-size: 11px;\n  line-height: 1.15;\n  max-width: 40px;\n  max-height: 0;\n  margin-top: 0;\n  opacity: 0;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n  text-align: center;\n  transition: max-height 180ms ease-out, opacity 180ms ease-out, margin-top 180ms ease-out;\n}\n.drawer:hover .handle .ver,\n.drawer.open .handle .ver {\n  max-height: 16px;\n  margin-top: 6px;\n  opacity: 1;\n}\n.panel {\n  width: var(--panel-width);\n  max-height: 60vh;\n  overflow-y: auto;\n  background: var(--widget-bg);\n  color: var(--widget-fg);\n  border: 1px solid var(--widget-border);\n  padding: 12px;\n  flex: 0 0 auto;\n}\n.drawer.edge-right .panel {\n  border-right: none;\n  box-shadow: -8px 0 24px rgba(0,0,0,0.18);\n}\n.drawer.edge-left .panel {\n  border-left: none;\n  box-shadow: 8px 0 24px rgba(0,0,0,0.18);\n}\n.panel h2 { font-size: 13px; margin: 0 0 8px 0; font-weight: 600; }\n.index-link {\n  display: block;\n  padding: 8px 12px;\n  color: var(--widget-accent);\n  text-decoration: none;\n  border-radius: 6px;\n  margin-bottom: 4px;\n}\n.index-link:hover { background: var(--widget-bg-hover); }\n.index-link:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.rows { display: flex; flex-direction: column; gap: 2px; }\n.row {\n  display: block;\n  padding: 8px 12px;\n  border-radius: 6px;\n  text-decoration: none;\n  color: var(--widget-fg);\n}\n.row:hover { background: var(--widget-bg-hover); }\n.row:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.row .ver { font-weight: 600; }\n.row.current { background: var(--widget-current-bg); cursor: default; }\n.row .ref { font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace; font-size: 12px; color: var(--widget-fg-muted); }\n.badge {\n  display: inline-block;\n  font-size: 10px;\n  padding: 1px 6px;\n  border-radius: 10px;\n  background: var(--widget-accent);\n  color: #fff;\n  margin-left: 6px;\n  vertical-align: middle;\n}\n.state { padding: 8px 12px; color: var(--widget-fg-muted); }\n@media (max-width: 600px) {\n  .root { --panel-width: calc(100vw - 72px); }\n}\n";
  var SHADOW_HTML = "\n<div class=\"root\">\n  <div class=\"drawer\" role=\"region\" aria-label=\"Version switcher\">\n    <button class=\"handle\" type=\"button\" aria-expanded=\"false\" aria-controls=\"gh-pm-nav-panel\" aria-label=\"Switch version\">\n      <span class=\"icon-slot\"><\/span>\n      <span class=\"ver\"><\/span>\n    <\/button>\n    <div class=\"panel\" id=\"gh-pm-nav-panel\" role=\"dialog\" aria-label=\"Versions\">\n      <h2>Versions<\/h2>\n      <a class=\"index-link\" href=\"\">← Index<\/a>\n      <div class=\"rows\"><div class=\"state\">Loading versions…<\/div><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n";
  if (customElements.get('gh-pm-nav')) return;
  var GhPmNav = function(){};

        this._error = null;
        this._drawer = root.querySelector('.drawer');
        this._handle = root.querySelector('.handle');
        this._panel = root.querySelector('.panel');
        this._rows = root.querySelector('.rows');

        // Substitute {version} in the label template, then assign via textContent
        // (no HTML interpretation).
        var verSpan = root.querySelector('.handle .ver');
        var labelText = LABEL_TEMPLATE.split('{version}').join(CURRENT);
        if (verSpan) { verSpan.textContent = labelText; }

        if (rootEl) {

          });

            html += '<div class="row current"><span class="ver">' + safeName + '</span><span class="badge">current</span><div class="ref">' + safeRef + '</div></div>';
          } else {
            html += '<a class="row" href="../' + encodeURIComponent(name) + '/"><span class="ver">' + safeName + '</span><div class="ref">' + safeRef + '</div></a>';
